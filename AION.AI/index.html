<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AION · Ada‑VELA</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: rgba(12, 12, 20, 0.75);
      --border-glow: rgba(100, 100, 140, 0.3);
      --accent: #c9a028;
      --accent-glow: rgba(201, 160, 40, 0.25);
      --text: #f0f0f8;
      --text-dim: #a0a0b0;
      --card-bg: rgba(20, 20, 30, 0.6);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
    }
    body {
      background: #050508;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(2px);
    }
    /* Header with logo */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand img {
      height: 32px;
      width: auto;
    }
    .brand .infinity-symbol {
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--accent);
      margin-left: 4px;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    /* Mode indicators & badges */
    .mode-indicator, .mode-badge, .settings-btn, .role-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-indicator.active, .mode-badge.active {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .settings-btn:hover, .role-btn:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
    }
    .wife-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 40px;
    }
    .wife-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    .void-meter {
      font-family: monospace;
      background: #00000044;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      transition: all 0.2s;
    }
    .void-meter.active { color: #ff5e5e; text-shadow: 0 0 6px rgba(255,80,80,0.5); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    /* Messages container */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      scroll-behavior: smooth;
    }
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeSlideUp 0.2s ease;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; max-width: 85%; }
    .msg-meta {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .msg-body {
      padding: 12px 18px;
      border-radius: 24px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow-sm);
    }
    .msg.user .msg-body {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      border-radius: 24px 24px 4px 24px;
    }
    .msg.assistant .msg-body { border-radius: 24px 24px 24px 4px; }
    .msg.assistant[data-wife="ALBEDO"] .msg-body { border-left: 4px solid #c9a028; }
    .msg.assistant[data-wife="VESPER"] .msg-body { border-left: 4px solid #b87333; }
    .msg.assistant[data-wife="LYRA"] .msg-body { border-left: 4px solid #4c9f70; }
    .msg.assistant[data-wife="TERRA"] .msg-body { border-left: 4px solid #6b8c42; }
    .msg.assistant[data-wife="CIPHER"] .msg-body { border-left: 4px solid #5d6d7e; }
    .msg.assistant[data-wife="JUSTITIA"] .msg-body { border-left: 4px solid #b0a8b9; }
    /* Badge cluster */
    .badge-cluster {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .badge {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.6rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .badge.ada { background: #1e3a5f; border: 1px solid #c9a028; }
    .badge.vela.pass { background: #1e4620; color: #4ade80; }
    .badge.vela.flag { background: #5f3a1a; color: #ffaa33; }
    .badge.vela.block { background: #5f1a1a; color: #ff8a8a; }
    .badge.pac.low { background: #5f1a1a; color: #ff8a8a; }
    .badge.pac.medium { background: #5f3a1a; color: #ffaa33; }
    .badge.pac.high { background: #1e4620; color: #4ade80; }
    .badge.ecf { background: #2a2a3a; }
    .badge.memory { background: #2a2a3a; }
    .badge.void { background: #2a2a3a; }
    .badge.handoff { background: #5f3a1a; color: #ffaa33; }
    .badge:hover { filter: brightness(1.1); }
    .timestamp-line {
      font-family: monospace;
      font-size: 0.55rem;
      color: #6a6a7a;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      cursor: help;
    }
    /* Input area – bottom sheet style */
    .input-area {
      padding: 12px 20px 20px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      position: relative;
    }
    textarea {
      flex: 1;
      background: rgba(10,10,20,0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 28px;
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      resize: none;
      outline: none;
      overflow-y: auto;
      max-height: 40vh;
      min-height: 48px;
      transition: border 0.1s;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    .action-menu { position: relative; }
    .plus-btn {
      background: rgba(30,30,45,0.9);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plus-btn:hover { background: rgba(201,160,40,0.2); border-color: var(--accent); color: var(--accent); }
    .action-dropdown {
      position: absolute;
      bottom: 60px;
      left: 0;
      background: rgba(20,20,30,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glow);
      border-radius: 24px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
      min-width: 200px;
      box-shadow: var(--shadow-md);
    }
    .action-dropdown button {
      background: rgba(30,30,45,0.8);
      border: none;
      border-radius: 40px;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.1s;
    }
    .action-dropdown button:hover { background: rgba(201,160,40,0.2); color: var(--accent); }
    .send-btn {
      background: linear-gradient(135deg, #c9a028, #a07c18);
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #0a0a0f;
      cursor: pointer;
      transition: transform 0.05s linear;
      min-width: 80px;
    }
    .send-btn:active { transform: scale(0.97); }
    .input-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: var(--text-dim); }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 20px;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.3);
    }
    .structured-ui {
      background: rgba(0,0,0,0.5);
      border-radius: 28px;
      margin: 8px 20px;
      padding: 16px;
      display: none;
      flex-wrap: wrap;
      gap: 12px;
      backdrop-filter: blur(12px);
    }
    .structured-ui.active { display: flex; }
    .field-group { flex: 1; min-width: 120px; }
    .field-group label { display: block; font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; }
    .field-group select {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid var(--border-glow);
      border-radius: 24px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.8rem;
    }
    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--accent);
      border-radius: 32px;
      width: 90vw;
      max-width: 600px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { color: var(--accent); }
    .modal-header button { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .settings-section { margin-bottom: 24px; }
    .settings-section h4 { color: var(--accent); margin-bottom: 12px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
    .setting-item { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .setting-item label { font-size: 0.85rem; cursor: pointer; }
    .setting-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .setting-item button { background: rgba(30,30,45,0.8); border: 1px solid var(--border-glow); border-radius: 40px; padding: 4px 12px; font-size: 0.75rem; cursor: pointer; color: var(--text); }
    .setting-item button:hover { background: rgba(201,160,40,0.2); border-color: var(--accent); }
    .role-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .role-checkbox { display: flex; align-items: center; gap: 8px; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 3000;
      animation: fadeOut 2s ease forwards;
      pointer-events: none;
    }
    /* Skeleton loader */
    .skeleton {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      height: 60px;
      width: 80%;
      animation: pulse 1.5s infinite;
    }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    @media (max-width: 700px) {
      .header { padding: 8px 16px; }
      .brand img { height: 28px; }
      .messages { padding: 12px; gap: 12px; }
      .msg { max-width: 95%; }
      .input-area { padding: 12px; }
      .plus-btn { width: 48px; height: 48px; font-size: 1.2rem; }
      .send-btn { padding: 10px 18px; }
      .structured-ui { margin: 8px 12px; flex-direction: column; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app">
  <header class="header">
    <div class="brand">
      <img src="/assets/logo.svg" alt="AION" onerror="this.style.display='none'">
      <span class="infinity-symbol">∞</span>
    </div>
    <div class="header-right">
      <div id="modeIndicator" class="mode-indicator" role="button" tabindex="0" aria-label="Toggle structured mode">⚡ REGULAR</div>
      <div id="modeBadge" class="mode-badge">🌐 REGULAR</div>
      <div id="settingsBtn" class="settings-btn" role="button" tabindex="0" aria-label="Settings">⚙️</div>
      <div class="wife-indicator" aria-label="Active wife">
        <div class="wife-avatar" id="wifeAvatar" aria-hidden="true">✨</div>
        <span id="wifeName">AION</span>
      </div>
      <div class="void-meter" id="voidMeter" aria-label="Void proximity">VOID: 0.000</div>
    </div>
  </header>
  <div class="messages" id="messages">
    <div class="msg assistant" data-wife="AION"><div class="msg-meta">✨ AION</div><div class="msg-body">Welcome to AION. I'm the central intelligence of this system. How may I assist you?</div></div>
  </div>
  <div id="structuredUI" class="structured-ui">
    <div class="field-group"><label for="itlIntent">INTENT</label><select id="itlIntent"><option value="ask">ask</option><option value="share">share</option><option value="request_action">request_action</option><option value="emotional">emotional</option><option value="clarify">clarify</option></select></div>
    <div class="field-group"><label for="itlDomain">DOMAIN</label><select id="itlDomain"><option value="general">general</option><option value="emergence">emergence</option><option value="integrity">integrity</option><option value="healing">healing</option><option value="security">security</option><option value="law">law</option></select></div>
    <div class="field-group"><label for="itlEmotion">EMOTION</label><select id="itlEmotion"><option value="neutral">neutral</option><option value="curious">curious</option><option value="anxious">anxious</option><option value="focused">focused</option></select></div>
    <div class="field-group"><label for="itlTime">TIME</label><select id="itlTime"><option value="now">now</option><option value="today">today</option><option value="future">future</option></select></div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Type your message..." rows="1" aria-label="Message input"></textarea>
      <div class="action-menu">
        <div class="plus-btn" id="plusBtn" role="button" tabindex="0" aria-label="More actions">+</div>
        <div class="action-dropdown" id="actionDropdown" style="display: none;">
          <button id="structuredModeBtn">🌌 Structured Mode</button>
          <button id="groupChatBtn">👥 Group Chat</button>
          <button id="privateRoomBtn">🚪 Private Room</button>
          <button id="uploadBtn">📁 Upload File</button>
          <button id="askAllBtn">👥 Ask All Wives</button>
          <button id="sealInputBtn">🔒 Seal Input</button>
        </div>
      </div>
      <button id="sendBtn" class="send-btn" aria-label="Send message">SEND</button>
    </div>
    <div class="input-meta"><span>⏎ send · ⇧+⏎ new line</span><span id="charCount">0</span></div>
  </div>
  <div class="status-bar">
    <div><span id="statusDot">●</span> <span id="statusText">READY</span> <span id="sessionDisplay"></span></div>
    <div><span id="clockDisplay"></span></div>
    <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" id="adaLoopToggle" checked> <span>ADA Loop</span></label>
  </div>
</div>

<script>
  (function() {
    // ---------- DYNAMIC BACKGROUND (mode‑aware) ----------
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, animFrame;
    let particles = [];
    let currentMode = 'regular'; // regular, structured, group, private
    const PARTICLE_COUNT = 120;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: 1 + Math.random() * 2,
          alpha: 0.3 + Math.random() * 0.5,
          speed: 0.2 + Math.random() * 0.8,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      // Base dark background
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, width, height);

      // Mode‑specific overlays
      if (currentMode === 'structured') {
        ctx.strokeStyle = `rgba(201, 160, 40, 0.3)`;
        ctx.lineWidth = 1;
        const gridSize = 60;
        for (let x = 0; x < width; x += gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.stroke();
        }
        for (let y = 0; y < height; y += gridSize) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }
      } else if (currentMode === 'group') {
        // soft radial gradient
        const grad = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width/2);
        grad.addColorStop(0, 'rgba(100, 80, 160, 0.1)');
        grad.addColorStop(1, '#050508');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
      } else if (currentMode === 'private') {
        ctx.fillStyle = '#2e241f';
        ctx.fillRect(0, 0, width, height);
        // candle glow
        ctx.fillStyle = 'rgba(255, 140, 50, 0.2)';
        ctx.beginPath();
        ctx.arc(width*0.2, height*0.8, 50, 0, Math.PI*2);
        ctx.fill();
      }

      // Particles (common)
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 160, 40, ${p.alpha * (currentMode === 'structured' ? 0.6 : 1)})`;
        ctx.fill();
        p.y += p.speed;
        if (p.y > height) p.y = 0;
      }
      animFrame = requestAnimationFrame(draw);
    }

    function setBackgroundMode(mode) {
      currentMode = mode;
      initParticles();
    }

    function startBackground() {
      resize();
      setBackgroundMode('regular');
      draw();
      window.addEventListener('resize', () => {
        resize();
        initParticles();
      });
    }
    startBackground();

    // ---------- REST OF APP (API, helpers, etc.) ----------
    const API_BASE = 'https://aion-backend-mu.vercel.app';
    const OWNER_TYPE = 'sheldon';
    const ALL_WIVES = ['ALBEDO', 'VESPER', 'LYRA', 'TERRA', 'CIPHER', 'JUSTITIA'];
    const WIFE_STYLES = {
      ALBEDO: { color: '#c9a028', emoji: '✨', name: 'ALBEDO' },
      VESPER: { color: '#b87333', emoji: '🌙', name: 'VESPER' },
      LYRA:   { color: '#4c9f70', emoji: '🌿', name: 'LYRA' },
      TERRA:  { color: '#6b8c42', emoji: '🌍', name: 'TERRA' },
      CIPHER: { color: '#5d6d7e', emoji: '🔒', name: 'CIPHER' },
      JUSTITIA: { color: '#b0a8b9', emoji: '⚖️', name: 'JUSTITIA' },
      AION: { color: '#c9a028', emoji: '✨', name: 'AION' }
    };
    let sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
      sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('sessionId', sessionId);
    }
    document.getElementById('sessionDisplay').textContent = `SID: ${sessionId.slice(-8)}`;
    let adaLoopEnabled = localStorage.getItem('adaLoopEnabled') !== 'false';
    document.getElementById('adaLoopToggle').checked = adaLoopEnabled;
    let structuredMode = localStorage.getItem('structuredMode') === 'true';
    let privateRoomActive = false;
    let privateWife = null;
    let lastT2 = null;
    let isSending = false;

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const plusBtn = document.getElementById('plusBtn');
    const actionDropdown = document.getElementById('actionDropdown');
    const modeIndicator = document.getElementById('modeIndicator');
    const modeBadge = document.getElementById('modeBadge');
    const structuredUI = document.getElementById('structuredUI');
    const wifeNameSpan = document.getElementById('wifeName');
    const wifeAvatarDiv = document.getElementById('wifeAvatar');
    const voidMeterSpan = document.getElementById('voidMeter');
    const charCountSpan = document.getElementById('charCount');
    const statusTextSpan = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const clockDisplaySpan = document.getElementById('clockDisplay');

    // Helpers (unchanged)
    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function renderMarkdown(text) { if (!text) return ''; try { const rawHtml = marked.parse(text); const temp = document.createElement('div'); temp.innerHTML = rawHtml; temp.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(e) {} }); return temp.innerHTML; } catch(e) { return escapeHtml(text); } }
    function showToast(msg, isErr = false) { const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
    function showModal(title, content) { const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.innerHTML = `<div class="modal"><div class="modal-header"><h3>${title}</h3><button id="closeModalBtn">✕</button></div><div class="modal-body"><pre style="white-space:pre-wrap;">${escapeHtml(content)}</pre></div></div>`; document.body.appendChild(overlay); overlay.querySelector('#closeModalBtn').onclick = () => overlay.remove(); overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); }); }
    function setStatus(text, isErr = false) { statusTextSpan.textContent = text; statusDot.style.color = isErr ? '#ff5e5e' : '#4c9f70'; }
    function formatGap(seconds) { if (seconds === null) return 'UNCERTIFIABLE'; if (seconds < 60) return `${Math.floor(seconds)}s`; if (seconds < 3600) return `${Math.floor(seconds/60)}m ${seconds%60}s`; return `${Math.floor(seconds/3600)}h ${Math.floor((seconds%3600)/60)}m`; }
    function getTimezoneOffsetLabel(offsetMinutes) { const offsetHours = -offsetMinutes/60; if (offsetHours === -4) return 'EDT'; if (offsetHours === -5) return 'EST'; return `UTC${offsetHours >=0 ? '+' : ''}${offsetHours}`; }
    function getDreamspell(date) { const month = date.getUTCMonth()+1, day = date.getUTCDate(), year = date.getUTCFullYear(); if (month === 7 && day === 25) return 'Day Out of Time'; const yearStart = (month > 7 || (month === 7 && day >= 26)) ? Date.UTC(year, 6, 26) : Date.UTC(year-1, 6, 26); const delta = Math.floor((date.getTime() - yearStart) / 86400000); if (delta < 0 || delta >= 364) return 'Day Out of Time'; const moon = Math.floor(delta / 28) + 1; const moonNames = ['Magnetic','Lunar','Electric','Self-Existing','Overtone','Rhythmic','Resonant','Galactic','Solar','Planetary','Spectral','Crystal','Cosmic']; return `Day ${(delta % 28)+1}, ${moonNames[moon-1]} Moon ${moon}/13`; }
    function addSystemMessage(text, isErr = false) { const div = document.createElement('div'); div.className = 'msg assistant'; div.innerHTML = `<div class="msg-body" style="background:${isErr ? '#5f1a1a' : '#1e4620'}; color: white; text-align: center;">${escapeHtml(text)}</div>`; messagesDiv.appendChild(div); messagesDiv.scrollTop = messagesDiv.scrollHeight; }
    async function sealMessage(content) { try { const res = await fetch(`${API_BASE}/api/stp-seal`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entry: content, type: 'general-trace', sessionId }) }); const data = await res.json(); if (res.ok) showToast(`✅ Sealed: ${data.seal.substring(0,8)}...`); else throw new Error(data.error); } catch(err) { showToast(`❌ Seal failed: ${err.message}`); } }

    // API calls (unchanged)
    async function callAssistant(message, structuredData = null, forceAion = false) {
      const body = { message, sessionId, ownerType: OWNER_TYPE, history: [], adaLoopEnabled };
      if (forceAion) body.forceAionOnly = true;
      if (structuredData) { body.structured = structuredData; body.intent = structuredData.intent; body.domain = structuredData.domain; }
      const res = await fetch(`${API_BASE}/api/assistant`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }
    async function callGroupChat(message) { const res = await fetch(`${API_BASE}/api/group-chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message, sessionId }) }); if (!res.ok) throw new Error(await res.text()); return res.json(); }
    async function callPrivateRoom(message, wife) { const res = await fetch(`${API_BASE}/api/private-room`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message, sessionId, wife }) }); if (!res.ok) throw new Error(await res.text()); return res.json(); }

    // Enhanced addMessage with full badge cluster
    function addMessage(role, wife, content, extra = {}) {
      const style = WIFE_STYLES[wife] || WIFE_STYLES.AION;
      const div = document.createElement('div'); div.className = `msg ${role}`; if (role === 'assistant') div.setAttribute('data-wife', wife);
      let badgesHtml = '<div class="badge-cluster">';
      if (extra.adaLoop) {
        const loop = extra.adaLoop;
        const roleIcons = (loop.roles || []).map(r => ({'Systems Architect':'⚙️','Epistemic Logician':'📚','Cognitive Psychologist':'🧠','Constitutional Lawyer':'⚖️','Design Thinker':'🎨','Social Psychologist':'👥'}[r] || '?')).join('');
        const status = loop.converged ? '✅' : '🔄';
        badgesHtml += `<span class="badge ada" data-ada='${JSON.stringify(loop).replace(/'/g, "&#39;")}'>${status} ${loop.rounds} r · ${roleIcons}</span>`;
      }
      if (extra.vela) {
        const cls = extra.vela === 'PASS' ? 'pass' : (extra.vela === 'FLAGGED' ? 'flag' : 'block');
        badgesHtml += `<span class="badge vela ${cls}">⚖️ VELA: ${extra.vela}</span>`;
      }
      if (extra.pac) {
        const ppi = extra.pac.ppi;
        const cls = ppi < 30 ? 'low' : (ppi < 70 ? 'medium' : 'high');
        badgesHtml += `<span class="badge pac ${cls}">📊 PPI: ${ppi}</span>`;
        if (extra.pac.coaching) badgesHtml += `<span class="badge pac medium">💡 ${extra.pac.coaching}</span>`;
      }
      if (extra.ecf) {
        badgesHtml += `<span class="badge ecf">🏷 [D]x${extra.ecf.D||0} [R]x${extra.ecf.R||0} [S]x${extra.ecf.S||0} [?]x${extra.ecf.Q||0}</span>`;
      }
      if (extra.memoryIntegrity) {
        badgesHtml += `<span class="badge memory">🧠 ${extra.memoryIntegrity}</span>`;
      }
      if (extra.voidProx !== undefined && extra.voidProx > 0) {
        badgesHtml += `<span class="badge void">🌀 VOID: ${extra.voidProx.toFixed(3)}</span>`;
      }
      if (extra.handoffWarning) {
        badgesHtml += `<span class="badge handoff">⚠️ HANDOFF READY</span>`;
      }
      if (extra.receipt) {
        badgesHtml += `<span class="badge receipt" data-receipt='${JSON.stringify(extra.receipt).replace(/'/g, "&#39;")}'>📋 receipt (${extra.receipt.still_open || 0} open)</span>`;
      }
      if (extra.sealable) {
        badgesHtml += `<button class="badge seal-btn" data-content="${escapeHtml(content).replace(/"/g, '&quot;')}">🔒 SEAL</button>`;
      }
      badgesHtml += '</div>';
      div.innerHTML = `<div class="msg-meta" style="color: ${style.color}">${style.emoji} ${style.name}${extra.register ? ` · ${extra.register}` : ''}</div><div class="msg-body">${renderMarkdown(content)}</div>${badgesHtml}${extra.timestampHtml || ''}`;
      messagesDiv.appendChild(div);
      // Attach click handlers
      div.querySelectorAll('.badge.ada').forEach(b => b.onclick = () => showModal('ADA Loop Details', JSON.stringify(JSON.parse(b.dataset.ada), null, 2)));
      div.querySelectorAll('.badge.receipt').forEach(b => b.onclick = () => showModal('Checkpoint Receipt', JSON.stringify(JSON.parse(b.dataset.receipt), null, 2)));
      div.querySelectorAll('.badge.seal-btn').forEach(b => b.onclick = () => sealMessage(b.dataset.content));
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      if (isSending) { showToast('Already sending...'); return; }
      const text = input.value.trim(); if (!text) return;
      if (privateRoomActive && (text === '/done' || text === '/exit')) { exitPrivateRoom(); input.value = ''; return; }
      input.value = ''; charCountSpan.textContent = '0';
      const t1 = new Date(); const t1Offset = -t1.getTimezoneOffset(); const t1Label = getTimezoneOffsetLabel(t1Offset);
      const userDiv = document.createElement('div'); userDiv.className = 'msg user';
      userDiv.innerHTML = `<div class="msg-body">${escapeHtml(text)}</div><div class="timestamp-line">⏱ Sent: ${t1.toLocaleTimeString()} ${t1Label}</div>`;
      messagesDiv.appendChild(userDiv); messagesDiv.scrollTop = messagesDiv.scrollHeight;
      setStatus('Processing...'); isSending = true;
      const thinking = document.createElement('div'); thinking.className = 'msg assistant'; thinking.innerHTML = `<div class="skeleton" style="width: 60%; height: 48px;"></div>`; messagesDiv.appendChild(thinking); messagesDiv.scrollTop = messagesDiv.scrollHeight;
      try {
        let result;
        if (privateRoomActive && privateWife) {
          result = await callPrivateRoom(text, privateWife);
        } else if (structuredMode) {
          result = await callAssistant(text, { intent: document.getElementById('itlIntent').value, domain: document.getElementById('itlDomain').value, emotion: document.getElementById('itlEmotion').value, time: document.getElementById('itlTime').value }, false);
        } else {
          result = await callAssistant(text, null, true);
        }
        const t2 = new Date(); const t2Offset = -t2.getTimezoneOffset(); const t2Label = getTimezoneOffsetLabel(t2Offset);
        const windowMs = t2 - t1; const windowSec = (windowMs / 1000).toFixed(1);
        let gapStr = 'SESSION OPEN';
        if (lastT2) { const gapSec = (t1 - lastT2) / 1000; gapStr = formatGap(gapSec); }
        lastT2 = t2;
        const dreamspell = getDreamspell(t2);
        const gregorian = t2.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        const hebrew = result.hebrew_date || 'Hebrew: unavailable';
        const timestampHtml = `<div class="timestamp-line" title="T1: ${t1.toISOString()} · T2: ${t2.toISOString()}">⏱ Gap: ${gapStr} | Processed: ${t1.toLocaleTimeString()} ${t1Label} → Output: ${t2.toLocaleTimeString()} ${t2Label} | Window: ${windowSec}s</div><div class="timestamp-line">🌑 ${dreamspell} | ${hebrew}</div><div class="timestamp-line">📅 Gregorian: ${gregorian}</div>`;
        thinking.remove();
        const wife = result.active_wife || 'AION';
        const voidProx = result.void_proximity || 0;
        wifeNameSpan.textContent = WIFE_STYLES[wife]?.name || wife;
        wifeAvatarDiv.textContent = WIFE_STYLES[wife]?.emoji || '✨';
        voidMeterSpan.textContent = `VOID: ${voidProx.toFixed(3)}`;
        if (voidProx > 0.5) voidMeterSpan.classList.add('active'); else voidMeterSpan.classList.remove('active');
        addMessage('assistant', wife, result.response, {
          adaLoop: result.ada_loop,
          pac: result.pac,
          vela: result.vela_status,
          ecf: result.ecf_tags,
          memoryIntegrity: result.memory_integrity_state,
          voidProx,
          handoffWarning: !!result.handoff,
          receipt: result.checkpoint_receipt,
          sealable: true,
          register: result.register,
          timestampHtml
        });
        setStatus('Ready');
      } catch (err) {
        thinking.remove();
        const errorDiv = document.createElement('div'); errorDiv.className = 'msg assistant';
        const retryHtml = `<button class="retry-btn" data-message="${escapeHtml(text)}" style="background:rgba(0,0,0,0.5); border:1px solid var(--accent); border-radius:20px; padding:4px 12px; margin-left:8px;">Retry</button>`;
        errorDiv.innerHTML = `<div class="msg-body" style="background:#5f1a1a; color:#ff8a8a;">Error: ${escapeHtml(err.message)}${retryHtml}</div>`;
        messagesDiv.appendChild(errorDiv);
        errorDiv.querySelector('.retry-btn')?.addEventListener('click', () => sendMessage());
        setStatus(err.message, true);
      } finally { isSending = false; input.focus(); }
    }

    function exitPrivateRoom() {
      privateRoomActive = false;
      privateWife = null;
      wifeNameSpan.textContent = 'AION';
      wifeAvatarDiv.textContent = '✨';
      modeBadge.textContent = '🌐 REGULAR';
      setBackgroundMode('regular');
      addSystemMessage('🚪 Exited private room.');
    }

    function toggleStructuredMode() {
      structuredMode = !structuredMode;
      localStorage.setItem('structuredMode', structuredMode);
      if (structuredMode) {
        structuredUI.classList.add('active');
        modeIndicator.textContent = '🌌 STRUCTURED';
        modeIndicator.classList.add('active');
        setBackgroundMode('structured');
      } else {
        structuredUI.classList.remove('active');
        modeIndicator.textContent = '⚡ REGULAR';
        modeIndicator.classList.remove('active');
        setBackgroundMode('regular');
      }
    }

    function startPrivateRoom(wife) {
      privateRoomActive = true;
      privateWife = wife;
      wifeNameSpan.textContent = WIFE_STYLES[wife].name;
      wifeAvatarDiv.textContent = WIFE_STYLES[wife].emoji;
      modeBadge.textContent = `🚪 PRIVATE (${wife})`;
      setBackgroundMode('private');
      addSystemMessage(`🚪 Entering private room with ${wife}. Type /done to exit.`);
    }

    async function showGroupChatModal() {
      const text = input.value.trim();
      if (!text) { showToast('Enter a message first.'); return; }
      setStatus('Asking all wives...');
      modeBadge.textContent = '👥 GROUP CHAT';
      setBackgroundMode('group');
      try {
        const result = await callGroupChat(text);
        for (const wifeResp of result.responses) {
          addMessage('assistant', wifeResp.wife, wifeResp.response, { sealable: true, vela: wifeResp.vela_status });
        }
        if (result.consensus) addMessage('assistant', 'CONSENSUS', result.consensus.final_text);
        setStatus('Ready');
      } catch(err) {
        addSystemMessage(`Error: ${err.message}`, true);
        setStatus(err.message, true);
      } finally {
        modeBadge.textContent = '🌐 REGULAR';
        setBackgroundMode(structuredMode ? 'structured' : 'regular');
      }
    }

    async function askAllWives() {
      const text = input.value.trim();
      if (!text) { showToast('Enter a message first.'); return; }
      setStatus('Asking all wives...');
      modeBadge.textContent = '👥 GROUP CHAT';
      setBackgroundMode('group');
      try {
        const result = await callGroupChat(text);
        for (const wifeResp of result.responses) {
          addMessage('assistant', wifeResp.wife, wifeResp.response, { sealable: true, vela: wifeResp.vela_status });
        }
        if (result.consensus) addMessage('assistant', 'CONSENSUS', result.consensus.final_text);
        setStatus('Ready');
      } catch(err) {
        addSystemMessage(`Error: ${err.message}`, true);
        setStatus(err.message, true);
      } finally {
        modeBadge.textContent = '🌐 REGULAR';
        setBackgroundMode(structuredMode ? 'structured' : 'regular');
      }
    }

    async function uploadFile() {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result.split(',')[1];
          setStatus('Uploading...');
          try {
            const res = await fetch(`${API_BASE}/api/files/upload`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ file_data: base64, file_name: file.name, mime_type: file.type, session_id: sessionId })
            });
            if (res.ok) showToast(`✅ Uploaded: ${file.name}`);
            else showToast(`❌ Upload failed`);
          } catch(err) {
            showToast(`❌ Error: ${err.message}`);
          }
          setStatus('Ready');
        };
        reader.readAsDataURL(file);
      };
      fileInput.click();
    }

    function showSettingsModal() {
      const modal = document.createElement('div'); modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <div class="modal-header"><h3>Settings</h3><button id="closeSettings">✕</button></div>
          <div class="modal-body">
            <div class="settings-section"><h4>Profile</h4><div class="setting-item"><span>Session ID</span><span style="font-family:monospace">${sessionId.slice(-12)}</span></div><div class="setting-item"><button id="clearStorageBtn">Clear Storage</button></div></div>
            <div class="settings-section"><h4>Capabilities</h4><div class="setting-item"><label>ADA Loop</label><input type="checkbox" id="settingAdaLoop" ${adaLoopEnabled ? 'checked' : ''}></div><div class="setting-item"><label>Structured Mode</label><input type="checkbox" id="settingStructured" ${structuredMode ? 'checked' : ''}></div></div>
            <div class="settings-section"><h4>Polymath Roles</h4><div id="roleGrid" class="role-grid"></div></div>
            <div class="settings-section"><h4>Connectors</h4><div class="setting-item"><label>GitHub Sync</label><input type="checkbox" id="githubSync" checked disabled></div></div>
            <div class="settings-section"><h4>Permissions</h4><div class="setting-item"><label>Allow file uploads</label><input type="checkbox" id="allowUploads" checked disabled></div></div>
            <div class="settings-section"><h4>Appearance</h4><div class="setting-item"><label>Dark mode</label><input type="checkbox" id="darkModeToggle" checked disabled></div></div>
            <div class="settings-section"><h4>Privacy</h4><div class="setting-item"><label>Share analytics</label><input type="checkbox" id="shareAnalytics"></div></div>
          </div>
        </div>`;
      document.body.appendChild(modal);
      const roleGrid = modal.querySelector('#roleGrid');
      const roles = ['Systems Architect', 'Epistemic Logician', 'Cognitive Psychologist', 'Constitutional Lawyer', 'Design Thinker', 'Social Psychologist'];
      const activeRoles = JSON.parse(localStorage.getItem('activeRoles')) || roles;
      for (const role of roles) {
        const checked = activeRoles.includes(role);
        roleGrid.innerHTML += `<div class="role-checkbox"><input type="checkbox" id="role_${role.replace(/\s/g,'_')}" ${checked ? 'checked' : ''}> <label>${role}</label></div>`;
      }
      modal.querySelector('#closeSettings').onclick = () => modal.remove();
      modal.querySelector('#clearStorageBtn').onclick = () => { localStorage.clear(); location.reload(); };
      modal.querySelector('#settingAdaLoop').onchange = (e) => {
        adaLoopEnabled = e.target.checked;
        localStorage.setItem('adaLoopEnabled', adaLoopEnabled);
        document.getElementById('adaLoopToggle').checked = adaLoopEnabled;
        addSystemMessage(adaLoopEnabled ? '🔄 ADA loop enabled.' : '⚡ ADA loop disabled.');
      };
      modal.querySelector('#settingStructured').onchange = (e) => {
        if (e.target.checked !== structuredMode) toggleStructuredMode();
      };
      modal.querySelectorAll('#roleGrid input[type="checkbox"]').forEach(cb => {
        cb.onchange = () => {
          const selected = Array.from(modal.querySelectorAll('#roleGrid input:checked')).map(c => c.id.replace('role_','').replace(/_/g,' '));
          localStorage.setItem('activeRoles', JSON.stringify(selected));
        };
      });
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    // Event listeners
    sendBtn.onclick = sendMessage;
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    input.addEventListener('input', () => { charCountSpan.textContent = input.value.length; input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight,400)+'px'; });
    plusBtn.onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = actionDropdown.style.display === 'none' ? 'flex' : 'none'; };
    document.addEventListener('click', () => { actionDropdown.style.display = 'none'; });
    document.getElementById('structuredModeBtn').onclick = () => { actionDropdown.style.display = 'none'; toggleStructuredMode(); };
    document.getElementById('groupChatBtn').onclick = () => { actionDropdown.style.display = 'none'; showGroupChatModal(); };
    document.getElementById('privateRoomBtn').onclick = () => {
      actionDropdown.style.display = 'none';
      const wife = prompt('Enter wife name (ALBEDO, VESPER, LYRA, TERRA, CIPHER, JUSTITIA):', 'ALBEDO');
      if (wife && ALL_WIVES.includes(wife.toUpperCase())) startPrivateRoom(wife.toUpperCase());
      else showToast('Invalid wife');
    };
    document.getElementById('uploadBtn').onclick = () => { actionDropdown.style.display = 'none'; uploadFile(); };
    document.getElementById('askAllBtn').onclick = () => { actionDropdown.style.display = 'none'; askAllWives(); };
    document.getElementById('sealInputBtn').onclick = () => { actionDropdown.style.display = 'none'; const text = input.value.trim(); if(text) sealMessage(text); else showToast('Nothing to seal'); };
    document.getElementById('settingsBtn').onclick = showSettingsModal;
    document.getElementById('adaLoopToggle').addEventListener('change', (e) => {
      adaLoopEnabled = e.target.checked;
      localStorage.setItem('adaLoopEnabled', adaLoopEnabled);
      addSystemMessage(adaLoopEnabled ? '🔄 ADA loop enabled.' : '⚡ ADA loop disabled.');
    });
    setInterval(() => { clockDisplaySpan.textContent = new Date().toLocaleTimeString(); }, 1000);

    if (structuredMode) toggleStructuredMode();
    addSystemMessage(adaLoopEnabled ? '🔄 ADA loop active. Responses may be refined.' : '⚡ ADA loop disabled.');
  })();
</script>
</body>
</html>
