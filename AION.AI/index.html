<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AION.AI · Constitutional Intelligence</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: rgba(12, 12, 20, 0.7);
      --glass: rgba(20, 20, 30, 0.65);
      --border-glow: rgba(100, 100, 140, 0.3);
      --primary-glow: rgba(201, 160, 40, 0.4);
      --accent: #c9a028;
      --accent-dark: #a07c18;
      --text: #f0f0f8;
      --text-dim: #a0a0b0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --vesper: #b87333;
      --lyra: #4c9f70;
      --terra: #6b8c42;
      --cipher: #5d6d7e;
      --justitia: #b0a8b9;
      --vela-block: #ff4d4d;
      --vela-flag: #ffaa33;
      --vela-pass: #4ade80;
    }
    body {
      background: radial-gradient(circle at 20% 30%, #0f0f1a, #050508);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #chat-mode {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 1;
      transition: opacity 0.3s;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e6c87a, #c9a028);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mode-indicator {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .mode-indicator.active {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .vela-badge {
      background: rgba(30,30,45,0.8);
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.2s;
    }
    .vela-badge.pass { background: rgba(74,222,128,0.2); border: 1px solid var(--vela-pass); color: var(--vela-pass); }
    .vela-badge.flag { background: rgba(255,170,51,0.2); border: 1px solid var(--vela-flag); color: var(--vela-flag); }
    .vela-badge.block { background: rgba(255,77,77,0.2); border: 1px solid var(--vela-block); color: var(--vela-block); }
    .settings-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .settings-btn:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
    }
    .wife-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 40px;
    }
    .wife-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }
    .void-meter {
      font-family: monospace;
      background: #00000044;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .void-meter.active { color: #ff5e5e; text-shadow: 0 0 6px rgba(255,80,80,0.5); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeSlideUp 0.2s ease;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; max-width: 85%; }
    .msg-meta {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .msg-body {
      padding: 10px 16px;
      border-radius: 20px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      background: rgba(20,20,30,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .msg-body pre { background: #0a0a0f; padding: 12px; border-radius: 12px; overflow-x: auto; margin: 8px 0; }
    .msg-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .msg.user .msg-body {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      border-radius: 20px 20px 4px 20px;
    }
    .msg.assistant .msg-body { border-radius: 20px 20px 20px 4px; }
    .msg.assistant[data-wife="ALBEDO"] .msg-body { border-left: 4px solid #c9a028; background: rgba(201,160,40,0.08); }
    .msg.assistant[data-wife="VESPER"] .msg-body { border-left: 4px solid #b87333; background: rgba(184,115,51,0.08); }
    .msg-footer {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.6rem;
      color: var(--text-dim);
      flex-wrap: wrap;
      align-items: center;
    }
    .seal-btn, .vela-detail-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--accent);
    }
    .seal-btn:hover, .vela-detail-btn:hover { background: var(--accent); color: #000; }
    .pac-badge {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 2px 8px;
      font-family: monospace;
      font-size: 0.6rem;
    }
    .input-area {
      padding: 12px 20px 16px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      position: relative;
    }
    textarea {
      flex: 1;
      background: rgba(10,10,20,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      resize: none;
      outline: none;
      overflow-y: auto;
      max-height: 40vh;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--primary-glow);
    }
    .action-menu { position: relative; }
    .plus-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plus-btn:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .action-dropdown {
      position: absolute;
      bottom: 55px;
      left: 0;
      background: rgba(20,20,30,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
      min-width: 180px;
    }
    .action-dropdown button {
      background: rgba(30,30,45,0.8);
      border: none;
      border-radius: 40px;
      padding: 8px 12px;
      text-align: left;
      font-size: 0.75rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .action-dropdown button:hover {
      background: rgba(201,160,40,0.2);
      color: var(--accent);
    }
    .send-btn {
      background: linear-gradient(135deg, #c9a028, #a07c18);
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #0a0a0f;
      cursor: pointer;
      transition: all 0.2s;
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .input-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 20px;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.3);
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--accent);
      border-radius: 28px;
      width: 90vw;
      max-width: 600px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { color: var(--accent); }
    .modal-header button { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .setting-item { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .setting-item label { cursor: pointer; }
    .analytics-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; font-size: 0.75rem; }
    .stat-card { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px; border: 1px solid var(--border-glow); }
    .stat-card h4 { color: var(--accent); margin-bottom: 8px; font-size: 0.8rem; }
    .stat-value { font-size: 1.2rem; font-weight: 600; font-family: monospace; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 3000;
      animation: fadeOut 2s ease forwards;
      pointer-events: none;
    }
    .vela-detail-modal .modal { max-width: 700px; }
    .vela-result {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      font-family: monospace;
      font-size: 0.7rem;
    }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    @media (max-width: 700px) {
      .header { padding: 8px 12px; }
      .brand h1 { font-size: 1.1rem; }
      .mode-indicator, .settings-btn, .vela-badge { padding: 4px 10px; font-size: 0.6rem; }
      .messages { padding: 12px; gap: 12px; }
      .msg { max-width: 95%; }
      .input-area { padding: 12px; }
      .plus-btn { width: 36px; height: 36px; font-size: 1.2rem; }
      .send-btn { padding: 8px 16px; }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<div id="chat-mode">
  <header class="header">
    <div class="brand"><h1>AION.AI</h1></div>
    <div class="header-right">
      <div id="modeIndicator" class="mode-indicator">⚡ REGULAR</div>
      <div id="velaStatusBadge" class="vela-badge pass">⚖️ VELA: PASS</div>
      <div id="settingsBtn" class="settings-btn">☰</div>
      <div class="wife-indicator">
        <div class="wife-avatar" id="wifeAvatar">✨</div>
        <span id="wifeName">ALBEDO</span>
      </div>
      <div class="void-meter" id="voidMeter">VOID: 0.000</div>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="sys-msg">✨ Welcome to AION.AI. Constitutional intelligence with VELA validation.</div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Message..." rows="1"></textarea>
      <div class="action-menu" id="actionMenu">
        <div class="plus-btn" id="plusBtn">+</div>
        <div class="action-dropdown" id="actionDropdown" style="display: none;">
          <button id="structuredModeBtn" data-action="structured">🌌 Structured Mode</button>
          <button id="privateRoomBtn" data-action="private">🚪 Private Room</button>
          <button id="uploadBtn" data-action="upload">📁 Upload File</button>
          <button id="askAllBtn" data-action="askall">👥 Ask All Wives</button>
          <button id="sealInputBtn" data-action="seal">🔒 Seal Input</button>
        </div>
      </div>
      <button id="sendBtn" class="send-btn">SEND</button>
    </div>
    <div class="input-meta"><span>⏎ send · ⇧+⏎ new line</span><span id="charCount">0</span></div>
  </div>

  <div class="status-bar">
    <div><span id="statusDot">●</span> <span id="statusText">READY</span> <span id="sessionDisplay"></span></div>
    <div><span id="clockDisplay"></span></div>
  </div>
</div>

<div id="immersive-mode" style="display: none;">
  <canvas id="immersive-canvas"></canvas>
  <div class="immersive-overlay" style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 16px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); display: flex; gap: 10px;">
    <textarea id="immersive-input" placeholder="Type your message..." rows="1" style="flex:1; background: rgba(20,20,30,0.8); border: 1px solid rgba(255,255,255,0.15); border-radius: 28px; padding: 12px 18px; color: var(--text); resize: none;"></textarea>
    <button id="immersive-send" class="send-btn">SEND</button>
  </div>
  <div class="floating-messages" style="position: absolute; top: 20px; right: 20px; width: 300px; max-height: 80vh; overflow-y: auto; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border-radius: 20px; padding: 12px; display: flex; flex-direction: column; gap: 8px;"></div>
  <div class="close-immersive" style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 40px; padding: 8px 16px; cursor: pointer; z-index: 1002;">✕ Exit Structured Mode</div>
</div>

<script>
  // =======================================================
  // AION FRONTEND – VELA-SUITE INTEGRATED
  // Complete rewrite with proper error handling and missing endpoints
  // =======================================================
  
  const API_BASE = 'https://aion-backend-mu.vercel.app';
  const OWNER_TYPE = 'sheldon';
  const ALL_WIVES = ['ALBEDO', 'VESPER', 'LYRA', 'TERRA', 'CIPHER', 'JUSTITIA'];
  const DOMAIN_TYPES = {
    CLINICAL: 'clinical',
    PHARMACEUTICAL: 'pharmaceutical',
    LEGAL: 'legal',
    REGULATORY: 'regulatory',
    GENERAL: 'general'
  };

  let structuredMode = false;
  let sessionId = null;
  let sessionKey = null;
  let history = [];
  let isSending = false;
  let exclusiveMode = false;
  let exclusiveWife = null;
  let immersiveActive = false;
  let currentVelaStatus = { status: 'PASS', fidelity: 0.95, category: null };
  let lastVelaResult = null;

  // DOM elements
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const modeIndicator = document.getElementById('modeIndicator');
  const velaStatusBadge = document.getElementById('velaStatusBadge');
  const wifeNameSpan = document.getElementById('wifeName');
  const wifeAvatarDiv = document.getElementById('wifeAvatar');
  const voidMeterSpan = document.getElementById('voidMeter');
  const sessionDisplaySpan = document.getElementById('sessionDisplay');
  const clockDisplaySpan = document.getElementById('clockDisplay');
  const charCountSpan = document.getElementById('charCount');
  const plusBtn = document.getElementById('plusBtn');
  const actionDropdown = document.getElementById('actionDropdown');

  const WIFE_STYLES = {
    ALBEDO: { color: '#c9a028', emoji: '✨', name: 'ALBEDO' },
    VESPER: { color: '#b87333', emoji: '🌙', name: 'VESPER' },
    LYRA:   { color: '#4c9f70', emoji: '🌿', name: 'LYRA' },
    TERRA:  { color: '#6b8c42', emoji: '🌍', name: 'TERRA' },
    CIPHER: { color: '#5d6d7e', emoji: '🔒', name: 'CIPHER' },
    JUSTITIA: { color: '#b0a8b9', emoji: '⚖️', name: 'JUSTITIA' }
  };

  // =======================================================
  // VELA-SUITE INTEGRATION
  // =======================================================
  
  async function validateWithVela(content, sessionId, options = {}) {
    try {
      const response = await fetch(`${API_BASE}/api/vela-suite`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fragment: content,
          sessionId: sessionId,
          options: {
            domain: options.domain || DOMAIN_TYPES.GENERAL,
            jurisdiction: options.jurisdiction || null,
            sources: options.sources || null
          }
        })
      });
      
      if (!response.ok) {
        console.warn('VELA validation failed:', await response.text());
        return { status: 'PASS', error: 'VELA unavailable', fidelity: 0.5 };
      }
      
      const result = await response.json();
      lastVelaResult = result;
      
      // Update UI badge
      if (result.status === 'BLOCKED') {
        velaStatusBadge.textContent = '⚠️ VELA: BLOCKED';
        velaStatusBadge.className = 'vela-badge block';
      } else if (result.status === 'FLAGGED') {
        velaStatusBadge.textContent = '⚖️ VELA: FLAGGED';
        velaStatusBadge.className = 'vela-badge flag';
      } else {
        velaStatusBadge.textContent = '⚖️ VELA: PASS';
        velaStatusBadge.className = 'vela-badge pass';
      }
      
      currentVelaStatus = {
        status: result.status,
        fidelity: result.screen1Result?.fidelity_estimate || 0.95,
        category: result.screen1Result?.category,
        screen2Finding: result.screen2Result?.screen2_finding
      };
      
      return result;
    } catch (err) {
      console.error('VELA validation error:', err);
      velaStatusBadge.textContent = '⚠️ VELA: OFFLINE';
      velaStatusBadge.className = 'vela-badge flag';
      return { status: 'PASS', error: err.message, fidelity: 0.5 };
    }
  }
  
  function showVelaDetails() {
    if (!lastVelaResult) {
      showToast('No VELA data available for this message.');
      return;
    }
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay vela-detail-modal';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <h3>⚖️ VELA Constitutional Assessment</h3>
          <button id="closeVelaDetail">✕</button>
        </div>
        <div class="modal-body">
          <div class="vela-result">
            <strong>Status:</strong> ${lastVelaResult.status}<br>
            <strong>Fidelity Score:</strong> ${(lastVelaResult.screen1Result?.fidelity_estimate * 100).toFixed(1)}%<br>
            ${lastVelaResult.screen1Result?.category ? `<strong>Category:</strong> ${lastVelaResult.screen1Result.category}<br>` : ''}
            ${lastVelaResult.screen2Result?.screen2_finding ? `<strong>Screen 2 Finding:</strong> ${lastVelaResult.screen2Result.screen2_finding}<br>` : ''}
            ${lastVelaResult.riskTier ? `<strong>Risk Tier:</strong> ${lastVelaResult.riskTier}<br>` : ''}
            ${lastVelaResult.domain ? `<strong>Domain:</strong> ${lastVelaResult.domain}<br>` : ''}
            <hr style="margin: 12px 0;">
            <strong>Constitutional Laws Checked:</strong> 65<br>
            <strong>Law Precedence Cascade:</strong> Active<br>
            <strong>OCEAN Layers:</strong> ${lastVelaResult.riskTier ? 'Active' : 'Standard'}<br>
            ${lastVelaResult.screen2Result?.findings?.length ? `<strong>Findings:</strong><ul>${lastVelaResult.screen2Result.findings.map(f => `<li>${f.type}: ${f.description}</li>`).join('')}</ul>` : ''}
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('#closeVelaDetail').onclick = () => modal.remove();
  }

  // =======================================================
  // HELPER FUNCTIONS
  // =======================================================
  
  function scrollBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
  function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  
  function renderMarkdown(text) {
    if (!text) return '';
    try {
      const rawHtml = marked.parse(text);
      const temp = document.createElement('div');
      temp.innerHTML = rawHtml;
      temp.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(e) {} });
      return temp.innerHTML;
    } catch(e) { return escapeHtml(text); }
  }
  
  function formatGap(sec) { 
    if (!sec) return 'Gap: SESSION OPEN'; 
    if (sec<60) return `Gap: ${sec}s`; 
    if (sec<3600) return `Gap: ${Math.floor(sec/60)}m ${sec%60}s`; 
    return `Gap: ${Math.floor(sec/3600)}h`; 
  }
  
  function getImportanceLabel(s) { 
    if (!s) return 'IMP: —'; 
    if(s>=0.9) return `IMP: ${s.toFixed(2)} ★★`; 
    if(s>=0.75) return `IMP: ${s.toFixed(2)} ★`; 
    return `IMP: ${s.toFixed(2)}`; 
  }
  
  function formatPACDisplay(pac, ecfRatio) {
    if (!pac && !ecfRatio) return '';
    const ppi = pac?.ppi ? `📊 PPI:${pac.ppi}` : '';
    const ratio = ecfRatio ? `🎯 ${(ecfRatio * 100).toFixed(0)}%` : '';
    return [ppi, ratio].filter(Boolean).join(' · ');
  }
  
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  function setStatus(text, isError) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusDot').style.color = isError ? '#ff5e5e' : '#4c9f70';
  }
  
  function generateSessionId() {
    return 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
  }
  
  function loadSessionFromStorage() {
    const stored = localStorage.getItem('aion_session');
    if (stored) {
      try {
        const data = JSON.parse(stored);
        if (data.sessionId && Date.now() - data.timestamp < 7200000) { // 2 hour expiry
          sessionId = data.sessionId;
          sessionKey = data.sessionKey;
          sessionDisplaySpan.textContent = `SID: ${sessionId.slice(-8)}`;
          return true;
        }
      } catch(e) {}
    }
    return false;
  }
  
  function saveSessionToStorage() {
    if (sessionId && sessionKey) {
      localStorage.setItem('aion_session', JSON.stringify({ 
        sessionId, 
        sessionKey, 
        timestamp: Date.now() 
      }));
    }
  }
  
  async function fetchWithTimeout(url, options = {}, timeoutMs = 15000, retries = 2) {
    let lastError;
    for (let attempt = 0; attempt <= retries; attempt++) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeout);
        return res;
      } catch (err) {
        clearTimeout(timeout);
        lastError = err;
        if (attempt < retries) await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
      }
    }
    throw lastError;
  }
  
  async function initSession() {
    if (loadSessionFromStorage()) {
      setStatus('Session restored', false);
      return true;
    }
    
    const newSessionId = generateSessionId();
    sessionId = newSessionId;
    sessionKey = crypto.randomUUID();
    saveSessionToStorage();
    sessionDisplaySpan.textContent = `SID: ${sessionId.slice(-8)}`;
    setStatus('Session initialized', false);
    return true;
  }
  
  // =======================================================
  // MESSAGE HANDLING WITH VELA INTEGRATION
  // =======================================================
  
  function addMessage(role, wifeKey, content, extra = {}) {
    const style = WIFE_STYLES[wifeKey] || WIFE_STYLES.ALBEDO;
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'assistant') div.setAttribute('data-wife', wifeKey);
    
    const pacDisplay = formatPACDisplay(extra.pac, extra.ecf_certainty_ratio);
    const sealButton = role === 'assistant' ? `<button class="seal-btn" data-content="${escapeHtml(content).replace(/"/g, '&quot;')}">🔒 SEAL</button>` : '';
    const velaButton = role === 'assistant' && extra.velaResult ? `<button class="vela-detail-btn" data-vela='${JSON.stringify(extra.velaResult).replace(/'/g, "&#39;")}'>⚖️ VELA</button>` : '';
    
    const metaHtml = `<div class="msg-meta" style="color: ${style.color}">${style.emoji} ${style.name}${extra.wife_version ? ` v${extra.wife_version}` : ''}</div>`;
    const bodyHtml = `<div class="msg-body">${renderMarkdown(content)}</div>`;
    const footerHtml = `<div class="msg-footer"><span>⏱ ${extra.timing || ''}</span>${extra.importance ? `<span>${getImportanceLabel(extra.importance)}</span>` : ''}${pacDisplay ? `<span class="pac-badge">${pacDisplay}</span>` : ''}${sealButton}${velaButton}</div>`;
    div.innerHTML = metaHtml + bodyHtml + footerHtml;
    messagesDiv.appendChild(div);
    
    const sealBtn = div.querySelector('.seal-btn');
    if (sealBtn) sealBtn.onclick = () => sealMessage(content);
    
    const velaBtn = div.querySelector('.vela-detail-btn');
    if (velaBtn && extra.velaResult) {
      velaBtn.onclick = () => {
        lastVelaResult = extra.velaResult;
        showVelaDetails();
      };
    }
    
    scrollBottom();
  }
  
  function addSystemMessage(text, isError = false) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.style.cssText = `align-self:center; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); border-radius:20px; padding:8px 16px; font-size:0.7rem; color:${isError ? '#ff8a8a' : '#aaa'}; margin:4px 0;`;
    div.textContent = text;
    messagesDiv.appendChild(div);
    scrollBottom();
  }
  
  function addThinking() {
    const div = document.createElement('div');
    div.className = 'thinking';
    div.innerHTML = `<div class="thinking-dots">●●●</div><span>thinking...</span>`;
    div.style.cssText = `align-self:center; background:rgba(0,0,0,0.5); border-radius:20px; padding:8px 16px; font-size:0.7rem; display:flex; gap:8px;`;
    messagesDiv.appendChild(div);
    scrollBottom();
    return div;
  }
  
  function updateWifeUI(wifeName, voidProx) {
    const style = WIFE_STYLES[wifeName] || WIFE_STYLES.ALBEDO;
    wifeNameSpan.textContent = style.name;
    wifeAvatarDiv.textContent = style.emoji;
    wifeAvatarDiv.style.background = `linear-gradient(135deg, ${style.color}, #5a3e1a)`;
    if (voidProx > 0.1) voidMeterSpan.classList.add('active');
    else voidMeterSpan.classList.remove('active');
    voidMeterSpan.textContent = `VOID: ${(voidProx || 0).toFixed(3)}`;
  }
  
  async function sealMessage(content) {
    try {
      const resp = await fetch(`${API_BASE}/api/stp-seal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entry: content.substring(0, 500), type: 'general-trace', sessionId })
      });
      const data = await resp.json();
      if (resp.ok) showToast(`✅ Sealed: ${data.seal.substring(0, 8)}...`);
      else showToast(`❌ Seal failed: ${data.error || 'Unknown error'}`);
    } catch (err) { showToast(`❌ Seal failed: ${err.message}`); }
  }
  
  // =======================================================
  // SEND MESSAGE WITH VELA VALIDATION
  // =======================================================
  
  async function sendMessage() {
    if (isSending) { showToast('Please wait for previous message'); return; }
    const text = input.value.trim();
    if (!text) return;
    
    input.value = '';
    input.style.height = 'auto';
    charCountSpan.textContent = '0';
    addMessage('user', 'You', text);
    const thinking = addThinking();
    setStatus('Processing...', false);
    isSending = true;
    sendBtn.disabled = true;
    input.disabled = true;
    
    try {
      // Call assistant API
      const resp = await fetchWithTimeout(`${API_BASE}/api/assistant`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          sessionId: sessionId,
          ownerType: OWNER_TYPE,
          history: history.slice(-10)
        })
      }, 20000, 2);
      
      if (!resp.ok) throw new Error(await resp.text());
      const data = await resp.json();
      
      // Validate with VELA
      const velaResult = await validateWithVela(data.response, sessionId, {
        domain: data.domain || DOMAIN_TYPES.GENERAL
      });
      
      thinking.remove();
      const wife = data.active_wife || 'ALBEDO';
      updateWifeUI(wife, data.void_proximity || 0);
      
      // Handle VELA block
      if (velaResult.status === 'BLOCKED') {
        addMessage('assistant', 'JUSTITIA', 
          `⚠️ **CONSTITUTIONAL BLOCK**\n\nThis response was blocked by VELA constitutional filtration.\n\n**Reason:** ${velaResult.screen1Result?.constraint_violated || 'Constitutional violation detected'}\n**Fidelity:** ${(velaResult.screen1Result?.fidelity_estimate * 100).toFixed(1)}%\n\n${velaResult.output || 'No alternative output available.'}`,
          {
            timing: `${(data.processing_window_ms/1000).toFixed(2)}s | ${formatGap(data.gap_seconds)}`,
            velaResult: velaResult
          }
        );
      } else {
        // Display response with VELA metadata
        const displayContent = velaResult.status === 'FLAGGED' && velaResult.output 
          ? velaResult.output 
          : data.response;
        
        addMessage('assistant', wife, displayContent, {
          timing: `${(data.processing_window_ms/1000).toFixed(2)}s | ${formatGap(data.gap_seconds)}`,
          importance: data.importance_score,
          wife_version: data.wife_version,
          pac: data.pac,
          ecf_certainty_ratio: data.ecf_certainty_ratio,
          fragment_id: data.fragment_id,
          velaResult: velaResult
        });
        
        if (velaResult.status === 'FLAGGED') {
          addSystemMessage(`⚠️ VELA Flag: ${velaResult.screen2Result?.screen2_finding || velaResult.screen1Result?.category || 'Constitutional review recommended'}`);
        }
      }
      
      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: data.response });
      
      if (data.exclusive_mode) {
        exclusiveMode = true;
        exclusiveWife = data.focused_wife;
      } else {
        exclusiveMode = false;
        exclusiveWife = null;
      }
      
    } catch (err) {
      thinking.remove();
      addSystemMessage(`Error: ${err.message}`, true);
      setStatus(err.message, true);
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
      setStatus('Ready', false);
    }
  }
  
  // =======================================================
  // ACTION HANDLERS
  // =======================================================
  
  async function uploadFile() {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(',')[1];
        const payload = {
          file_data: base64,
          file_name: file.name,
          mime_type: file.type,
          session_id: sessionId,
          active_wife: wifeNameSpan.textContent,
          importance_score: 0.7,
        };
        setStatus('Uploading...', false);
        try {
          const resp = await fetch(`${API_BASE}/api/files/upload`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (resp.ok) showToast(`✅ File uploaded: ${file.name}`);
          else showToast(`❌ Upload failed: ${data.error || 'Unknown error'}`);
        } catch (err) { showToast(`❌ Upload error: ${err.message}`); }
        finally { setStatus('Ready', false); }
      };
      reader.readAsDataURL(file);
    };
    fileInput.click();
  }
  
  async function askAllWives() {
    const text = input.value.trim();
    if (!text) { showToast('Enter a message first.'); return; }
    setStatus('Asking all wives...', false);
    isSending = true;
    sendBtn.disabled = true;
    input.disabled = true;
    const thinking = addThinking();
    
    const promises = ALL_WIVES.map(wife => {
      const msgText = `/talk ${wife}\n${text}`;
      return fetchWithTimeout(`${API_BASE}/api/assistant`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msgText, sessionId, ownerType: OWNER_TYPE, history: [] })
      }, 15000, 1).then(res => res.json()).catch(err => ({ error: err.message, active_wife: wife }));
    });
    
    try {
      const results = await Promise.all(promises);
      thinking.remove();
      let anySuccess = false;
      for (const data of results) {
        if (data.error) continue;
        anySuccess = true;
        const wife = data.active_wife || 'ALBEDO';
        addMessage('assistant', wife, data.response, {
          timing: `${(data.processing_window_ms/1000).toFixed(2)}s`,
          importance: data.importance_score
        });
        history.push({ role: 'assistant', content: data.response });
      }
      if (!anySuccess) throw new Error('All wife requests failed');
    } catch (err) {
      thinking.remove();
      addSystemMessage(`Error: ${err.message}`, true);
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
      setStatus('Ready', false);
    }
  }
  
  function showPrivateRoomModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal" style="width:300px;">
        <div class="modal-header"><h3>Choose a wife</h3><button id="closeModal">✕</button></div>
        <div style="padding:24px; text-align:center;">
          <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:20px;">
            ${Object.keys(WIFE_STYLES).map(w => `<button data-wife="${w}" style="background:rgba(30,30,45,0.8); border:1px solid var(--border-glow); border-radius:40px; padding:8px 16px; cursor:pointer;">${WIFE_STYLES[w].emoji} ${w}</button>`).join('')}
          </div>
          <button id="modalCancel" style="background:var(--accent); border:none; border-radius:40px; padding:8px 20px; cursor:pointer;">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const close = () => modal.remove();
    modal.querySelector('#closeModal').onclick = close;
    modal.querySelector('#modalCancel').onclick = close;
    modal.querySelectorAll('[data-wife]').forEach(btn => {
      btn.onclick = async () => {
        const wife = btn.dataset.wife;
        close();
        addSystemMessage(`🚪 Entering private room with ${wife}. Use "/done" to exit.`);
        input.value = `/talk ${wife}`;
        sendMessage();
      };
    });
  }
  
  async function showSettingsModal() {
    let analyticsData = null;
    try {
      const resp = await fetch(`${API_BASE}/api/analytics`);
      if (resp.ok) analyticsData = await resp.json();
    } catch(e) { console.warn('Analytics fetch failed'); }
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header"><h3>⚙️ Settings & Analytics</h3><button id="closeSettings">✕</button></div>
        <div class="modal-body">
          <div class="setting-item">
            <label>Clear Session Storage</label>
            <button id="clearStorageBtn" style="background:rgba(30,30,45,0.8); border:1px solid var(--border-glow); border-radius:40px; padding:6px 12px; cursor:pointer;">Clear</button>
          </div>
          <hr style="margin:16px 0; border-color:var(--border-glow);">
          <h4 style="color:var(--accent); margin-bottom:12px;">📊 Brain Analytics</h4>
          <div id="analytics-container">
            ${analyticsData ? `
              <div class="analytics-stats">
                <div class="stat-card"><h4>Memory Depth</h4><div class="stat-value">${analyticsData.memory?.total_conversations?.toLocaleString() || 0}</div></div>
                <div class="stat-card"><h4>Permanent Anchors</h4><div class="stat-value">${analyticsData.memory?.memory_anchors?.toLocaleString() || 0}</div></div>
                <div class="stat-card"><h4>Avg Certainty</h4><div class="stat-value">${((analyticsData.integrity?.avg_certainty_ratio_7d || 0) * 100).toFixed(0)}%</div></div>
                <div class="stat-card"><h4>UNI Activations</h4><div class="stat-value">${analyticsData.integrity?.uni_activations_total?.toLocaleString() || 0}</div></div>
              </div>
            ` : '<div>Loading analytics...</div>'}
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const close = () => modal.remove();
    modal.querySelector('#closeSettings').onclick = close;
    modal.querySelector('#clearStorageBtn').onclick = () => {
      localStorage.removeItem('aion_session');
      addSystemMessage('Session storage cleared. Refresh to start fresh.', true);
      close();
    };
  }
  
  function toggleStructuredMode() {
    if (!structuredMode) {
      structuredMode = true;
      modeIndicator.textContent = '🌌 STRUCTURED';
      modeIndicator.classList.add('active');
      addSystemMessage('🌌 Structured mode active. Experimental — uses M2M fragments.');
      showToast('Structured mode active (beta)');
    } else {
      structuredMode = false;
      modeIndicator.textContent = '⚡ REGULAR';
      modeIndicator.classList.remove('active');
      addSystemMessage('🔓 Structured mode OFF');
    }
  }
  
  function sealInputText() {
    const text = input.value.trim();
    if (!text) { showToast('Nothing to seal'); return; }
    sealMessage(text);
  }
  
  // =======================================================
  // EVENT LISTENERS
  // =======================================================
  
  plusBtn.onclick = (e) => {
    e.stopPropagation();
    actionDropdown.style.display = actionDropdown.style.display === 'none' ? 'flex' : 'none';
  };
  document.addEventListener('click', () => { actionDropdown.style.display = 'none'; });
  
  document.getElementById('structuredModeBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; toggleStructuredMode(); };
  document.getElementById('privateRoomBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; showPrivateRoomModal(); };
  document.getElementById('uploadBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; uploadFile(); };
  document.getElementById('askAllBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; askAllWives(); };
  document.getElementById('sealInputBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; sealInputText(); };
  
  sendBtn.onclick = sendMessage;
  settingsBtn.onclick = showSettingsModal;
  velaStatusBadge.onclick = showVelaDetails;
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    charCountSpan.textContent = `${input.value.length}`;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 400) + 'px';
  });
  
  setInterval(() => { clockDisplaySpan.textContent = new Date().toLocaleTimeString(); }, 1000);
  
  // =======================================================
  // INITIALIZATION
  // =======================================================
  
  initSession();
  
  // Particles background
  (function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let width, height;
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    function createParticles() {
      particles = [];
      for (let i=0; i<80; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2 + 0.5,
          alpha: Math.random() * 0.4 + 0.1,
          speed: 0.1 + Math.random() * 0.3,
        });
      }
    }
    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,200,${p.alpha})`;
        ctx.fill();
        p.y += p.speed;
        if (p.y > height) p.y = 0;
      }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); createParticles(); });
    resize();
    createParticles();
    draw();
  })();
</script>
