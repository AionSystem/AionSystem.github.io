<!DOCTYPE html>
<html>
<head>
    <title>AION</title>
</head>
<body>
    <div id="chat" style="height:300px; overflow:auto; border:1px solid #ccc; margin-bottom:10px; padding:10px;"></div>
    <input type="text" id="input" style="width:70%; padding:8px;">
    <button onclick="send()" style="padding:8px 16px;">Send</button>

    <script>
        const API = 'https://aion-backend-mu.vercel.app';
        
        // Get or create session ID
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('sessionId', sessionId);
        }
        
        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('input');
        
        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.style.margin = '8px 0';
            msgDiv.style.padding = '8px';
            msgDiv.style.borderRadius = '8px';
            if (role === 'user') {
                msgDiv.style.backgroundColor = '#e3f2fd';
                msgDiv.style.textAlign = 'right';
                msgDiv.innerHTML = '<strong>You:</strong> ' + text;
            } else {
                msgDiv.style.backgroundColor = '#f5f5f5';
                msgDiv.style.textAlign = 'left';
                msgDiv.innerHTML = '<strong>AI:</strong> ' + text;
            }
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        async function send() {
            const message = inputField.value.trim();
            if (message === '') return;
            
            addMessage('user', message);
            inputField.value = '';
            inputField.disabled = true;
            
            const thinkingMsg = document.createElement('div');
            thinkingMsg.style.margin = '8px 0';
            thinkingMsg.style.padding = '8px';
            thinkingMsg.style.backgroundColor = '#f5f5f5';
            thinkingMsg.innerHTML = '<strong>AI:</strong> ...';
            chatDiv.appendChild(thinkingMsg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const response = await fetch(`${API}/api/assistant`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: sessionId,
                        ownerType: 'sheldon',
                        history: []
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.response) {
                    thinkingMsg.innerHTML = '<strong>AI:</strong> ' + data.response;
                } else {
                    thinkingMsg.innerHTML = '<strong>AI:</strong> Error: ' + (data.error || 'Unknown error');
                }
            } catch (error) {
                thinkingMsg.innerHTML = '<strong>AI:</strong> Connection error: ' + error.message;
            }
            
            inputField.disabled = false;
            inputField.focus();
        }
        
        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                send();
            }
        });
        
        addMessage('ai', 'Connected. Type your message and press Enter.');
    </script>
</body>
</html>
