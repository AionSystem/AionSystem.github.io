<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AION · Ada‑VELA</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #0a0a0f;
            color: #f0f0f8;
        }
        #chat {
            height: 500px;
            overflow: auto;
            border: 1px solid #2a2a3a;
            margin: 10px 0;
            padding: 10px;
            background: #0f0f14;
            border-radius: 8px;
        }
        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
        }
        .user {
            background: #1e3a5f;
            text-align: right;
        }
        .ai {
            background: #1e1e2d;
        }
        .system {
            background: #2a2a3a;
            text-align: center;
            font-size: 12px;
            color: #c9a028;
        }
        .seal-btn {
            background: none;
            border: 1px solid #c9a028;
            color: #c9a028;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
        }
        .vela-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .vela-pass { background: #1e4620; color: #4ade80; }
        .vela-flag { background: #5f3a1a; color: #ffaa33; }
        .vela-block { background: #5f1a1a; color: #ff4d4d; }
        .checkpoint-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            background: #2a2a3a;
            margin-left: 8px;
        }
        input, button {
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            border: none;
        }
        input {
            flex: 1;
            background: #1e1e2d;
            color: white;
            border: 1px solid #2a2a3a;
        }
        button {
            background: #c9a028;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            position: relative;
        }
        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            padding: 8px;
            border-top: 1px solid #2a2a3a;
            flex-wrap: wrap;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .small-btn {
            background: #2a2a3a;
            color: #c9a028;
            padding: 6px 12px;
            font-size: 12px;
        }
        .mode-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: #2a2a3a;
        }
        .mode-indicator.structured {
            background: #c9a028;
            color: #0a0a0f;
        }
        .dropdown {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: #1e1e2d;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
            min-width: 150px;
        }
        .dropdown button {
            background: #2a2a3a;
            color: white;
            padding: 8px 12px;
            text-align: left;
            width: 100%;
        }
        .plus-btn {
            background: #2a2a3a;
            color: #c9a028;
            font-size: 20px;
            font-weight: bold;
            width: 44px;
        }
        .structured-input-area {
            margin-top: 10px;
            padding: 12px;
            background: #141920;
            border-radius: 12px;
            display: none;
        }
        .structured-input-area.active {
            display: block;
        }
        .itl-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .field-group label {
            font-size: 10px;
            color: #c9a028;
        }
        .field-group select, .field-group input {
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            padding: 6px;
            font-size: 11px;
        }
        .checkpoint-display {
            font-size: 11px;
            padding: 8px;
            background: #0f0f14;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h2>AION · Ada‑VELA</h2>
    
    <div id="chat"></div>
    
    <div class="input-row">
        <input type="text" id="input" placeholder="Type your message..." autofocus>
        <div class="action-menu" style="position: relative;">
            <button id="plusBtn" class="plus-btn">+</button>
            <div id="dropdown" class="dropdown">
                <button id="structuredModeBtn">🌌 Structured Mode</button>
                <button id="sealInputBtn">🔒 Seal Input</button>
                <button id="validateBtn">⚖️ Validate Last</button>
                <button id="traceBtn">📜 Show Trace</button>
            </div>
        </div>
        <button id="sendBtn">SEND</button>
    </div>
    
    <!-- Structured Mode Input Area (GATE-ITL Form) -->
    <div id="structuredInputArea" class="structured-input-area">
        <div class="itl-fields">
            <div class="field-group">
                <label>INTENT</label>
                <select id="itlIntent">
                    <option value="ask">ask</option>
                    <option value="share">share</option>
                    <option value="request_action">request_action</option>
                    <option value="emotional">emotional</option>
                    <option value="clarify">clarify</option>
                </select>
            </div>
            <div class="field-group">
                <label>DOMAIN</label>
                <select id="itlDomain">
                    <option value="emergence">emergence</option>
                    <option value="integrity">integrity</option>
                    <option value="healing">healing</option>
                    <option value="security">security</option>
                    <option value="law">law</option>
                    <option value="general">general</option>
                </select>
            </div>
            <div class="field-group">
                <label>EMOTION</label>
                <select id="itlEmotion">
                    <option value="neutral">neutral</option>
                    <option value="curious">curious</option>
                    <option value="anxious">anxious</option>
                    <option value="focused">focused</option>
                </select>
            </div>
            <div class="field-group">
                <label>TIME</label>
                <select id="itlTime">
                    <option value="now">now</option>
                    <option value="today">today</option>
                    <option value="future">future</option>
                </select>
            </div>
        </div>
        <div id="checkpointDisplay" class="checkpoint-display"></div>
        <div class="input-row" style="margin-top: 8px;">
            <input type="text" id="structuredInput" placeholder="Your structured message...">
            <button id="structuredSendBtn">SEND</button>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="sessionDisplay"></span>
        <span id="modeBadge" class="mode-indicator">⚡ REGULAR</span>
        <span id="velaDisplay" class="vela-badge vela-pass">⚖️ READY</span>
        <span id="lastSeal"></span>
    </div>

    <script>
        // ============================================================
        // ADA‑VELA + STP SEAL + VELA VALIDATION + STRUCTURED MODE
        // ============================================================
        
        const API = 'https://aion-backend-mu.vercel.app';
        
        // ========== Ada‑VELA Core ==========
        function tripleTimestamp() {
            const now = new Date();
            return {
                gregorian: now.toISOString(),
                unix: Math.floor(now.getTime() / 1000)
            };
        }
        
        class AdaVariable {
            constructor(name, initialValue) {
                this.name = name;
                this.value = initialValue;
                this.history = [{ timestamp: tripleTimestamp(), value: initialValue, op: 'INIT' }];
            }
            get() { return this.value; }
            set(newValue, op = 'SET') {
                this.history.push({ timestamp: tripleTimestamp(), from: this.value, to: newValue, op });
                this.value = newValue;
                return this;
            }
            trace() { return this.history; }
        }
        
        class AdaOperation {
            constructor(name) {
                this.name = name;
                this.executions = [];
                this.fn = null;
            }
            setFunction(fn) { this.fn = fn; return this; }
            async execute(input) {
                const start = tripleTimestamp();
                let result = null, error = null;
                try { result = await this.fn(input); }
                catch (e) { error = e.message; }
                const exec = { id: Date.now() + '_' + Math.random(), name: this.name, start, end: tripleTimestamp(), input, result, error };
                this.executions.push(exec);
                if (error) throw new Error(error);
                return { result, execution: exec };
            }
            getExecutions() { return this.executions; }
        }
        
        // ========== Session ==========
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('sessionId', sessionId);
        }
        
        let sessionVar = new AdaVariable('session', sessionId);
        let chatHistory = new AdaVariable('chatHistory', []);
        let lastResponse = null;
        let lastVelaResult = null;
        let isSending = false;
        let structuredModeActive = false;
        let clarificationDepth = 0;
        let currentCheckpoints = { preCleared: [], open: [] };
        
        // DOM elements
        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const plusBtn = document.getElementById('plusBtn');
        const dropdown = document.getElementById('dropdown');
        const sessionDisplay = document.getElementById('sessionDisplay');
        const velaDisplay = document.getElementById('velaDisplay');
        const modeBadge = document.getElementById('modeBadge');
        const lastSealSpan = document.getElementById('lastSeal');
        const structuredInputArea = document.getElementById('structuredInputArea');
        const structuredInput = document.getElementById('structuredInput');
        const structuredSendBtn = document.getElementById('structuredSendBtn');
        const checkpointDisplay = document.getElementById('checkpointDisplay');
        
        sessionDisplay.textContent = `Session: ${sessionId.slice(-8)}`;
        
        // ========== Ada‑VELA Operations ==========
        const sealOp = new AdaOperation('STP_SEAL');
        sealOp.setFunction(async (content) => {
            const res = await fetch(`${API}/api/stp-seal`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    entry: content.substring(0, 500),
                    type: 'general-trace',
                    sessionId: sessionId
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Seal failed');
            return { seal: data.seal, issueUrl: data.issue_url };
        });
        
        const velaOp = new AdaOperation('VELA_VALIDATE');
        velaOp.setFunction(async (content) => {
            const res = await fetch(`${API}/api/vela-suite`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fragment: content,
                    sessionId: sessionId,
                    options: { domain: 'general' }
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'VELA unavailable');
            return data;
        });
        
        const assistantOp = new AdaOperation('ASSISTANT_CALL');
        assistantOp.setFunction(async (message) => {
            const res = await fetch(`${API}/api/assistant`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    sessionId: sessionId,
                    ownerType: 'sheldon',
                    history: []
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'API error');
            return data;
        });
        
        // ========== GATE-ITL: Build Structured Fragment ==========
        function buildStructuredFragment() {
            const intent = document.getElementById('itlIntent').value;
            const domain = document.getElementById('itlDomain').value;
            const emotion = document.getElementById('itlEmotion').value;
            const timeSensitivity = document.getElementById('itlTime').value;
            const message = structuredInput.value.trim();
            
            if (!message) return null;
            
            // Pre-cleared checkpoints
            const preCleared = [];
            if (intent) preCleared.push('intent');
            if (domain) preCleared.push('domain');
            if (emotion) preCleared.push('emotional_state');
            if (timeSensitivity) preCleared.push('time_sensitivity');
            if (message) preCleared.push('content');
            
            // Open checkpoints
            const open = [];
            if (!intent) open.push('intent_ambiguous');
            if (!domain) open.push('domain_boundary_exceeded');
            if (message.length < 3) open.push('context_missing');
            
            currentCheckpoints = { preCleared, open };
            
            // Update display
            checkpointDisplay.innerHTML = `
                ✅ Pre-cleared: ${preCleared.map(c => `<span style="color:#4ade80">${c}</span>`).join(', ') || 'none'}<br>
                🔓 Still open: ${open.map(c => `<span style="color:#ffaa33">${c}</span>`).join(', ') || 'none'}
            `;
            
            return {
                id: crypto.randomUUID(),
                ts: new Date().toISOString(),
                session_id: sessionId,
                nonce: crypto.randomUUID(),
                source: 'human',
                intent: intent,
                domain: domain,
                emotional_state: { primary: emotion, intensity: 5 },
                content: { summary: message.substring(0, 100), details: message },
                context: { time_sensitivity: timeSensitivity, stage: 4, requires: ['analysis'] },
                checkpoints: { pre_cleared: preCleared, open: open },
                meta: { version: '3.0', schema_ref: 'https://aion.house/schemas/fragment_v3' }
            };
        }
        
        // ========== UI Functions ==========
        function addMessage(role, text, extra = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            let extraHtml = '';
            if (extra.sealHash && role === 'ai') {
                extraHtml += `<button class="seal-btn" data-text="${escapeHtml(text)}">🔒 SEAL</button>`;
            }
            if (extra.velaResult) {
                const v = extra.velaResult;
                const statusClass = v.status === 'BLOCKED' ? 'vela-block' : (v.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                extraHtml += `<span class="vela-badge ${statusClass}">⚖️ VELA: ${v.status}</span>`;
            }
            if (extra.checkpoints) {
                extraHtml += `<span class="checkpoint-badge">📋 ${extra.checkpoints.preCleared.length}/${extra.checkpoints.preCleared.length + extra.checkpoints.open.length} cleared</span>`;
            }
            
            msgDiv.innerHTML = `<strong>${role === 'user' ? 'You' : 'AI'}:</strong> ${escapeHtml(text)}${extraHtml}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            const sealBtn = msgDiv.querySelector('.seal-btn');
            if (sealBtn) sealBtn.onclick = () => sealMessage(text);
            
            chatHistory.set([...chatHistory.get(), { role, text, timestamp: tripleTimestamp() }]);
        }
        
        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.innerHTML = text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: ${isError ? '#5f1a1a' : '#1e4620'}; color: white;
                padding: 8px 16px; border-radius: 20px; font-size: 12px;
                z-index: 1000; animation: fadeOut 2s forwards;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        async function sealMessage(content) {
            try {
                const { result } = await sealOp.execute(content);
                lastSealSpan.textContent = `🔒 Sealed: ${result.seal.slice(0, 8)}...`;
                showToast(`✅ Sealed: ${result.seal.slice(0, 8)}...`);
            } catch (err) {
                showToast(`❌ Seal failed: ${err.message}`, true);
            }
        }
        
        async function validateLastMessage() {
            if (!lastResponse) {
                showToast('No message to validate', true);
                return;
            }
            try {
                const { result } = await velaOp.execute(lastResponse);
                lastVelaResult = result;
                const statusClass = result.status === 'BLOCKED' ? 'vela-block' : (result.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                velaDisplay.className = `vela-badge ${statusClass}`;
                velaDisplay.innerHTML = `⚖️ VELA: ${result.status}`;
                showToast(`VELA: ${result.status} | Fidelity: ${((result.screen1Result?.fidelity_estimate || 0) * 100).toFixed(0)}%`);
            } catch (err) {
                showToast(`Validation failed: ${err.message}`, true);
            }
        }
        
        // ========== Structured Mode Send (GATE-ITL + CEP) ==========
        async function sendStructuredMessage() {
            const fragment = buildStructuredFragment();
            if (!fragment) {
                showToast('Please enter a message', true);
                return;
            }
            
            const messageText = structuredInput.value.trim();
            structuredInput.value = '';
            
            addMessage('user', messageText, { checkpoints: fragment.checkpoints });
            
            // CEP Intercept: if open checkpoints exist and not urgent
            if (fragment.checkpoints.open.length > 0 && fragment.context.time_sensitivity !== 'now') {
                addSystemMessage(`⚠️ **CEP INTERCEPT** – ${fragment.checkpoints.open.length} checkpoint(s) open.\n\nPlease clarify: ${fragment.checkpoints.open.join(', ')}`);
                clarificationDepth++;
                return;
            }
            
            const thinking = document.createElement('div');
            thinking.className = 'message ai';
            thinking.innerHTML = '<strong>AI:</strong> ...';
            chatDiv.appendChild(thinking);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const { result } = await assistantOp.execute(JSON.stringify(fragment));
                
                if (result && result.response) {
                    lastResponse = result.response;
                    thinking.remove();
                    
                    // Auto-validate with VELA
                    const velaResult = await velaOp.execute(result.response);
                    lastVelaResult = velaResult.result;
                    
                    const v = velaResult.result;
                    const statusClass = v.status === 'BLOCKED' ? 'vela-block' : (v.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                    velaDisplay.className = `vela-badge ${statusClass}`;
                    velaDisplay.innerHTML = `⚖️ VELA: ${v.status}`;
                    
                    addMessage('ai', result.response, { 
                        sealHash: true, 
                        velaResult: v,
                        checkpoints: fragment.checkpoints 
                    });
                    
                    clarificationDepth = 0;
                } else {
                    thinking.innerHTML = '<strong>AI:</strong> Error: No response';
                }
            } catch (err) {
                thinking.innerHTML = `<strong>AI:</strong> Error: ${err.message}`;
            }
        }
        
        // ========== Regular Send ==========
        async function sendRegular() {
            const message = inputField.value.trim();
            if (!message) return;
            if (isSending) return;
            
            addMessage('user', message);
            inputField.value = '';
            inputField.disabled = true;
            isSending = true;
            
            const thinking = document.createElement('div');
            thinking.className = 'message ai';
            thinking.innerHTML = '<strong>AI:</strong> ...';
            chatDiv.appendChild(thinking);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const { result } = await assistantOp.execute(message);
                
                if (result && result.response) {
                    lastResponse = result.response;
                    thinking.remove();
                    
                    const velaResult = await velaOp.execute(result.response);
                    lastVelaResult = velaResult.result;
                    const v = velaResult.result;
                    const statusClass = v.status === 'BLOCKED' ? 'vela-block' : (v.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                    velaDisplay.className = `vela-badge ${statusClass}`;
                    velaDisplay.innerHTML = `⚖️ VELA: ${v.status}`;
                    
                    addMessage('ai', result.response, { sealHash: true, velaResult: v });
                } else {
                    thinking.innerHTML = '<strong>AI:</strong> Error: No response';
                }
            } catch (err) {
                thinking.innerHTML = `<strong>AI:</strong> Error: ${err.message}`;
            }
            
            inputField.disabled = false;
            inputField.focus();
            isSending = false;
        }
        
        // ========== Mode Toggle ==========
        function toggleStructuredMode() {
            structuredModeActive = !structuredModeActive;
            
            if (structuredModeActive) {
                structuredInputArea.classList.add('active');
                modeBadge.textContent = '🌌 STRUCTURED';
                modeBadge.classList.add('structured');
                inputField.disabled = true;
                inputField.placeholder = 'Structured mode active. Use the form below.';
                addSystemMessage('🌌 **STRUCTURED MODE ACTIVE**\n\nGATE-ITL: Fill the form to build structured fragments. Pre-cleared checkpoints are tracked. Open checkpoints trigger CEP clarification.');
            } else {
                structuredInputArea.classList.remove('active');
                modeBadge.textContent = '⚡ REGULAR';
                modeBadge.classList.remove('structured');
                inputField.disabled = false;
                inputField.placeholder = 'Type your message...';
                inputField.focus();
                addSystemMessage('⚡ **REGULAR MODE ACTIVE**\n\nStandard chat. Click Structured Mode for GATE-ITL and checkpoint tracking.');
            }
        }
        
        function sealInput() {
            const text = inputField.value.trim() || structuredInput.value.trim();
            if (!text) {
                showToast('Nothing to seal', true);
                return;
            }
            sealMessage(text);
        }
        
        function showTrace() {
            console.log('=== Ada‑VELA Trace ===');
            console.log('Session:', sessionVar.trace());
            console.log('Chat History:', chatHistory.trace());
            console.log('API Calls:', assistantOp.getExecutions());
            console.log('Seal Calls:', sealOp.getExecutions());
            console.log('VELA Calls:', velaOp.getExecutions());
            showToast('Trace logged to console (F12)');
        }
        
        // ========== Event Listeners ==========
        sendBtn.onclick = sendRegular;
        plusBtn.onclick = (e) => {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
        };
        document.addEventListener('click', () => { dropdown.style.display = 'none'; });
        
        document.getElementById('structuredModeBtn').onclick = () => {
            dropdown.style.display = 'none';
            toggleStructuredMode();
        };
        document.getElementById('sealInputBtn').onclick = () => {
            dropdown.style.display = 'none';
            sealInput();
        };
        document.getElementById('validateBtn').onclick = () => {
            dropdown.style.display = 'none';
            validateLastMessage();
        };
        document.getElementById('traceBtn').onclick = () => {
            dropdown.style.display = 'none';
            showTrace();
        };
        
        structuredSendBtn.onclick = sendStructuredMessage;
        structuredInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendStructuredMessage();
        });
        
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendRegular();
        });
        
        // Update checkpoint display on form change
        ['itlIntent', 'itlDomain', 'itlEmotion', 'itlTime', 'structuredInput'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', () => buildStructuredFragment());
        });
        
        // Initial checkpoint display
        buildStructuredFragment();
        
        // Initial message
