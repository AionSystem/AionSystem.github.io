<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AION · Ada‑VELA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #0a0a0f;
            color: #f0f0f8;
        }
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        /* Chat container */
        #chat {
            height: 500px;
            overflow-y: auto;
            border: 1px solid #2a2a3a;
            margin: 10px 0;
            padding: 10px;
            background: #0f0f14;
            border-radius: 12px;
            scroll-behavior: smooth;
        }
        /* Message styles */
        .message {
            margin: 12px 0;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeSlideUp 0.2s ease-out;
        }
        .user {
            background: #1e3a5f;
            text-align: right;
            border-bottom-right-radius: 4px;
        }
        .ai {
            background: #1e1e2d;
            border-bottom-left-radius: 4px;
        }
        .system {
            background: #2a2a3a;
            text-align: center;
            font-size: 12px;
            color: #c9a028;
            border-radius: 30px;
            padding: 8px 16px;
            margin: 8px auto;
            width: fit-content;
            max-width: 90%;
        }
        /* Markdown elements */
        .message-body {
            line-height: 1.5;
        }
        .message-body p { margin: 0.5em 0; }
        .message-body p:first-child { margin-top: 0; }
        .message-body p:last-child { margin-bottom: 0; }
        .message-body code {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0f;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-size: 0.85em;
        }
        .message-body pre {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message-body pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
        }
        .message-body blockquote {
            border-left: 3px solid #c9a028;
            margin: 0.5em 0;
            padding-left: 1em;
            color: #ccc;
            font-style: italic;
        }
        .message-body ul, .message-body ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .message-body h1, .message-body h2, .message-body h3 {
            margin: 0.5em 0;
            font-weight: 600;
        }
        .message-body h1 { font-size: 1.4em; }
        .message-body h2 { font-size: 1.2em; }
        .message-body h3 { font-size: 1.1em; }
        /* Message footer */
        .message-footer {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 0.6rem;
            color: var(--text-dim, #a0a0b0);
            flex-wrap: wrap;
            align-items: center;
        }
        /* Badges */
        .seal-btn, .vela-badge, .receipt-badge, .ada-badge {
            background: rgba(0,0,0,0.5);
            border: 1px solid #c9a028;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.6rem;
            cursor: pointer;
            color: #c9a028;
            transition: all 0.1s ease;
        }
        .seal-btn:hover, .vela-badge:hover, .receipt-badge:hover, .ada-badge:hover {
            background: #c9a028;
            color: #0a0a0f;
        }
        .vela-pass { background: #1e4620; border-color: #4ade80; color: #4ade80; }
        .vela-flag { background: #5f3a1a; border-color: #ffaa33; color: #ffaa33; }
        .vela-block { background: #5f1a1a; border-color: #ff4d4d; color: #ff4d4d; }
        .receipt-badge { background: #2a2a3a; border-color: #888; }
        .ada-badge { background: #1e3a5f; border-color: #c9a028; }
        /* Input area */
        .input-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            position: relative;
        }
        input, button {
            padding: 10px;
            font-size: 14px;
            border-radius: 28px;
            border: none;
            font-family: inherit;
        }
        input {
            flex: 1;
            background: #1e1e2d;
            color: white;
            border: 1px solid #2a2a3a;
            transition: border 0.1s ease;
        }
        input:focus {
            outline: none;
            border-color: #c9a028;
        }
        button {
            background: #c9a028;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s linear;
        }
        button:active { transform: scale(0.97); }
        .plus-btn {
            background: #2a2a3a;
            color: #c9a028;
            font-size: 20px;
            width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn {
            min-width: 80px;
        }
        /* Dropdown */
        .dropdown {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: #1e1e2d;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
            min-width: 150px;
            backdrop-filter: blur(8px);
        }
        .dropdown button {
            background: #2a2a3a;
            color: white;
            padding: 8px 12px;
            text-align: left;
            width: 100%;
            border-radius: 40px;
        }
        /* Structured mode UI */
        .structured-ui {
            background: #141920;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: none;
        }
        .structured-ui.active { display: block; }
        .itl-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .field-group {
            flex: 1;
            min-width: 120px;
        }
        .field-group label {
            display: block;
            font-size: 10px;
            color: #c9a028;
            margin-bottom: 4px;
        }
        .field-group select {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            padding: 6px;
            color: white;
            font-size: 12px;
        }
        .selected-values {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
        }
        .selected-value {
            background: #2a2a3a;
            padding: 4px 8px;
            border-radius: 12px;
        }
        /* Status bar */
        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            padding: 8px;
            border-top: 1px solid #2a2a3a;
            flex-wrap: wrap;
            align-items: center;
        }
        .mode-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: #2a2a3a;
        }
        .mode-indicator.structured { background: #c9a028; color: #0a0a0f; }
        .toggle-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }
        .toggle-label input {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }
        /* Thinking indicator */
        .thinking {
            align-self: center;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.7rem;
            display: flex;
            gap: 8px;
            width: fit-content;
            margin: 4px auto;
        }
        /* Modals */
        .modal-overlay {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #1e1e2d;
            border: 1px solid #c9a028;
            border-radius: 20px;
            max-width: 90%;
            width: 500px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }
        .modal h3 { color: #c9a028; margin-bottom: 12px; }
        .modal pre {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
        }
        /* Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        /* Mobile */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .itl-fields { flex-direction: column; gap: 8px; }
            .field-group { min-width: auto; }
            .plus-btn { width: 44px; }
            .send-btn { padding: 10px 16px; }
            .message { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <h2>AION · Ada‑VELA</h2>
    <div id="chat"></div>

    <div class="input-row">
        <input type="text" id="input" placeholder="Type your message..." autofocus>
        <div style="position: relative;">
            <button id="plusBtn" class="plus-btn">+</button>
            <div id="dropdown" class="dropdown">
                <button id="structuredModeBtn">🌌 Structured Mode</button>
                <button id="sealInputBtn">🔒 Seal Input</button>
                <button id="validateBtn">⚖️ Validate Last</button>
                <button id="traceBtn">📜 Show Trace</button>
            </div>
        </div>
        <button id="sendBtn" class="send-btn">SEND</button>
    </div>

    <div id="structuredUI" class="structured-ui">
        <div class="itl-fields">
            <div class="field-group">
                <label>INTENT <span class="help-icon" title="What do you want to do? (ask, share, request action, etc.)">ⓘ</span></label>
                <select id="itlIntent">
                    <option value="ask">ask</option>
                    <option value="share">share</option>
                    <option value="request_action">request_action</option>
                    <option value="emotional">emotional</option>
                    <option value="clarify">clarify</option>
                </select>
            </div>
            <div class="field-group">
                <label>DOMAIN <span class="help-icon" title="Subject area (emergence, integrity, healing, security, law, general)">ⓘ</span></label>
                <select id="itlDomain">
                    <option value="emergence">emergence</option>
                    <option value="integrity">integrity</option>
                    <option value="healing">healing</option>
                    <option value="security">security</option>
                    <option value="law">law</option>
                    <option value="general">general</option>
                </select>
            </div>
            <div class="field-group">
                <label>EMOTION <span class="help-icon" title="Your current emotional state">ⓘ</span></label>
                <select id="itlEmotion">
                    <option value="neutral">neutral</option>
                    <option value="curious">curious</option>
                    <option value="anxious">anxious</option>
                    <option value="focused">focused</option>
                </select>
            </div>
            <div class="field-group">
                <label>TIME <span class="help-icon" title="How urgent is this?">ⓘ</span></label>
                <select id="itlTime">
                    <option value="now">now</option>
                    <option value="today">today</option>
                    <option value="future">future</option>
                </select>
            </div>
        </div>
        <div class="selected-values" id="selectedValues"></div>
        <button id="resetStructuredBtn" style="background:#2a2a3a; color:#c9a028; margin-top:8px; padding:4px 8px; font-size:11px;">Reset All</button>
    </div>

    <div class="status-bar">
        <span id="sessionDisplay"></span>
        <span id="modeBadge" class="mode-indicator">⚡ REGULAR</span>
        <span id="velaDisplay" class="vela-badge vela-pass">⚖️ READY</span>
        <span id="lastSeal"></span>
        <label class="toggle-label" title="Enable ADA loop for self‑refinement (may take extra time)">
            <input type="checkbox" id="adaLoopToggle" checked> <span>ADA Loop</span>
        </label>
    </div>

    <script>
        const API = 'https://aion-backend-mu.vercel.app';
        
        // Session with expiry
        let sessionId = localStorage.getItem('sessionId');
        let sessionExpiry = localStorage.getItem('sessionExpiry');
        if (!sessionId || !sessionExpiry || Date.now() > parseInt(sessionExpiry)) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('sessionId', sessionId);
            localStorage.setItem('sessionExpiry', Date.now() + 7*24*60*60*1000);
        }
        document.getElementById('sessionDisplay').textContent = `Session: ${sessionId.slice(-8)}`;

        // ADA Loop toggle
        let adaLoopEnabled = localStorage.getItem('adaLoopEnabled') !== 'false';
        const adaLoopToggle = document.getElementById('adaLoopToggle');
        if (adaLoopToggle) {
            adaLoopToggle.checked = adaLoopEnabled;
            adaLoopToggle.addEventListener('change', () => {
                adaLoopEnabled = adaLoopToggle.checked;
                localStorage.setItem('adaLoopEnabled', adaLoopEnabled);
                addSystemMessage(adaLoopEnabled ? '🔄 ADA loop enabled – responses will be automatically refined.' : '⚡ ADA loop disabled – responses will be generated directly.');
            });
        }

        // State
        let lastResponse = null;
        let isSending = false;
        let structuredModeActive = false;
        let lastFragmentId = null;
        let pendingClarification = null;
        let abortController = null;
        let clarificationDepth = 0;
        const MAX_CLARIFICATION_DEPTH = 3;

        // DOM elements
        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const plusBtn = document.getElementById('plusBtn');
        const dropdown = document.getElementById('dropdown');
        const velaDisplay = document.getElementById('velaDisplay');
        const modeBadge = document.getElementById('modeBadge');
        const lastSealSpan = document.getElementById('lastSeal');
        const structuredUI = document.getElementById('structuredUI');
        const selectedValuesDiv = document.getElementById('selectedValues');
        const itlIntent = document.getElementById('itlIntent');
        const itlDomain = document.getElementById('itlDomain');
        const itlEmotion = document.getElementById('itlEmotion');
        const itlTime = document.getElementById('itlTime');
        const resetStructuredBtn = document.getElementById('resetStructuredBtn');

        // Helper: Add message
        function addMessage(role, text, extra = {}) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            let extraHtml = '';
            if (extra.sealHash && role === 'ai') extraHtml += `<button class="seal-btn" data-text="${escapeHtml(text)}">🔒 SEAL</button>`;
            if (extra.velaResult) {
                const cls = extra.velaResult.status === 'BLOCKED' ? 'vela-block' : (extra.velaResult.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                extraHtml += `<span class="vela-badge ${cls}">⚖️ VELA: ${extra.velaResult.status}</span>`;
            }
            if (extra.receipt) {
                const openCount = extra.receipt.still_open || 0;
                extraHtml += `<span class="receipt-badge" data-receipt='${JSON.stringify(extra.receipt).replace(/'/g, "&#39;")}'>📋 ${extra.receipt.epistemic_weight || 'receipt'} (${openCount} open)</span>`;
            }
            if (extra.adaLoop) {
                const loop = extra.adaLoop;
                const status = loop.converged ? '✅' : '🔄';
                const text = `${status} ADA: ${loop.rounds} rounds${loop.converged ? '' : ' (unconverged)'}`;
                extraHtml += `<span class="ada-badge" data-ada='${JSON.stringify(loop).replace(/'/g, "&#39;")}'>${text}</span>`;
            }
            div.innerHTML = `<div class="message-body">${renderMarkdown(text)}</div><div class="message-footer">${extraHtml}</div>`;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            const sealBtn = div.querySelector('.seal-btn');
            if (sealBtn) sealBtn.onclick = () => sealMessage(text);
            const receiptBadge = div.querySelector('.receipt-badge');
            if (receiptBadge && extra.receipt) {
                receiptBadge.onclick = () => showModal('Checkpoint Receipt', JSON.stringify(extra.receipt, null, 2));
            }
            const adaBadge = div.querySelector('.ada-badge');
            if (adaBadge && extra.adaLoop) {
                adaBadge.onclick = () => showModal('ADA Loop Details', JSON.stringify(extra.adaLoop, null, 2));
            }
        }

        function renderMarkdown(text) {
            if (!text) return '';
            try {
                const rawHtml = marked.parse(text);
                const temp = document.createElement('div');
                temp.innerHTML = rawHtml;
                temp.querySelectorAll('pre code').forEach(block => {
                    try { hljs.highlightElement(block); } catch(e) {}
                });
                return temp.innerHTML;
            } catch(e) {
                return escapeHtml(text);
            }
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = text;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: ${isError ? '#5f1a1a' : '#1e4620'}; color: white; padding: 8px 16px;
                border-radius: 20px; font-size: 12px; z-index: 1000; animation: fadeOut 2s forwards; pointer-events: none;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function showModal(title, content) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal"><h3>${title}</h3><pre>${escapeHtml(content)}</pre><button id="closeModalBtn">Close</button></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#closeModalBtn').onclick = () => overlay.remove();
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        }

        function showClarificationModal(interceptData, originalFragmentId) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            const opts = interceptData.clarification_options || [];
            const optsHtml = opts.map(opt => `<button class="option-btn" data-option='${JSON.stringify(opt)}'>${escapeHtml(opt.text)}</button>`).join('');
            overlay.innerHTML = `
                <div class="modal">
                    <h3>📋 Clarification Required</h3>
                    <p>${escapeHtml(interceptData.message)}</p>
                    <div class="options-list" style="display:flex; flex-direction:column; gap:8px; margin-top:16px;">${optsHtml || '<p>No options provided.</p>'}</div>
                    <button id="closeClarificationModal" style="margin-top:16px;">Cancel</button>
                </div>
            `;
            document.body.appendChild(overlay);
            const close = () => overlay.remove();
            overlay.querySelector('#closeClarificationModal').onclick = close;
            overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
            overlay.querySelectorAll('.option-btn').forEach(btn => {
                btn.onclick = () => {
                    const opt = JSON.parse(btn.dataset.option);
                    close();
                    sendClarification(opt, originalFragmentId);
                };
            });
        }

        async function sendClarification(option, replyToId) {
            if (clarificationDepth >= MAX_CLARIFICATION_DEPTH) {
                addSystemMessage(`⚠️ Max clarifications (${MAX_CLARIFICATION_DEPTH}) reached. Please rephrase your original question.`);
                pendingClarification = null;
                clarificationDepth = 0;
                return;
            }
            const fragment = {
                id: crypto.randomUUID(),
                ts: new Date().toISOString(),
                session_id: sessionId,
                in_reply_to: replyToId,
                source: 'human',
                intent: 'clarify',
                domain: 'general',
                emotional_state: { primary: 'neutral', intensity: 5 },
                content: { summary: `Clarification: ${option.text}`, details: option.text },
                context: { time_sensitivity: 'now', stage: 4, requires: ['analysis'] },
                adaLoopEnabled
            };
            try {
                const res = await fetch(`${API}/api/structured-mode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fragment)
                });
                const result = await res.json();
                if (result.response) {
                    addMessage('ai', result.response, { sealHash: true, receipt: result.checkpoint_receipt, adaLoop: result.ada_loop });
                    lastResponse = result.response;
                    clarificationDepth = 0;
                    pendingClarification = null;
                    if (result.pac) {
                        const ppi = result.pac.ppi;
                        const cls = ppi < 30 ? 'vela-block' : (ppi < 70 ? 'vela-flag' : 'vela-pass');
                        const status = ppi < 30 ? 'BLOCKED' : (ppi < 70 ? 'FLAGGED' : 'PASS');
                        velaDisplay.className = `vela-badge ${cls}`;
                        velaDisplay.innerHTML = `⚖️ VELA: ${status}`;
                    }
                } else if (result.status === 'CEP_INTERCEPT') {
                    clarificationDepth++;
                    showClarificationModal(result, fragment.id);
                } else {
                    addSystemMessage(`⚠️ Unexpected response: ${JSON.stringify(result)}`);
                }
            } catch (err) {
                addSystemMessage(`❌ Error sending clarification: ${err.message}`, true);
                showToast(err.message, true);
            }
        }

        // API calls
        async function callStructuredMode(fragment) {
            if (abortController) abortController.abort();
            abortController = new AbortController();
            const timeoutId = setTimeout(() => abortController.abort(), 30000);
            try {
                const res = await fetch(`${API}/api/structured-mode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fragment),
                    signal: abortController.signal
                });
                clearTimeout(timeoutId);
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`HTTP ${res.status}: ${errText}`);
                }
                return await res.json();
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') throw new Error('Request timed out (30s)');
                throw err;
            } finally {
                abortController = null;
            }
        }

        async function callAssistant(message) {
            const res = await fetch(`${API}/api/assistant`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, sessionId, ownerType: 'sheldon', history: [], adaLoopEnabled })
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function sealMessage(content) {
            try {
                const res = await fetch(`${API}/api/stp-seal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entry: content.substring(0,500), type: 'general-trace', sessionId })
                });
                const data = await res.json();
                if (res.ok) {
                    lastSealSpan.textContent = `🔒 Sealed: ${data.seal.slice(0,8)}...`;
                    showToast(`✅ Sealed: ${data.seal.slice(0,8)}...`);
                } else throw new Error(data.error);
            } catch (err) { showToast(`❌ Seal failed: ${err.message}`, true); }
        }

        async function validateLastMessage() {
            if (!lastResponse) { showToast('No message to validate', true); return; }
            try {
                const res = await fetch(`${API}/api/vela-suite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fragment: lastResponse, sessionId, options: { domain: 'general' } })
                });
                const data = await res.json();
                const cls = data.status === 'BLOCKED' ? 'vela-block' : (data.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                velaDisplay.className = `vela-badge ${cls}`;
                velaDisplay.innerHTML = `⚖️ VELA: ${data.status}`;
                showModal('VELA Validation Result', JSON.stringify(data, null, 2));
            } catch (err) { showToast(`Validation failed: ${err.message}`, true); }
        }

        // Build structured fragment
        function buildStructuredFragment(rawMessage, replyTo = null) {
            return {
                id: crypto.randomUUID(),
                ts: new Date().toISOString(),
                session_id: sessionId,
                source: 'human',
                intent: itlIntent.value,
                domain: itlDomain.value,
                emotional_state: { primary: itlEmotion.value, intensity: 5 },
                content: { summary: rawMessage.substring(0,100), details: rawMessage },
                context: { time_sensitivity: itlTime.value, stage: 4, requires: ['analysis'] },
                adaLoopEnabled,
                in_reply_to: replyTo || undefined
            };
        }

        function updateSelectedValues() {
            selectedValuesDiv.innerHTML = `
                <span class="selected-value">intent: ${itlIntent.options[itlIntent.selectedIndex]?.text}</span>
                <span class="selected-value">domain: ${itlDomain.options[itlDomain.selectedIndex]?.text}</span>
                <span class="selected-value">emotion: ${itlEmotion.options[itlEmotion.selectedIndex]?.text}</span>
                <span class="selected-value">time: ${itlTime.options[itlTime.selectedIndex]?.text}</span>
            `;
        }

        let lastSendTime = 0;
        const SEND_DELAY = 300;

        // Main send
        async function send() {
            if (isSending) { showToast('Already sending...'); return; }
            const now = Date.now();
            if (now - lastSendTime < SEND_DELAY) {
                showToast('Please wait a moment before sending again.');
                return;
            }
            lastSendTime = now;

            const rawMessage = inputField.value.trim();
            if (!rawMessage) return;

            inputField.value = '';
            inputField.disabled = true;
            isSending = true;

            addMessage('user', rawMessage);

            const thinking = document.createElement('div');
            thinking.className = 'thinking';
            thinking.innerHTML = '<strong>AI:</strong> ...';
            chatDiv.appendChild(thinking);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            try {
                let result;
                if (structuredModeActive) {
                    const fragment = buildStructuredFragment(rawMessage, pendingClarification?.originalFragmentId);
                    result = await callStructuredMode(fragment);
                    lastFragmentId = fragment.id;
                    if (result.status === 'CEP_INTERCEPT') {
                        thinking.remove();
                        pendingClarification = {
                            originalFragmentId: fragment.id,
                            interceptData: result,
                            depth: clarificationDepth
                        };
                        showClarificationModal(result, fragment.id);
                        inputField.disabled = false;
                        isSending = false;
                        return;
                    }
                } else {
                    result = await callAssistant(rawMessage);
                }

                if (result && result.response) {
                    lastResponse = result.response;
                    thinking.remove();

                    // Update VELA badge
                    if (result.pac) {
                        const ppi = result.pac.ppi;
                        const cls = ppi < 30 ? 'vela-block' : (ppi < 70 ? 'vela-flag' : 'vela-pass');
                        const status = ppi < 30 ? 'BLOCKED' : (ppi < 70 ? 'FLAGGED' : 'PASS');
                        velaDisplay.className = `vela-badge ${cls}`;
                        velaDisplay.innerHTML = `⚖️ VELA: ${status}`;
                    } else if (result.vela_status) {
                        const cls = result.vela_status === 'BLOCKED' ? 'vela-block' : (result.vela_status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                        velaDisplay.className = `vela-badge ${cls}`;
                        velaDisplay.innerHTML = `⚖️ VELA: ${result.vela_status}`;
                    }

                    const adaLoop = result.ada_loop;
                    addMessage('ai', result.response, { sealHash: true, receipt: result.checkpoint_receipt, adaLoop });
                } else {
                    thinking.innerHTML = '<strong>AI:</strong> Error: No response';
                }
            } catch (err) {
                thinking.innerHTML = `<strong>AI:</strong> Error: ${err.message}`;
                console.error(err);
                showToast(err.message, true);
            } finally {
                inputField.disabled = false;
                inputField.focus();
                isSending = false;
            }
        }

        // Toggle structured mode
        function toggleStructuredMode() {
            structuredModeActive = !structuredModeActive;
            if (structuredModeActive) {
                structuredUI.classList.add('active');
                modeBadge.textContent = '🌌 STRUCTURED';
                modeBadge.classList.add('structured');
                inputField.placeholder = 'Type your message (will be structured)';
                updateSelectedValues();
                addSystemMessage('🌌 **STRUCTURED MODE ACTIVE**\n\nSet intent, domain, emotion, time. Your message will be sent as a structured fragment.');
                pendingClarification = null;
                clarificationDepth = 0;
            } else {
                structuredUI.classList.remove('active');
                modeBadge.textContent = '⚡ REGULAR';
                modeBadge.classList.remove('structured');
                inputField.placeholder = 'Type your message...';
                addSystemMessage('⚡ **REGULAR MODE ACTIVE**');
                inputField.focus();
            }
        }

        function sealInput() {
            const text = inputField.value.trim();
            if (!text) { showToast('Nothing to seal', true); return; }
            sealMessage(text);
        }

        function showTrace() {
            const traceInfo = {
                sessionId,
                structuredModeActive,
                lastFragmentId,
                lastResponsePreview: lastResponse?.substring(0, 100),
                pendingClarification: !!pendingClarification,
                clarificationDepth,
                adaLoopEnabled
            };
            showModal('Ada‑VELA Trace', JSON.stringify(traceInfo, null, 2));
            console.log('Trace data:', traceInfo);
        }

        function resetStructuredFields() {
            itlIntent.selectedIndex = 0;
            itlDomain.selectedIndex = 5; // general
            itlEmotion.selectedIndex = 0;
            itlTime.selectedIndex = 0;
            updateSelectedValues();
            addSystemMessage('Structured mode fields reset.');
        }

        // Event listeners
        sendBtn.onclick = send;
        plusBtn.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex'; };
        document.addEventListener('click', () => { dropdown.style.display = 'none'; });
        document.getElementById('structuredModeBtn').onclick = () => { dropdown.style.display = 'none'; toggleStructuredMode(); };
        document.getElementById('sealInputBtn').onclick = () => { dropdown.style.display = 'none'; sealInput(); };
        document.getElementById('validateBtn').onclick = () => { dropdown.style.display = 'none'; validateLastMessage(); };
        document.getElementById('traceBtn').onclick = () => { dropdown.style.display = 'none'; showTrace(); };
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
        [itlIntent, itlDomain, itlEmotion, itlTime].forEach(el => el.addEventListener('change', updateSelectedValues));
        resetStructuredBtn.onclick = resetStructuredFields;

        // Initial message
        addMessage('ai', 'Ada‑VELA ready. Click + → Structured Mode to activate GATE-ITL.');
        updateSelectedValues();
    </script>
</body>
</html>
