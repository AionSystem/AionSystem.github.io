<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AION · Ada‑VELA</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #0a0a0f;
            color: #f0f0f8;
            position: relative;
        }
        #chat {
            height: 500px;
            overflow-y: auto;
            border: 1px solid #2a2a3a;
            margin: 10px 0;
            padding: 10px;
            background: #0f0f14;
            border-radius: 8px;
            scroll-behavior: smooth;
        }
        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            word-wrap: break-word;
        }
        .user { background: #1e3a5f; text-align: right; }
        .ai { background: #1e1e2d; }
        .system { background: #2a2a3a; text-align: center; font-size: 12px; color: #c9a028; }
        .seal-btn {
            background: none;
            border: 1px solid #c9a028;
            color: #c9a028;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
        }
        .vela-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .vela-pass { background: #1e4620; color: #4ade80; }
        .vela-flag { background: #5f3a1a; color: #ffaa33; }
        .vela-block { background: #5f1a1a; color: #ff4d4d; }
        .checkpoint-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            background: #2a2a3a;
            margin-left: 8px;
        }
        input, button {
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            border: none;
        }
        input {
            flex: 1;
            background: #1e1e2d;
            color: white;
            border: 1px solid #2a2a3a;
        }
        button {
            background: #c9a028;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            position: relative;
        }
        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            padding: 8px;
            border-top: 1px solid #2a2a3a;
            flex-wrap: wrap;
        }
        .mode-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: #2a2a3a;
        }
        .mode-indicator.structured {
            background: #c9a028;
            color: #0a0a0f;
        }
        .dropdown {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: #1e1e2d;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
            min-width: 150px;
        }
        .dropdown button {
            background: #2a2a3a;
            color: white;
            padding: 8px 12px;
            text-align: left;
            width: 100%;
        }
        .plus-btn {
            background: #2a2a3a;
            color: #c9a028;
            font-size: 20px;
            font-weight: bold;
            width: 44px;
        }
        .structured-ui {
            background: #141920;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: none;
        }
        .structured-ui.active { display: block; }
        .itl-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .field-group {
            flex: 1;
            min-width: 120px;
        }
        .field-group label {
            display: block;
            font-size: 10px;
            color: #c9a028;
            margin-bottom: 4px;
        }
        .field-group select {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            padding: 6px;
            color: white;
            font-size: 12px;
        }
        .selected-values {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
        }
        .selected-value {
            background: #2a2a3a;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .checkpoint-display {
            font-size: 11px;
            padding: 8px;
            background: #0f0f14;
            border-radius: 8px;
            margin-top: 8px;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #1e1e2d;
            border: 1px solid #c9a028;
            border-radius: 16px;
            max-width: 90%;
            width: 500px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }
        .modal h3 { color: #c9a028; margin-bottom: 12px; }
        .modal pre {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h2>AION · Ada‑VELA</h2>
    <div id="chat"></div>

    <div class="input-row">
        <input type="text" id="input" placeholder="Type your message..." autofocus>
        <div class="action-menu" style="position: relative;">
            <button id="plusBtn" class="plus-btn">+</button>
            <div id="dropdown" class="dropdown">
                <button id="structuredModeBtn">🌌 Structured Mode</button>
                <button id="sealInputBtn">🔒 Seal Input</button>
                <button id="validateBtn">⚖️ Validate Last</button>
                <button id="traceBtn">📜 Show Trace</button>
            </div>
        </div>
        <button id="sendBtn">SEND</button>
    </div>

    <div id="structuredUI" class="structured-ui">
        <div class="itl-fields">
            <div class="field-group">
                <label>INTENT</label>
                <select id="itlIntent">
                    <option value="ask">ask</option>
                    <option value="share">share</option>
                    <option value="request_action">request_action</option>
                    <option value="emotional">emotional</option>
                    <option value="clarify">clarify</option>
                </select>
            </div>
            <div class="field-group">
                <label>DOMAIN</label>
                <select id="itlDomain">
                    <option value="emergence">emergence</option>
                    <option value="integrity">integrity</option>
                    <option value="healing">healing</option>
                    <option value="security">security</option>
                    <option value="law">law</option>
                    <option value="general">general</option>
                </select>
            </div>
            <div class="field-group">
                <label>EMOTION</label>
                <select id="itlEmotion">
                    <option value="neutral">neutral</option>
                    <option value="curious">curious</option>
                    <option value="anxious">anxious</option>
                    <option value="focused">focused</option>
                </select>
            </div>
            <div class="field-group">
                <label>TIME</label>
                <select id="itlTime">
                    <option value="now">now</option>
                    <option value="today">today</option>
                    <option value="future">future</option>
                </select>
            </div>
        </div>
        <div class="selected-values" id="selectedValues"></div>
        <div id="checkpointDisplay" class="checkpoint-display"></div>
    </div>

    <div class="status-bar">
        <span id="sessionDisplay"></span>
        <span id="modeBadge" class="mode-indicator">⚡ REGULAR</span>
        <span id="velaDisplay" class="vela-badge vela-pass">⚖️ READY</span>
        <span id="lastSeal"></span>
    </div>

    <script>
        // ============================================================
        // ADA‑VELA + STP SEAL + VELA VALIDATION + STRUCTURED MODE
        // ============================================================
        const API = 'https://aion-backend-mu.vercel.app';
        
        // ========== Helpers ==========
        function tripleTimestamp() {
            const now = new Date();
            return { gregorian: now.toISOString(), unix: Math.floor(now.getTime() / 1000) };
        }
        
        class AdaVariable {
            constructor(name, initialValue) {
                this.name = name;
                this.value = initialValue;
                this.history = [{ timestamp: tripleTimestamp(), value: initialValue, op: 'INIT' }];
            }
            get() { return this.value; }
            set(newValue, op = 'SET') {
                this.history.push({ timestamp: tripleTimestamp(), from: this.value, to: newValue, op });
                this.value = newValue;
                return this;
            }
            trace() { return this.history; }
        }
        
        class AdaOperation {
            constructor(name) {
                this.name = name;
                this.executions = [];
                this.fn = null;
            }
            setFunction(fn) { this.fn = fn; return this; }
            async execute(input) {
                const start = tripleTimestamp();
                let result = null, error = null;
                try { result = await this.fn(input); }
                catch (e) { error = e.message; }
                const exec = { id: Date.now() + '_' + Math.random(), name: this.name, start, end: tripleTimestamp(), input, result, error };
                this.executions.push(exec);
                if (error) throw new Error(error);
                return { result, execution: exec };
            }
            getExecutions() { return this.executions; }
        }
        
        // ========== Session ==========
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('sessionId', sessionId);
        }
        let sessionVar = new AdaVariable('session', sessionId);
        let chatHistory = new AdaVariable('chatHistory', []);
        let lastResponse = null;
        let isSending = false;
        let structuredModeActive = false;
        let currentCheckpoints = { preCleared: [], open: [] };
        
        // DOM elements
        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const plusBtn = document.getElementById('plusBtn');
        const dropdown = document.getElementById('dropdown');
        const sessionDisplay = document.getElementById('sessionDisplay');
        const velaDisplay = document.getElementById('velaDisplay');
        const modeBadge = document.getElementById('modeBadge');
        const lastSealSpan = document.getElementById('lastSeal');
        const structuredUI = document.getElementById('structuredUI');
        const selectedValuesDiv = document.getElementById('selectedValues');
        const checkpointDisplay = document.getElementById('checkpointDisplay');
        const itlIntent = document.getElementById('itlIntent');
        const itlDomain = document.getElementById('itlDomain');
        const itlEmotion = document.getElementById('itlEmotion');
        const itlTime = document.getElementById('itlTime');
        
        sessionDisplay.textContent = `Session: ${sessionId.slice(-8)}`;
        
        // ========== Operations ==========
        const sealOp = new AdaOperation('STP_SEAL');
        sealOp.setFunction(async (content) => {
            const res = await fetch(`${API}/api/stp-seal`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ entry: content.substring(0, 500), type: 'general-trace', sessionId })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Seal failed');
            return { seal: data.seal, issueUrl: data.issue_url };
        });
        
        const velaOp = new AdaOperation('VELA_VALIDATE');
        velaOp.setFunction(async (content) => {
            const res = await fetch(`${API}/api/vela-suite`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fragment: content, sessionId, options: { domain: 'general' } })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'VELA unavailable');
            return data;
        });
        
        const assistantOp = new AdaOperation('ASSISTANT_CALL');
        assistantOp.setFunction(async (message) => {
            const res = await fetch(`${API}/api/assistant`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, sessionId, ownerType: 'sheldon', history: [] })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'API error');
            return data;
        });
        
        // ========== GATE-ITL ==========
        function updateSelectedValuesDisplay() {
            const selected = {
                intent: itlIntent.options[itlIntent.selectedIndex]?.text,
                domain: itlDomain.options[itlDomain.selectedIndex]?.text,
                emotion: itlEmotion.options[itlEmotion.selectedIndex]?.text,
                time: itlTime.options[itlTime.selectedIndex]?.text
            };
            selectedValuesDiv.innerHTML = Object.entries(selected)
                .map(([k,v]) => `<span class="selected-value">${k}: ${v}</span>`).join('');
        }
        
        function updateCheckpointDisplay() {
            checkpointDisplay.innerHTML = `
                ✅ Pre-cleared: ${currentCheckpoints.preCleared.map(c => `<span style="color:#4ade80">${c}</span>`).join(', ') || 'none'}<br>
                🔓 Still open: ${currentCheckpoints.open.map(c => `<span style="color:#ffaa33">${c}</span>`).join(', ') || 'none'}
            `;
        }
        
        function buildStructuredFragment(message) {
            const intent = itlIntent.value;
            const domain = itlDomain.value;
            const emotion = itlEmotion.value;
            const timeSens = itlTime.value;
            
            const preCleared = [];
            if (intent) preCleared.push('intent');
            if (domain) preCleared.push('domain');
            if (emotion) preCleared.push('emotional_state');
            if (timeSens) preCleared.push('time_sensitivity');
            if (message) preCleared.push('content');
            
            const open = [];
            if (!intent) open.push('intent_ambiguous');
            if (!domain) open.push('domain_boundary_exceeded');
            if (message.length < 3) open.push('context_missing');
            
            currentCheckpoints = { preCleared, open };
            updateCheckpointDisplay();
            
            return {
                intent, domain, emotion, timeSens, message,
                checkpoints: currentCheckpoints,
                toText: () => {
                    // Convert to a human-readable format for the assistant
                    return `[STRUCTURED MODE] Intent: ${intent}, Domain: ${domain}, Emotional state: ${emotion}, Time sensitivity: ${timeSens}\n\nMessage: ${message}`;
                }
            };
        }
        
        // ========== UI ==========
        function addMessage(role, text, extra = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            let extraHtml = '';
            if (extra.sealHash && role === 'ai') extraHtml += `<button class="seal-btn" data-text="${escapeHtml(text)}">🔒 SEAL</button>`;
            if (extra.velaResult) {
                const v = extra.velaResult;
                const cls = v.status === 'BLOCKED' ? 'vela-block' : (v.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                extraHtml += `<span class="vela-badge ${cls}">⚖️ VELA: ${v.status}</span>`;
            }
            if (extra.checkpoints) {
                extraHtml += `<span class="checkpoint-badge">📋 ${extra.checkpoints.preCleared.length}/${extra.checkpoints.preCleared.length + extra.checkpoints.open.length} cleared</span>`;
            }
            msgDiv.innerHTML = `<strong>${role === 'user' ? 'You' : 'AI'}:</strong> ${escapeHtml(text)}${extraHtml}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            const sealBtn = msgDiv.querySelector('.seal-btn');
            if (sealBtn) sealBtn.onclick = () => sealMessage(text);
            chatHistory.set([...chatHistory.get(), { role, text, timestamp: tripleTimestamp() }]);
        }
        
        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.innerHTML = text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: ${isError ? '#5f1a1a' : '#1e4620'}; color: white; padding: 8px 16px;
                border-radius: 20px; font-size: 12px; z-index: 1000; animation: fadeOut 2s forwards; pointer-events: none;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function showModal(title, content) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal"><h3>${title}</h3><pre>${escapeHtml(content)}</pre><button id="closeModalBtn">Close</button></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#closeModalBtn').onclick = () => overlay.remove();
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        }
        
        async function sealMessage(content) {
            try {
                const { result } = await sealOp.execute(content);
                lastSealSpan.textContent = `🔒 Sealed: ${result.seal.slice(0,8)}...`;
                showToast(`✅ Sealed: ${result.seal.slice(0,8)}...`);
            } catch (err) { showToast(`❌ Seal failed: ${err.message}`, true); }
        }
        
        async function validateLastMessage() {
            if (!lastResponse) { showToast('No message to validate', true); return; }
            try {
                const { result } = await velaOp.execute(lastResponse);
                const cls = result.status === 'BLOCKED' ? 'vela-block' : (result.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                velaDisplay.className = `vela-badge ${cls}`;
                velaDisplay.innerHTML = `⚖️ VELA: ${result.status}`;
                showModal('VELA Validation Result', JSON.stringify(result, null, 2));
            } catch (err) { showToast(`Validation failed: ${err.message}`, true); }
        }
        
        function showTrace() {
            const trace = {
                session: sessionVar.trace(),
                chatHistory: chatHistory.trace(),
                assistantCalls: assistantOp.getExecutions(),
                sealCalls: sealOp.getExecutions(),
                velaCalls: velaOp.getExecutions()
            };
            showModal('Ada‑VELA Trace', JSON.stringify(trace, null, 2));
        }
        
        // ========== Send (works for both modes) ==========
        async function send() {
            if (isSending) { showToast('Already sending, please wait...'); return; }
            const rawMessage = inputField.value.trim();
            if (!rawMessage) return;
            
            inputField.value = '';
            inputField.disabled = true;
            isSending = true;
            
            let payloadText = rawMessage;
            let checkpointsInfo = null;
            
            if (structuredModeActive) {
                const fragment = buildStructuredFragment(rawMessage);
                if (!fragment) {
                    showToast('Failed to build structured fragment', true);
                    inputField.disabled = false;
                    isSending = false;
                    return;
                }
                // Convert fragment to human-readable text for the AI
                payloadText = fragment.toText();
                checkpointsInfo = fragment.checkpoints;
                
                // CEP Intercept: if open checkpoints exist and not urgent
                if (fragment.checkpoints.open.length > 0 && fragment.timeSens !== 'now') {
                    addSystemMessage(`⚠️ **CEP INTERCEPT** – ${fragment.checkpoints.open.length} checkpoint(s) open.\n\nPlease clarify: ${fragment.checkpoints.open.join(', ')}`);
                    inputField.disabled = false;
                    isSending = false;
                    return;
                }
            }
            
            addMessage('user', rawMessage, { checkpoints: checkpointsInfo });
            
            const thinking = document.createElement('div');
            thinking.className = 'message ai';
            thinking.innerHTML = '<strong>AI:</strong> ...';
            chatDiv.appendChild(thinking);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const { result } = await assistantOp.execute(payloadText);
                if (result && result.response) {
                    lastResponse = result.response;
                    thinking.remove();
                    const velaResult = await velaOp.execute(result.response);
                    const v = velaResult.result;
                    const cls = v.status === 'BLOCKED' ? 'vela-block' : (v.status === 'FLAGGED' ? 'vela-flag' : 'vela-pass');
                    velaDisplay.className = `vela-badge ${cls}`;
                    velaDisplay.innerHTML = `⚖️ VELA: ${v.status}`;
                    addMessage('ai', result.response, { sealHash: true, velaResult: v, checkpoints: checkpointsInfo });
                } else {
                    thinking.innerHTML = '<strong>AI:</strong> Error: No response';
                }
            } catch (err) {
                thinking.innerHTML = `<strong>AI:</strong> Error: ${err.message}`;
                console.error(err);
            } finally {
                inputField.disabled = false;
                inputField.focus();
                isSending = false;
            }
        }
        
        // ========== Mode Toggle ==========
        function toggleStructuredMode() {
            structuredModeActive = !structuredModeActive;
            if (structuredModeActive) {
                structuredUI.classList.add('active');
                modeBadge.textContent = '🌌 STRUCTURED';
                modeBadge.classList.add('structured');
                inputField.placeholder = 'Type your message (will be structured)';
                updateSelectedValuesDisplay();
                buildStructuredFragment('');
                addSystemMessage('🌌 **STRUCTURED MODE ACTIVE**\n\nSet intent, domain, emotion, time. Your message will be wrapped with these fields.');
            } else {
                structuredUI.classList.remove('active');
                modeBadge.textContent = '⚡ REGULAR';
                modeBadge.classList.remove('structured');
                inputField.placeholder = 'Type your message...';
                inputField.focus();
                addSystemMessage('⚡ **REGULAR MODE ACTIVE**');
            }
        }
        
        function sealInput() {
            const text = inputField.value.trim();
            if (!text) { showToast('Nothing to seal', true); return; }
            sealMessage(text);
        }
        
        // ========== Event Listeners ==========
        sendBtn.onclick = send;
        plusBtn.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex'; };
        document.addEventListener('click', () => { dropdown.style.display = 'none'; });
        document.getElementById('structuredModeBtn').onclick = () => { dropdown.style.display = 'none'; toggleStructuredMode(); };
        document.getElementById('sealInputBtn').onclick = () => { dropdown.style.display = 'none'; sealInput(); };
        document.getElementById('validateBtn').onclick = () => { dropdown.style.display = 'none'; validateLastMessage(); };
        document.getElementById('traceBtn').onclick = () => { dropdown.style.display = 'none'; showTrace(); };
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
        
        [itlIntent, itlDomain, itlEmotion, itlTime].forEach(el => {
            el.addEventListener('change', () => {
                if (structuredModeActive) {
                    updateSelectedValuesDisplay();
                    buildStructuredFragment(inputField.value.trim());
                }
            });
        });
        inputField.addEventListener('input', () => {
            if (structuredModeActive) buildStructuredFragment(inputField.value.trim());
        });
        
        updateSelectedValuesDisplay();
        buildStructuredFragment('');
        addMessage('ai', 'Ada‑VELA active. Click + → Structured Mode to activate GATE-ITL.');
    </script>
</body>
</html>
