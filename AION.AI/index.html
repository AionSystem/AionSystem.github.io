<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AION.AI · Ada‑VELA Constitutional Chat</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
        "./ada-vela.js": "./ada-vela.js"
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* (Same CSS as before – keeping your visual style) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: rgba(12, 12, 20, 0.7);
      --glass: rgba(20, 20, 30, 0.65);
      --border-glow: rgba(100, 100, 140, 0.3);
      --primary-glow: rgba(201, 160, 40, 0.4);
      --accent: #c9a028;
      --accent-dark: #a07c18;
      --text: #f0f0f8;
      --text-dim: #a0a0b0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --vesper: #b87333;
      --lyra: #4c9f70;
      --terra: #6b8c42;
      --cipher: #5d6d7e;
      --justitia: #b0a8b9;
      --vela-block: #ff4d4d;
      --vela-flag: #ffaa33;
      --vela-pass: #4ade80;
    }
    body {
      background: radial-gradient(circle at 20% 30%, #0f0f1a, #050508);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #chat-mode {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 1;
      transition: opacity 0.3s;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
      flex-wrap: wrap;
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e6c87a, #c9a028);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mode-indicator {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-indicator.active {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .vela-badge {
      background: rgba(30,30,45,0.8);
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.2s;
    }
    .vela-badge.pass { background: rgba(74,222,128,0.2); border: 1px solid var(--vela-pass); color: var(--vela-pass); }
    .vela-badge.flag { background: rgba(255,170,51,0.2); border: 1px solid var(--vela-flag); color: var(--vela-flag); }
    .vela-badge.block { background: rgba(255,77,77,0.2); border: 1px solid var(--vela-block); color: var(--vela-block); }
    .settings-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .settings-btn:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
    }
    .wife-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 40px;
    }
    .wife-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }
    .void-meter {
      font-family: monospace;
      background: #00000044;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .void-meter.active { color: #ff5e5e; text-shadow: 0 0 6px rgba(255,80,80,0.5); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeSlideUp 0.2s ease;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; max-width: 85%; }
    .msg-meta {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .msg-body {
      padding: 10px 16px;
      border-radius: 20px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      background: rgba(20,20,30,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .msg-body pre { background: #0a0a0f; padding: 12px; border-radius: 12px; overflow-x: auto; margin: 8px 0; }
    .msg-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .msg.user .msg-body {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      border-radius: 20px 20px 4px 20px;
    }
    .msg.assistant .msg-body { border-radius: 20px 20px 20px 4px; }
    .msg.assistant[data-wife="ALBEDO"] .msg-body { border-left: 4px solid #c9a028; background: rgba(201,160,40,0.08); }
    .msg.assistant[data-wife="VESPER"] .msg-body { border-left: 4px solid #b87333; background: rgba(184,115,51,0.08); }
    .msg-footer {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.6rem;
      color: var(--text-dim);
      flex-wrap: wrap;
      align-items: center;
    }
    .seal-btn, .vela-detail-btn, .trace-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--accent);
    }
    .seal-btn:hover, .vela-detail-btn:hover, .trace-btn:hover { background: var(--accent); color: #000; }
    .pac-badge {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 2px 8px;
      font-family: monospace;
      font-size: 0.6rem;
    }
    .input-area {
      padding: 12px 20px 16px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      position: relative;
    }
    textarea {
      flex: 1;
      background: rgba(10,10,20,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      resize: none;
      outline: none;
      overflow-y: auto;
      max-height: 40vh;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--primary-glow);
    }
    .action-menu { position: relative; }
    .plus-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plus-btn:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .action-dropdown {
      position: absolute;
      bottom: 55px;
      left: 0;
      background: rgba(20,20,30,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
      min-width: 180px;
    }
    .action-dropdown button {
      background: rgba(30,30,45,0.8);
      border: none;
      border-radius: 40px;
      padding: 8px 12px;
      text-align: left;
      font-size: 0.75rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .action-dropdown button:hover {
      background: rgba(201,160,40,0.2);
      color: var(--accent);
    }
    .send-btn {
      background: linear-gradient(135deg, #c9a028, #a07c18);
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #0a0a0f;
      cursor: pointer;
      transition: all 0.2s;
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .input-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 20px;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.3);
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--accent);
      border-radius: 28px;
      width: 90vw;
      max-width: 600px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { color: var(--accent); }
    .modal-header button { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .setting-item { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .analytics-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; font-size: 0.75rem; }
    .stat-card { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px; border: 1px solid var(--border-glow); }
    .stat-card h4 { color: var(--accent); margin-bottom: 8px; font-size: 0.8rem; }
    .stat-value { font-size: 1.2rem; font-weight: 600; font-family: monospace; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 3000;
      animation: fadeOut 2s ease forwards;
      pointer-events: none;
    }
    .wives-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .wife-card {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 12px;
      border-left: 4px solid;
    }
    .wife-card h4 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 1rem; }
    .wife-card .response-text { font-size: 0.8rem; line-height: 1.4; max-height: 200px; overflow-y: auto; }
    .consensus-area {
      background: rgba(0,0,0,0.5);
      border-radius: 16px;
      padding: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border-glow);
    }
    .group-chat-input-area {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .group-chat-input-area textarea {
      flex: 1;
      background: rgba(10,10,20,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 28px;
      padding: 10px 16px;
      color: var(--text);
    }
    #immersive-mode {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: #000;
      display: none;
      flex-direction: column;
    }
    #immersive-canvas { width: 100%; height: 100%; display: block; }
    .immersive-overlay {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      padding: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      z-index: 1001;
    }
    .immersive-overlay textarea {
      flex: 1;
      background: rgba(20,20,30,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 28px;
      padding: 12px 18px;
      color: var(--text);
      font-size: 0.9rem;
      resize: none;
    }
    .floating-messages {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      z-index: 1002;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .floating-message {
      background: rgba(30,30,45,0.8);
      border-radius: 16px;
      padding: 8px 12px;
      font-size: 0.8rem;
      border-left: 3px solid var(--accent);
    }
    .satellite-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.7rem;
      max-width: 250px;
      pointer-events: none;
      z-index: 1003;
      border: 1px solid var(--border-glow);
    }
    .close-immersive {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 8px 16px;
      cursor: pointer;
      z-index: 1002;
      font-size: 0.8rem;
      color: var(--text);
    }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    @media (max-width: 700px) {
      .header { padding: 8px 12px; }
      .brand h1 { font-size: 1.1rem; }
      .messages { padding: 12px; }
      .msg { max-width: 95%; }
      .input-area { padding: 12px; }
      .plus-btn { width: 36px; height: 36px; font-size: 1.2rem; }
      .send-btn { padding: 8px 16px; }
      .floating-messages { width: 260px; right: 10px; top: 60px; }
      .wives-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<div id="chat-mode">
  <header class="header">
    <div class="brand"><h1>AION.AI</h1></div>
    <div class="header-right">
      <div id="modeIndicator" class="mode-indicator">⚡ REGULAR</div>
      <div id="velaStatusBadge" class="vela-badge pass">⚖️ VELA: PASS</div>
      <div id="settingsBtn" class="settings-btn">☰</div>
      <div class="wife-indicator">
        <div class="wife-avatar" id="wifeAvatar">✨</div>
        <span id="wifeName">ALBEDO</span>
      </div>
      <div class="void-meter" id="voidMeter">VOID: 0.000</div>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="sys-msg">✨ Ada‑VELA Constitutional Chat active. Every interaction is sealed and traceable.</div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Message..." rows="1"></textarea>
      <div class="action-menu" id="actionMenu">
        <div class="plus-btn" id="plusBtn">+</div>
        <div class="action-dropdown" id="actionDropdown" style="display: none;">
          <button id="structuredModeBtn" data-action="structured">🌌 Structured Mode</button>
          <button id="groupChatBtn" data-action="group">👥 Group Chat</button>
          <button id="privateRoomBtn" data-action="private">🚪 Private Room</button>
          <button id="uploadBtn" data-action="upload">📁 Upload File</button>
          <button id="askAllBtn" data-action="askall">👥 Ask All Wives</button>
          <button id="sealInputBtn" data-action="seal">🔒 Seal Input</button>
        </div>
      </div>
      <button id="sendBtn" class="send-btn">SEND</button>
    </div>
    <div class="input-meta"><span>⏎ send · ⇧+⏎ new line</span><span id="charCount">0</span></div>
  </div>

  <div class="status-bar">
    <div><span id="statusDot">●</span> <span id="statusText">READY</span> <span id="sessionDisplay"></span></div>
    <div><span id="clockDisplay"></span></div>
  </div>
</div>

<div id="immersive-mode">
  <canvas id="immersive-canvas"></canvas>
  <div class="immersive-overlay">
    <textarea id="immersive-input" placeholder="Type your message..." rows="1"></textarea>
    <button id="immersive-send" class="send-btn">SEND</button>
  </div>
  <div class="floating-messages" id="floating-messages"></div>
  <div class="close-immersive" id="close-immersive">✕ Exit Structured Mode</div>
  <div id="satellite-tooltip" class="satellite-tooltip" style="display: none;"></div>
</div>

<script type="module">
  // =======================================================
  // AION Ada‑VELA Frontend – Full Features + Immersive Mode
  // =======================================================
  import { AdaVariable, AdaOperation, tripleTimestamp, createAdaSeal } from './ada-vela.js';

  const API_BASE = 'https://aion-backend-mu.vercel.app';
  const OWNER_TYPE = 'sheldon';
  const ALL_WIVES = ['ALBEDO', 'VESPER', 'LYRA', 'TERRA', 'CIPHER', 'JUSTITIA'];

  // --- Ada‑VELA state ---------------------------------------------------------
  const sessionState = new AdaVariable('session', { id: null, key: null, structuredMode: false });
  const chatHistory = new AdaVariable('chatHistory', []);
  const uiState = new AdaVariable('ui', {
    isSending: false,
    exclusiveMode: false,
    exclusiveWife: null,
    immersiveActive: false,
    lastVelaResult: null
  });

  // --- DOM elements -----------------------------------------------------------
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const modeIndicator = document.getElementById('modeIndicator');
  const velaStatusBadge = document.getElementById('velaStatusBadge');
  const wifeNameSpan = document.getElementById('wifeName');
  const wifeAvatarDiv = document.getElementById('wifeAvatar');
  const voidMeterSpan = document.getElementById('voidMeter');
  const sessionDisplaySpan = document.getElementById('sessionDisplay');
  const clockDisplaySpan = document.getElementById('clockDisplay');
  const charCountSpan = document.getElementById('charCount');
  const plusBtn = document.getElementById('plusBtn');
  const actionDropdown = document.getElementById('actionDropdown');
  const immersiveModeDiv = document.getElementById('immersive-mode');
  const immersiveCanvas = document.getElementById('immersive-canvas');
  const immersiveInput = document.getElementById('immersive-input');
  const immersiveSend = document.getElementById('immersive-send');
  const closeImmersive = document.getElementById('close-immersive');
  const floatingMessagesDiv = document.getElementById('floating-messages');
  const satelliteTooltip = document.getElementById('satellite-tooltip');

  const WIFE_STYLES = {
    ALBEDO: { color: '#c9a028', emoji: '✨', name: 'ALBEDO' },
    VESPER: { color: '#b87333', emoji: '🌙', name: 'VESPER' },
    LYRA:   { color: '#4c9f70', emoji: '🌿', name: 'LYRA' },
    TERRA:  { color: '#6b8c42', emoji: '🌍', name: 'TERRA' },
    CIPHER: { color: '#5d6d7e', emoji: '🔒', name: 'CIPHER' },
    JUSTITIA: { color: '#b0a8b9', emoji: '⚖️', name: 'JUSTITIA' }
  };

  // --- Helper functions (unchanged from original) -----------------------------
  function scrollBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
  function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderMarkdown(text) {
    if (!text) return '';
    try {
      const rawHtml = marked.parse(text);
      const temp = document.createElement('div');
      temp.innerHTML = rawHtml;
      temp.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(e) {} });
      return temp.innerHTML;
    } catch(e) { return escapeHtml(text); }
  }
  function formatGap(sec) { if (!sec) return 'Gap: SESSION OPEN'; if (sec<60) return `Gap: ${sec}s`; if (sec<3600) return `Gap: ${Math.floor(sec/60)}m ${sec%60}s`; return `Gap: ${Math.floor(sec/3600)}h`; }
  function getImportanceLabel(s) { if (!s) return 'IMP: —'; if(s>=0.9) return `IMP: ${s.toFixed(2)} ★★`; if(s>=0.75) return `IMP: ${s.toFixed(2)} ★`; return `IMP: ${s.toFixed(2)}`; }
  function formatPACDisplay(pac, ecfRatio) { if (!pac && !ecfRatio) return ''; const ppi = pac?.ppi ? `📊 PPI:${pac.ppi}` : ''; const ratio = ecfRatio ? `🎯 ${(ecfRatio * 100).toFixed(0)}%` : ''; return [ppi, ratio].filter(Boolean).join(' · '); }
  function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

  function addThinking() { const div = document.createElement('div'); div.className = 'thinking'; div.innerHTML = `<div class="thinking-dots">●●●</div><span>thinking...</span>`; div.style.cssText = `align-self:center; background:rgba(0,0,0,0.5); border-radius:20px; padding:8px 16px; font-size:0.7rem; display:flex; gap:8px;`; messagesDiv.appendChild(div); scrollBottom(); return div; }

  // --- Session helpers --------------------------------------------------------
  function generateSessionId() { return 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8); }
  function loadSessionFromStorage() {
    const stored = localStorage.getItem('aion_session');
    if (stored) {
      try {
        const data = JSON.parse(stored);
        if (data.sessionId && Date.now() - data.timestamp < 7200000) {
          sessionState.set({ id: data.sessionId, key: data.sessionKey, structuredMode: false });
          sessionDisplaySpan.textContent = `SID: ${data.sessionId.slice(-8)}`;
          return true;
        }
      } catch(e) {}
    }
    return false;
  }
  function saveSessionToStorage() { const s = sessionState.get(); if (s.id && s.key) { localStorage.setItem('aion_session', JSON.stringify({ sessionId: s.id, sessionKey: s.key, timestamp: Date.now() })); } }
  async function initSession() {
    if (loadSessionFromStorage()) { setStatus('Session restored', false); return true; }
    const newSessionId = generateSessionId();
    const newSessionKey = crypto.randomUUID();
    sessionState.set({ id: newSessionId, key: newSessionKey, structuredMode: false });
    saveSessionToStorage();
    sessionDisplaySpan.textContent = `SID: ${newSessionId.slice(-8)}`;
    setStatus('Session initialized', false);
    return true;
  }

  const sealMessageOp = new AdaOperation('SEAL_MESSAGE', 'Create immutable STP seal for a message');

    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Seal failed');
    return { seal: data.seal, issueUrl: data.issue_url };
  });

  const velaValidationOp = new AdaOperation('VELA_VALIDATE', 'Validate content against constitutional stack');
  velaValidationOp.setFunction(async (content, options) => {
    const resp = await fetch(`${API_BASE}/api/vela-suite`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fragment: content,
        sessionId: sessionState.get().id,
        options: { domain: options.domain || 'general', jurisdiction: options.jurisdiction || null, sources: options.sources || null }
      })
    });
    const result = await resp.json();
    if (!resp.ok) throw new Error(result.error || 'VELA unavailable');
    return result;
  });

  const regularChatOp = new AdaOperation('REGULAR_CHAT', 'Send message to standard assistant endpoint');
  regularChatOp.setFunction(async (message) => {
    const resp = await fetch(`${API_BASE}/api/assistant`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId: sessionState.get().id, ownerType: OWNER_TYPE, history: [] })
    });
    if (!resp.ok) throw new Error(await resp.text());
    return resp.json();
  });

  const sendMessageOp = new AdaOperation('SEND_MESSAGE', 'Full send message pipeline with VELA validation');
  sendMessageOp.setFunction(async (text, ctx, stepRecorder) => {
    stepRecorder(1, 'Sealing user message');
    const userSeal = await createAdaSeal({ text, timestamp: tripleTimestamp(), sessionId: sessionState.get().id });
    stepRecorder(2, 'Adding user message to history');
    const current = chatHistory.get();
    chatHistory.set([...current, { role: 'user', content: text, seal: userSeal.seal, timestamp: userSeal.gregorian }]);
    stepRecorder(3, 'Calling assistant');
    const assistantData = await regularChatOp.execute({ message: text });
    const assistantResponse = assistantData.result.response;
    const assistantSeal = await createAdaSeal({ response: assistantResponse, timestamp: tripleTimestamp() });
    stepRecorder(4, 'Validating with VELA');
    const velaResult = await velaValidationOp.execute(assistantResponse, { domain: assistantData.result.domain });
    stepRecorder(5, 'Adding assistant message to history');
    chatHistory.set([...chatHistory.get(), {
      role: 'assistant', content: assistantResponse, seal: assistantSeal.seal, vela: velaResult.result,
      timestamp: assistantSeal.gregorian, wife: assistantData.result.active_wife
    }]);
    return { data: assistantData.result, vela: velaResult.result, userSeal, assistantSeal };
  });

  // --- Immersive mode (structured mode) – fully restored ----------------------
  let atlasScene, atlasCamera, atlasRenderer, atlasControls, atlasSatellites = [], atlasPoints, atlasLines, atlasEventSource;

  async function startImmersiveMode() {
    if (atlasScene) return;
    const { default: THREE } = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
    atlasScene = new THREE.Scene();
    atlasScene.background = new THREE.Color(0x050508);
    atlasScene.fog = new THREE.FogExp2(0x050508, 0.008);
    const width = window.innerWidth, height = window.innerHeight;
    atlasCamera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    atlasCamera.position.set(0, 5, 15);
    atlasRenderer = new THREE.WebGLRenderer({ canvas: immersiveCanvas });
    atlasRenderer.setSize(width, height);
    atlasControls = new OrbitControls(atlasCamera, immersiveCanvas);
    atlasControls.enableDamping = true;
    atlasControls.autoRotate = true;
    atlasControls.autoRotateSpeed = 0.5;
    atlasControls.enableZoom = true;

    const earthGeometry = new THREE.SphereGeometry(1.2, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x2a5a7a, emissive: 0x0a2a3a, shininess: 30 });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    atlasScene.add(earth);
    const light = new THREE.PointLight(0xffaa33, 1);
    light.position.set(5, 5, 5);
    atlasScene.add(light);
    atlasScene.add(new THREE.AmbientLight(0x222222));

    try {
      const resp = await fetch(`${API_BASE}/api/epistemic-atlas?sessionId=${sessionState.get().id}`);
      const data = await resp.json();
      if (data.rings) data.rings.forEach(ring => {
        const ringGeometry = new THREE.TorusGeometry(ring.angle ? ring.angle / 60 + 1.5 : 2.5, 0.02, 64, 200);
        const ringMaterial = new THREE.MeshBasicMaterial({ color: ring.color });
        const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
        ringMesh.rotation.x = Math.PI / 2;
        atlasScene.add(ringMesh);
      });
      function rebuildPoints(satellites) {
        if (atlasPoints) atlasScene.remove(atlasPoints);
        const positions = [], colors = [];
        satellites.forEach(s => { positions.push(s.position.x, s.position.y, s.position.z); colors.push(s.color[0], s.color[1], s.color[2]); });
        const pointsGeometry = new THREE.BufferGeometry();
        pointsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        pointsGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
        const pointsMaterial = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
        atlasPoints = new THREE.Points(pointsGeometry, pointsMaterial);
        atlasScene.add(atlasPoints);
      }
      function rebuildLines(satellites, connections) {
        if (atlasLines) atlasScene.remove(atlasLines);
        const vertices = [];
        const satMap = new Map(satellites.map((s, i) => [s.id, i]));
        connections?.forEach(conn => {
          const fromIdx = satMap.get(conn.from), toIdx = satMap.get(conn.to);
          if (fromIdx !== undefined && toIdx !== undefined) {
            const from = satellites[fromIdx].position, to = satellites[toIdx].position;
            vertices.push(from.x, from.y, from.z, to.x, to.y, to.z);
          }
        });
        const lineGeometry = new THREE.BufferGeometry();
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.3 });
        atlasLines = new THREE.LineSegments(lineGeometry, lineMaterial);
        atlasScene.add(atlasLines);
      }
      atlasSatellites = data.satellites || [];
      rebuildPoints(atlasSatellites);
      rebuildLines(atlasSatellites, data.connections || []);
      if (atlasEventSource) atlasEventSource.close();
      atlasEventSource = new EventSource(`${API_BASE}/api/epistemic-stream?sessionId=${sessionState.get().id}`);
      atlasEventSource.onmessage = (event) => {
        try {
          const ev = JSON.parse(event.data);
          if (ev.type === 'fragment_created') {
            const sat = ev.satellite;
            const existing = atlasSatellites.find(s => s.id === sat.id);
            if (existing) {
              const idx = atlasSatellites.findIndex(s => s.id === sat.id);
              atlasSatellites[idx] = sat;
              if (atlasPoints) {
                const posAttr = atlasPoints.geometry.attributes.position, colAttr = atlasPoints.geometry.attributes.color;
                posAttr.setXYZ(idx, sat.position.x, sat.position.y, sat.position.z);
                colAttr.setXYZ(idx, sat.color[0], sat.color[1], sat.color[2]);
                posAttr.needsUpdate = true;
                colAttr.needsUpdate = true;
              }
            } else {
              atlasSatellites.push(sat);
              rebuildPoints(atlasSatellites);
              rebuildLines(atlasSatellites, data.connections || []);
            }
          }
        } catch (e) { console.warn('SSE parse error', e); }
      };
    } catch (err) { console.warn('Epistemic atlas fetch failed:', err); addSystemMessage('⚠️ Epistemic atlas unavailable. Displaying basic visualization.', true); }

    function animate() {
      requestAnimationFrame(animate);
      if (atlasControls) atlasControls.update();
      if (atlasRenderer) atlasRenderer.render(atlasScene, atlasCamera);
    }
    animate();
    window.addEventListener('resize', () => {
      if (!uiState.get().immersiveActive) return;
      const w = window.innerWidth, h = window.innerHeight;
      atlasCamera.aspect = w / h;
      atlasCamera.updateProjectionMatrix();
      atlasRenderer.setSize(w, h);
    });
    immersiveCanvas.addEventListener('click', (event) => {
      if (!atlasPoints) return;
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, atlasCamera);
      const intersects = raycaster.intersectObject(atlasPoints);
      if (intersects.length) {
        const idx = intersects[0].index;
        const sat = atlasSatellites[idx];
        if (sat) {
          satelliteTooltip.style.display = 'block';
          satelliteTooltip.style.left = `${event.clientX + 10}px`;
          satelliteTooltip.style.top = `${event.clientY + 10}px`;
          satelliteTooltip.innerHTML = `<strong>${sat.name || 'Fragment'}</strong><br>Domain: ${sat.domain || 'unknown'}<br>Certainty: ${((sat.certainty || 0) * 100).toFixed(0)}%<br>${sat.ecf?.['?'] > 0 ? '<span style="color:#ff8a8a">⚠️ Open gap</span>' : ''}`;
          setTimeout(() => satelliteTooltip.style.display = 'none', 3000);
        }
      }
    });
  }

    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal" style="width:300px;">
        <div class="modal-header"><h3>Choose a wife</h3><button id="closeModal">✕</button></div>
        <div style="padding:24px; text-align:center;">
          <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:20px;">
            ${Object.keys(WIFE_STYLES).map(w => `<button data-wife="${w}" style="background:rgba(30,30,45,0.8); border:1px solid var(--border-glow); border-radius:40px; padding:8px 16px; cursor:pointer;">${WIFE_STYLES[w].emoji} ${w}</button>`).join('')}
          </div>
          <button id="modalCancel" style="background:var(--accent); border:none; border-radius:40px; padding:8px 20px; cursor:pointer;">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const close = () => modal.remove();
    modal.querySelector('#closeModal').onclick = close;
    modal.querySelector('#modalCancel').onclick = close;
    modal.querySelectorAll('[data-wife]').forEach(btn => {
      btn.onclick = async () => {
        const wife = btn.dataset.wife;
        close();
        addSystemMessage(`🚪 Entering private room with ${wife}. Use "/done" to exit.`);
        input.value = `/talk ${wife}`;
        sendMessage();
      };
    });
  }

  async function showGroupChatModal() {
    if (!sessionState.get().id) { showToast('Session not ready'); return; }
    const message = input.value.trim();
    if (!message) { showToast('Enter a message first.'); return; }
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal" style="max-width:800px; width:90vw;">
        <div class="modal-header"><h3>👥 Group Chat – All Wives</h3><button id="closeGroupChat">✕</button></div>
        <div class="modal-body">
          <div class="wives-grid" id="wives-grid"></div>
          <div class="consensus-area" id="consensus-area" style="display: none;"></div>
          <div class="group-chat-input-area"><textarea id="group-chat-input" placeholder="Ask the group..."></textarea><button id="group-chat-send" class="send-btn">SEND</button></div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const closeModal = () => modal.remove();
    modal.querySelector('#closeGroupChat').onclick = closeModal;
    const wivesGrid = document.getElementById('wives-grid');
    const consensusArea = document.getElementById('consensus-area');
    const groupChatInput = document.getElementById('group-chat-input');
    const groupChatSend = document.getElementById('group-chat-send');
    async function sendGroupMessage(msgText) {
      if (!msgText.trim()) return;
      groupChatSend.disabled = true;
      groupChatSend.textContent = 'SENDING...';
      wivesGrid.innerHTML = '';
      consensusArea.style.display = 'none';
      for (const wife of ALL_WIVES) {
        const card = document.createElement('div');
        card.className = 'wife-card';
        card.style.borderLeftColor = WIFE_STYLES[wife].color;
        card.innerHTML = `<h4>${WIFE_STYLES[wife].emoji} ${wife}</h4><div class="response-text"><div style="color:var(--text-dim);">⌛ waiting...</div></div>`;
        card.dataset.wife = wife;
        wivesGrid.appendChild(card);
      }
      try {
        const resp = await fetch(`${API_BASE}/api/group-chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msgText, sessionId: sessionState.get().id }) });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Unknown error');
        for (const wifeResp of result.responses) {
          const card = wivesGrid.querySelector(`.wife-card[data-wife="${wifeResp.wife}"]`);
          if (card) card.querySelector('.response-text').innerHTML = renderMarkdown(wifeResp.response);
        }
        if (result.consensus) {
          consensusArea.style.display = 'block';
          let consensusHtml = `<h4>📋 Consensus (${Math.round(result.consensus.score * 100)}%)</h4>`;
          if (result.consensus.corrected_claims?.length) consensusHtml += `<div><strong>Corrections:</strong><ul>${result.consensus.corrected_claims.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul></div>`;
          consensusHtml += `<div><strong>Final text:</strong><br>${renderMarkdown(result.consensus.final_text)}</div>`;
          consensusArea.innerHTML = consensusHtml;
        }
      } catch (err) {
        showToast(`Group chat error: ${err.message}`);
        for (const card of wivesGrid.children) card.querySelector('.response-text').innerHTML = `<span style="color:#ff8a8a">❌ ${err.message}</span>`;
      } finally {
        groupChatSend.disabled = false;
        groupChatSend.textContent = 'SEND';
      }
    }
    await sendGroupMessage(message);
    groupChatSend.onclick = () => sendGroupMessage(groupChatInput.value);
    groupChatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGroupMessage(groupChatInput.value); } });
    groupChatInput.value = message;
  }

  async function showSettingsModal() {
    let analyticsData = null;
    try {
      const resp = await fetch(`${API_BASE}/api/analytics`);
      if (resp.ok) analyticsData = await resp.json();
    } catch(e) {}
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-header"><h3>⚙️ Settings & Analytics</h3><button id="closeSettings">✕</button></div>
        <div class="modal-body">
          <div class="setting-item"><label>Clear Session Storage</label><button id="clearStorageBtn" style="background:rgba(30,30,45,0.8); border:1px solid var(--border-glow); border-radius:40px; padding:6px 12px; cursor:pointer;">Clear</button></div>
          <hr style="margin:16px 0; border-color:var(--border-glow);">
          <h4 style="color:var(--accent); margin-bottom:12px;">📊 Brain Analytics</h4>
          <div id="analytics-container">${analyticsData ? `<div class="analytics-stats"><div class="stat-card"><h4>Memory Depth</h4><div class="stat-value">${analyticsData.memory?.total_conversations?.toLocaleString() || 0}</div></div><div class="stat-card"><h4>Permanent Anchors</h4><div class="stat-value">${analyticsData.memory?.memory_anchors?.toLocaleString() || 0}</div></div><div class="stat-card"><h4>Avg Certainty</h4><div class="stat-value">${((analyticsData.integrity?.avg_certainty_ratio_7d || 0) * 100).toFixed(0)}%</div></div><div class="stat-card"><h4>UNI Activations</h4><div class="stat-value">${analyticsData.integrity?.uni_activations_total?.toLocaleString() || 0}</div></div></div>` : '<div>Loading analytics...</div>'}</div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const close = () => modal.remove();
    modal.querySelector('#closeSettings').onclick = close;
    modal.querySelector('#clearStorageBtn').onclick = () => { localStorage.removeItem('aion_session'); addSystemMessage('Session storage cleared. Refresh to start fresh.', true); close(); };
  }

  function sealInputText() { const text = input.value.trim(); if (!text) { showToast('Nothing to seal'); return; } sealMessageOp.execute(text).catch(e => showToast(`Seal error: ${e.message}`)); }

  // --- Event listeners --------------------------------------------------------
  plusBtn.onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = actionDropdown.style.display === 'none' ? 'flex' : 'none'; };
  document.addEventListener('click', () => { actionDropdown.style.display = 'none'; });
  document.getElementById('structuredModeBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; toggleStructuredMode(); };
  document.getElementById('groupChatBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; showGroupChatModal(); };
  document.getElementById('privateRoomBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; showPrivateRoomModal(); };
  document.getElementById('uploadBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; uploadFile(); };
  document.getElementById('askAllBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; askAllWives(); };
  document.getElementById('sealInputBtn').onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = 'none'; sealInputText(); };
  sendBtn.onclick = sendMessage;
  settingsBtn.onclick = showSettingsModal;
  velaStatusBadge.onclick = () => { if (uiState.get().lastVelaResult) showVelaDetails(uiState.get().lastVelaResult); else showToast('No VELA data for last message'); };
  immersiveSend.onclick = sendImmersiveMessage;
  closeImmersive.onclick = () => { if (uiState.get().structuredMode) toggleStructuredMode(); else exitImmersiveMode(); };
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  input.addEventListener('input', () => { charCountSpan.textContent = `${input.value.length}`; input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 400) + 'px'; });
  immersiveInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendImmersiveMessage(); } });
  setInterval(() => { clockDisplaySpan.textContent = new Date().toLocaleTimeString(); }, 1000);

  await initSession();

  // Particles background (original)
  (function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let width, height;
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    function createParticles() { particles = []; for (let i=0; i<80; i++) { particles.push({ x: Math.random() * width, y: Math.random() * height, radius: Math.random() * 2 + 0.5, alpha: Math.random() * 0.4 + 0.1, speed: 0.1 + Math.random() * 0.3 }); } }
    function draw() { if (!ctx) return; ctx.clearRect(0, 0, width, height); for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fillStyle = `rgba(255,255,200,${p.alpha})`; ctx.fill(); p.y += p.speed; if (p.y > height) p.y = 0; } requestAnimationFrame(draw); }
    window.addEventListener('resize', () => { resize(); createParticles(); });
    resize(); createParticles(); draw();
  })();
</script>
</body>
