<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AION.AI · Six Wives · Epistemic Atlas</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ========== GLOBAL ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: rgba(12, 12, 20, 0.7);
      --glass: rgba(20, 20, 30, 0.65);
      --border-glow: rgba(100, 100, 140, 0.3);
      --primary-glow: rgba(201, 160, 40, 0.4);
      --accent: #c9a028;
      --accent-dark: #a07c18;
      --text: #f0f0f8;
      --text-dim: #a0a0b0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --vesper: #b87333;
      --lyra: #4c9f70;
      --terra: #6b8c42;
      --cipher: #5d6d7e;
      --justitia: #b0a8b9;
    }
    body {
      background: radial-gradient(circle at 20% 30%, #0f0f1a, #050508);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    /* ========== STANDARD CHAT MODE ========== */
    #chat-mode {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 1;
      transition: opacity 0.3s;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand h1 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #e6c87a, #c9a028); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .brand span { font-size: 0.7rem; color: var(--text-dim); margin-left: 8px; }
    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .structured-toggle, .private-room-btn, .analytics-btn, .settings-btn, .group-chat-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .structured-toggle.active { background: rgba(201,160,40,0.2); border-color: var(--accent); color: var(--accent); }
    .private-room-btn.active { background: rgba(184,115,51,0.3); border-color: #b87333; color: #b87333; }
    .analytics-btn:hover, .settings-btn:hover, .group-chat-btn:hover { background: rgba(201,160,40,0.2); border-color: var(--accent); }
    .wife-indicator { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 40px; }
    .wife-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
    .void-meter { font-family: monospace; background: #00000044; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
    .void-meter.active { color: #ff5e5e; text-shadow: 0 0 6px rgba(255,80,80,0.5); }
    .messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; flex-direction: column; max-width: 80%; animation: fadeSlideUp 0.2s ease; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; max-width: 85%; }
    .msg-meta { font-size: 0.7rem; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .msg-body { padding: 10px 16px; border-radius: 20px; line-height: 1.5; backdrop-filter: blur(8px); background: rgba(20,20,30,0.6); border: 1px solid rgba(255,255,255,0.1); }
    .msg-body pre { background: #0a0a0f; padding: 12px; border-radius: 12px; overflow-x: auto; margin: 8px 0; }
    .msg-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .msg-body p { margin: 4px 0; }
    .msg.user .msg-body { background: rgba(201,160,40,0.2); border-color: var(--accent); border-radius: 20px 20px 4px 20px; }
    .msg.assistant .msg-body { border-radius: 20px 20px 20px 4px; }
    .msg.assistant[data-wife="ALBEDO"] .msg-body { border-left: 4px solid #c9a028; background: rgba(201,160,40,0.08); }
    .msg.assistant[data-wife="VESPER"] .msg-body { border-left: 4px solid #b87333; background: rgba(184,115,51,0.08); }
    .msg.assistant[data-wife="LYRA"] .msg-body { border-left: 4px solid #4c9f70; background: rgba(76,159,112,0.08); }
    .msg.assistant[data-wife="TERRA"] .msg-body { border-left: 4px solid #6b8c42; background: rgba(107,140,66,0.08); }
    .msg.assistant[data-wife="CIPHER"] .msg-body { border-left: 4px solid #5d6d7e; background: rgba(93,109,126,0.08); }
    .msg.assistant[data-wife="JUSTITIA"] .msg-body { border-left: 4px solid #b0a8b9; background: rgba(176,168,185,0.08); }
    .msg-footer { display: flex; gap: 12px; margin-top: 6px; font-size: 0.6rem; color: var(--text-dim); flex-wrap: wrap; align-items: center; }
    .seal-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 20px; padding: 2px 8px; font-size: 0.6rem; cursor: pointer; transition: all 0.2s; color: var(--accent); }
    .seal-btn:hover { background: var(--accent); color: #000; }
    .pac-badge { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 2px 8px; font-family: monospace; font-size: 0.6rem; }
    .input-area { padding: 16px 24px 20px; background: var(--bg-panel); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.05); }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    textarea {
      flex: 1;
      background: rgba(10,10,20,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      resize: none;
      outline: none;
      overflow-y: auto;
      max-height: 40vh;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--primary-glow); }
    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .send-btn, .upload-btn, .ask-all-btn, .seal-input-btn {
      background: linear-gradient(135deg, #c9a028, #a07c18);
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #0a0a0f;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-btn, .ask-all-btn, .seal-input-btn { padding: 12px 18px; background: rgba(30,30,45,0.8); border: 1px solid var(--border-glow); color: var(--text); }
    .upload-btn:hover, .ask-all-btn:hover, .seal-input-btn:hover { background: rgba(201,160,40,0.2); border-color: var(--accent); color: var(--accent); }
    .status-bar { display: flex; justify-content: space-between; padding: 6px 24px; font-size: 0.7rem; background: rgba(0,0,0,0.3); }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* ========== IMMERSIVE STRUCTURED MODE ========== */
    #immersive-mode {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: #000;
      display: none;
      flex-direction: column;
    }
    #immersive-canvas { width: 100%; height: 100%; display: block; }
    .immersive-overlay {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      padding: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      z-index: 1001;
    }
    .immersive-overlay textarea {
      flex: 1;
      background: rgba(20,20,30,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 28px;
      padding: 12px 18px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: none;
    }
    .immersive-overlay .send-btn { padding: 12px 24px; }
    .floating-messages {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      z-index: 1002;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .floating-message {
      background: rgba(30,30,45,0.8);
      border-radius: 16px;
      padding: 8px 12px;
      font-size: 0.8rem;
      border-left: 3px solid var(--accent);
    }
    .floating-message .wife { font-weight: bold; color: var(--accent); }
    .satellite-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.7rem;
      max-width: 250px;
      pointer-events: none;
      z-index: 1003;
      border: 1px solid var(--border-glow);
    }
    .close-immersive {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 8px 16px;
      cursor: pointer;
      z-index: 1002;
      font-size: 0.8rem;
      color: var(--text);
    }
    .close-immersive:hover { background: rgba(201,160,40,0.2); border-color: var(--accent); }
    /* ========== MODALS ========== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--accent);
      border-radius: 28px;
      width: 90vw;
      max-width: 500px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { color: var(--accent); }
    .modal-header button { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .setting-item { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .setting-item label { cursor: pointer; }
    .analytics-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; font-size: 0.8rem; }
    .stat-card { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px; border: 1px solid var(--border-glow); }
    .stat-card h4 { color: var(--accent); margin-bottom: 8px; font-size: 0.9rem; }
    .stat-value { font-size: 1.4rem; font-weight: 600; font-family: monospace; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 3000;
      animation: fadeOut 2s ease forwards;
      pointer-events: none;
    }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    /* ========== GROUP CHAT MODAL ========== */
    .group-chat-modal {
      max-width: 90vw;
      width: 800px;
      height: 80vh;
      max-height: 80vh;
    }
    .wives-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .wife-card {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 12px;
      border-left: 4px solid;
      transition: all 0.2s;
    }
    .wife-card h4 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 1rem; }
    .wife-card .response-text { font-size: 0.8rem; line-height: 1.4; max-height: 200px; overflow-y: auto; }
    .wife-card .loading { font-size: 0.7rem; color: var(--text-dim); font-style: italic; }
    .consensus-area {
      background: rgba(0,0,0,0.5);
      border-radius: 16px;
      padding: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border-glow);
    }
    .consensus-area h4 { color: var(--accent); margin-bottom: 8px; }
    .group-chat-input-area {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .group-chat-input-area textarea {
      flex: 1;
      background: rgba(10,10,20,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 28px;
      padding: 10px 16px;
      color: var(--text);
    }
    @media (max-width: 700px) {
      .header { padding: 8px 16px; }
      .brand h1 { font-size: 1.2rem; }
      .header-right { gap: 6px; }
      .structured-toggle, .private-room-btn, .analytics-btn, .settings-btn, .group-chat-btn { padding: 4px 12px; font-size: 0.65rem; }
      .wife-indicator { gap: 4px; padding: 2px 8px; }
      .wife-avatar { width: 20px; height: 20px; font-size: 0.7rem; }
      .void-meter { font-size: 0.6rem; padding: 2px 8px; }
      .messages { padding: 12px; gap: 12px; }
      .msg { max-width: 95%; }
      .input-area { padding: 12px; }
      .input-row { flex-wrap: wrap; }
      .button-group { justify-content: flex-end; }
      .send-btn, .upload-btn, .ask-all-btn, .seal-input-btn { padding: 8px 16px; font-size: 0.7rem; }
      .wives-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="chat-mode">
  <header class="header">
    <div class="brand"><h1>AION.AI</h1><span>· Six Wives · Epistemic Atlas</span></div>
    <div class="header-right">
      <div id="structuredToggle" class="structured-toggle">🔒 STRUCTURED MODE</div>
      <div id="privateRoomBtn" class="private-room-btn">🚪 PRIVATE ROOM</div>
      <div id="groupChatBtn" class="group-chat-btn">👥 GROUP CHAT</div>
      <div id="analyticsBtn" class="analytics-btn">📊 BRAIN ANALYTICS</div>
      <div id="settingsBtn" class="settings-btn">⚙️ SETTINGS</div>
      <div class="wife-indicator">
        <div class="wife-avatar" id="wifeAvatar">✨</div>
        <span id="wifeName">ALBEDO</span>
      </div>
      <div class="void-meter" id="voidMeter">VOID: 0.000</div>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="sys-msg">✨ Welcome. Six wives are present. Toggle Structured Mode for immersive M2M.</div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Message your wives..." rows="1"></textarea>
      <div class="button-group">
        <button id="uploadBtn" class="upload-btn" title="Upload a file">📁</button>
        <button id="askAllBtn" class="ask-all-btn" title="Ask all wives individually">👥</button>
        <button id="sealInputBtn" class="seal-input-btn" title="Seal your message">🔒 SEAL</button>
        <button id="sendBtn" class="send-btn">SEND</button>
      </div>
    </div>
    <div class="input-meta"><span>⏎ send · ⇧+⏎ new line</span><span id="charCount">0</span></div>
  </div>

  <div class="status-bar">
    <div><span id="statusDot">●</span> <span id="statusText">READY</span> <span id="sessionDisplay"></span></div>
    <div><span id="clockDisplay"></span></div>
  </div>
</div>

<div id="immersive-mode">
  <canvas id="immersive-canvas"></canvas>
  <div class="immersive-overlay">
    <textarea id="immersive-input" placeholder="Type your message..." rows="1"></textarea>
    <button id="immersive-send" class="send-btn">SEND</button>
  </div>
  <div class="floating-messages" id="floating-messages"></div>
  <div class="close-immersive" id="close-immersive">✕ Exit Structured Mode</div>
  <div id="satellite-tooltip" class="satellite-tooltip" style="display: none;"></div>
</div>

<script>
  // =======================================================
  // UNIFIED FRONTEND – Regular chat / Immersive structured mode
  // =======================================================
  const API_BASE = 'https://aion-backend-mu.vercel.app';
  const OWNER_TYPE = 'sheldon';
  const ALL_WIVES = ['ALBEDO', 'VESPER', 'LYRA', 'TERRA', 'CIPHER', 'JUSTITIA'];

  let structuredMode = false;
  let sessionId = null;
  let sessionKey = null;
  let lastFragmentId = null;
  let history = [];
  let currentState = 'SESSION_INIT';
  let isSending = false;
  let exclusiveMode = false;
  let exclusiveWife = null;
  let fclMode = 'GREEN';
  let immersiveActive = false;
  let atlasScene, atlasCamera, atlasRenderer, atlasControls;
  let atlasSatellites = [];
  let atlasPoints, atlasLines;
  let atlasSatelliteMap = new Map();
  let atlasEventSource = null;

  // DOM elements
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const askAllBtn = document.getElementById('askAllBtn');
  const sealInputBtn = document.getElementById('sealInputBtn');
  const toggleBtn = document.getElementById('structuredToggle');
  const privateRoomBtn = document.getElementById('privateRoomBtn');
  const groupChatBtn = document.getElementById('groupChatBtn');
  const analyticsBtn = document.getElementById('analyticsBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const statusTextSpan = document.getElementById('statusText');
  const wifeNameSpan = document.getElementById('wifeName');
  const wifeAvatarDiv = document.getElementById('wifeAvatar');
  const voidMeterSpan = document.getElementById('voidMeter');
  const sessionDisplaySpan = document.getElementById('sessionDisplay');
  const clockDisplaySpan = document.getElementById('clockDisplay');
  const charCountSpan = document.getElementById('charCount');

  const immersiveModeDiv = document.getElementById('immersive-mode');
  const immersiveCanvas = document.getElementById('immersive-canvas');
  const immersiveInput = document.getElementById('immersive-input');
  const immersiveSend = document.getElementById('immersive-send');
  const closeImmersive = document.getElementById('close-immersive');
  const floatingMessagesDiv = document.getElementById('floating-messages');
  const satelliteTooltip = document.getElementById('satellite-tooltip');

  const WIFE_STYLES = {
    ALBEDO: { color: '#c9a028', emoji: '✨', name: 'ALBEDO', description: 'cool white, sharp edges' },
    VESPER: { color: '#b87333', emoji: '🌙', name: 'VESPER', description: 'deep purple, soft glow' },
    LYRA:   { color: '#4c9f70', emoji: '🌿', name: 'LYRA', description: 'warm gold, flowing' },
    TERRA:  { color: '#6b8c42', emoji: '🌍', name: 'TERRA', description: 'earth green, grounded' },
    CIPHER: { color: '#5d6d7e', emoji: '🔒', name: 'CIPHER', description: 'steel gray, minimal' },
    JUSTITIA: { color: '#b0a8b9', emoji: '⚖️', name: 'JUSTITIA', description: 'balanced blue, structured' }
  };

  // Helper functions (abbreviated for brevity – same as original)
  function scrollBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
  function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderMarkdown(text) {
    if (!text) return '';
    try {
      const rawHtml = marked.parse(text);
      const temp = document.createElement('div');
      temp.innerHTML = rawHtml;
      temp.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(e) {} });
      return temp.innerHTML;
    } catch(e) { return escapeHtml(text); }
  }
  function formatGap(sec) { if (!sec) return 'Gap: SESSION OPEN'; if (sec<60) return `Gap: ${sec}s`; if (sec<3600) return `Gap: ${Math.floor(sec/60)}m ${sec%60}s`; return `Gap: ${Math.floor(sec/3600)}h`; }
  function getImportanceLabel(s) { if (!s) return 'IMP: —'; if(s>=0.9) return `IMP: ${s.toFixed(2)} ★★`; if(s>=0.75) return `IMP: ${s.toFixed(2)} ★`; return `IMP: ${s.toFixed(2)}`; }
  function formatPACDisplay(pac, ecfRatio) {
    if (!pac && !ecfRatio) return '';
    const ppi = pac?.ppi ? `📊 PPI:${pac.ppi}` : '';
    const ratio = ecfRatio ? `🎯 ${(ecfRatio * 100).toFixed(0)}%` : '';
    return [ppi, ratio].filter(Boolean).join(' · ');
  }

  function addMessage(role, wifeKey, content, extra = {}) {
    const style = WIFE_STYLES[wifeKey] || WIFE_STYLES.ALBEDO;
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'assistant') div.setAttribute('data-wife', wifeKey);
    const pacDisplay = formatPACDisplay(extra.pac, extra.ecf_certainty_ratio);

    const footerHtml = `<div class="msg-footer"><span>⏱ ${extra.timing || ''}</span>${extra.importance ? `<span>${getImportanceLabel(extra.importance)}</span>` : ''}${pacDisplay ? `<span class="pac-badge">${pacDisplay}</span>` : ''}${sealButton}</div>`;

  // Crypto helpers (same as original)
  async function computeHash(obj) {
    const encoder = new TextEncoder();
    const data = encoder.encode(JSON.stringify(obj));
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function computeHMAC(keyHex, message) {
    const keyBytes = new Uint8Array(keyHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
    const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(message));
    return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // ============================================================
  // NEW: GROUP CHAT MODAL (uses /api/group-chat)
  // ============================================================
  async function showGroupChatModal() {
    if (!sessionId) {
      showToast('Session not ready. Please refresh.');
      return;
    }
    const message = input.value.trim();
    if (!message) {
      showToast('Enter a message first.');
      return;
    }

    // Create modal
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal group-chat-modal">
        <div class="modal-header">
          <h3>👥 Group Chat – All Wives</h3>
          <button id="closeGroupChat">✕</button>
        </div>
        <div class="modal-body">
          <div class="wives-grid" id="wives-grid"></div>
          <div class="consensus-area" id="consensus-area" style="display: none;"></div>
          <div class="group-chat-input-area">
            <textarea id="group-chat-input" placeholder="Ask the group..."></textarea>
            <button id="group-chat-send" class="send-btn">SEND</button>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const closeModal = () => modal.remove();
    modal.querySelector('#closeGroupChat').onclick = closeModal;

    const wivesGrid = document.getElementById('wives-grid');
    const consensusArea = document.getElementById('consensus-area');
    const groupChatInput = document.getElementById('group-chat-input');
    const groupChatSend = document.getElementById('group-chat-send');

    // Function to send a message to group chat
    async function sendGroupMessage(text) {
      if (!text.trim()) return;
      groupChatSend.disabled = true;
      groupChatSend.textContent = 'SENDING...';
      // Clear previous results
      wivesGrid.innerHTML = '';
      consensusArea.style.display = 'none';
      // Show loading for each wife
      for (const wife of ALL_WIVES) {
        const card = document.createElement('div');
        card.className = 'wife-card';
        card.style.borderLeftColor = WIFE_STYLES[wife].color;
        card.innerHTML = `
          <h4>${WIFE_STYLES[wife].emoji} ${wife}</h4>
          <div class="response-text"><div class="loading">⌛ waiting for response...</div></div>
        `;
        card.dataset.wife = wife;
        wivesGrid.appendChild(card);
      }

      try {
        const resp = await fetchWithTimeout(`${API_BASE}/api/group-chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId })
        }, 30000, 1);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Unknown error');

        // Update wife cards
        for (const wifeResp of data.responses) {
          const card = wivesGrid.querySelector(`.wife-card[data-wife="${wifeResp.wife}"]`);
          if (card) {
            const responseDiv = card.querySelector('.response-text');
            responseDiv.innerHTML = renderMarkdown(wifeResp.response);
            // Optionally add confidence badge
            if (wifeResp.confidence) {
              const badge = document.createElement('div');
              badge.className = 'pac-badge';
              badge.style.marginTop = '8px';
              badge.textContent = `🎯 ${Math.round(wifeResp.confidence * 100)}%`;
              responseDiv.appendChild(badge);
            }
          }
        }

        // Show consensus if present
        if (data.consensus) {
          consensusArea.style.display = 'block';
          let consensusHtml = `<h4>📋 Consensus (${Math.round(data.consensus.score * 100)}%)</h4>`;
          if (data.consensus.corrected_claims && data.consensus.corrected_claims.length) {
            consensusHtml += `<div><strong>Corrections:</strong><ul>${data.consensus.corrected_claims.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul></div>`;
          }
          consensusHtml += `<div><strong>Final text:</strong><br>${renderMarkdown(data.consensus.final_text)}</div>`;
          consensusArea.innerHTML = consensusHtml;
        } else {
          consensusArea.style.display = 'none';
        }
      } catch (err) {
        showToast(`Group chat error: ${err.message}`);
        // Reset loading text to error
        for (const card of wivesGrid.children) {
          const responseDiv = card.querySelector('.response-text');
          responseDiv.innerHTML = `<span style="color:#ff8a8a">❌ ${err.message}</span>`;
        }
      } finally {
        groupChatSend.disabled = false;
        groupChatSend.textContent = 'SEND';
      }
    }

    // Send initial message
    await sendGroupMessage(message);
    // Also allow further messages in the modal
    groupChatSend.onclick = () => sendGroupMessage(groupChatInput.value);
    groupChatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendGroupMessage(groupChatInput.value);
      }
    });
  }

  // Particles background (same as original)
  (function initParticles() {
    const canvas = document.createElement('canvas');
    canvas.id = 'particles';
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '0';
    document.body.insertBefore(canvas, document.body.firstChild);
    const ctx = canvas.getContext('2d');
    let particles = [];
    let width, height;
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    function createParticles() {
      particles = [];
      for (let i=0; i<120; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2 + 0.5,
          alpha: Math.random() * 0.5 + 0.2,
          speed: 0.2 + Math.random() * 0.5,
        });
      }
    }
    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,200,${p.alpha})`;
        ctx.fill();
        p.y += p.speed;
        if (p.y > height) p.y = 0;
      }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); createParticles(); });
    resize();
    createParticles();
    draw();
  })();
