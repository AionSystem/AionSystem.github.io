<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AION</title>
</head>
<body>
    <div id="chat" style="height:400px; overflow:auto; border:1px solid #ccc; margin:10px; padding:10px;"></div>
    <div style="margin:10px;">
        <input type="text" id="input" style="width:70%; padding:10px;">
        <button onclick="send()" style="padding:10px 20px;">Send</button>
    </div>

    <script>
        const API = 'https://aion-backend-mu.vercel.app';
        
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('sessionId', sessionId);
        }
        
        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('input');
        
        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.style.margin = '8px 0';
            msgDiv.style.padding = '8px';
            if (role === 'user') {
                msgDiv.style.backgroundColor = '#e3f2fd';
                msgDiv.style.textAlign = 'right';
                msgDiv.innerHTML = '<b>You:</b> ' + text;
            } else {
                msgDiv.style.backgroundColor = '#f5f5f5';
                msgDiv.innerHTML = '<b>AI:</b> ' + text;
            }
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        async function send() {
            const message = inputField.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            inputField.value = '';
            inputField.disabled = true;
            
            const thinking = document.createElement('div');
            thinking.style.margin = '8px 0';
            thinking.style.padding = '8px';
            thinking.style.backgroundColor = '#f5f5f5';
            thinking.innerHTML = '<b>AI:</b> ...';
            chatDiv.appendChild(thinking);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const res = await fetch(`${API}/api/assistant`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        sessionId: sessionId,
                        ownerType: 'sheldon',
                        history: []
                    })
                });
                
                const data = await res.json();
                
                if (res.ok && data.response) {
                    thinking.innerHTML = '<b>AI:</b> ' + data.response;
                } else {
                    thinking.innerHTML = '<b>AI:</b> Error: ' + (data.error || 'Unknown');
                }
            } catch (err) {
                thinking.innerHTML = '<b>AI:</b> Connection error: ' + err.message;
            }
            
            inputField.disabled = false;
            inputField.focus();
        }
        
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
        
        addMessage('ai', 'Connected. Type a message.');
    </script>
</body>
</html>
