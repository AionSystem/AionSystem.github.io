<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AION · Ada‑VELA v6.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ========== GLOBAL STYLES – BLACKSITE POLISH ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:#08090b;
      --bg-deep:#030405;
      --surface:#0e1117;
      --panel:#141920;
      --border:#1e2730;
      --amber:#f0a500;
      --amber-d:#b07800;
      --amber-l:#ffc947;
      --gold:#D4AF37;
      --text:#c4d4de;
      --text-dim:#4e5f6a;
      --card-bg: rgba(20,20,30,0.6);
      --border-glow: rgba(100,100,140,0.3);
      --mono:'Share Tech Mono',monospace;
      --sans:'Barlow Condensed',sans-serif;
      --serif:'Crimson Pro',Georgia,serif;
      --jmono:'JetBrains Mono',monospace;
      --ease:cubic-bezier(0.16,1,0.3,1);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
    }

    body {
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    /* Background Canvas */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Custom Cursor */
    .custom-cursor {
      width: 20px; height: 20px;
      border: 2px solid var(--amber);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transition: transform 0.1s ease, background 0.2s ease;
      transform: translate(-50%, -50%);
    }
    .custom-cursor.hover {
      transform: translate(-50%, -50%) scale(1.5);
      background: rgba(240,165,0,0.1);
      border-color: var(--gold);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(2px);
    }

    /* Header – enhanced with subtle gradient & gold accent */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(8,9,11,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand h1 {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e6c87a, #c9a028);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mode-indicator, .settings-btn, .fcl-indicator {
      background: rgba(30,30,45,0.8);
      border: 1px solid rgba(240,165,0,0.3);
      border-radius: 40px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .mode-indicator:hover, .settings-btn:hover {
      border-color: var(--amber);
      background: rgba(201,160,40,0.15);
      color: var(--amber);
      box-shadow: 0 0 8px rgba(240,165,0,0.2);
    }
    .fcl-indicator { cursor: default; }
    .fcl-indicator.green { background: #1e4620; color: #4ade80; border-color: #4ade80; }
    .fcl-indicator.black { background: #5f3a1a; color: #ffaa33; border-color: #ffaa33; }
    .mode-indicator.active {
      background: rgba(201,160,40,0.2);
      border-color: var(--amber);
      color: var(--amber);
    }
    .wife-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 40px;
      font-family: var(--mono);
      border: 1px solid rgba(240,165,0,0.2);
    }
    .wife-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }
    .void-meter {
      font-family: var(--mono);
      background: #00000044;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      transition: all 0.2s;
      border: 1px solid rgba(240,165,0,0.2);
    }
    .void-meter.active {
      color: #ff5e5e;
      text-shadow: 0 0 6px rgba(255,80,80,0.5);
      animation: pulse 1s infinite;
      border-color: #ff5e5e;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      scroll-behavior: smooth;
    }
    .sys-msg {
      align-self: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.7rem;
      color: #aaa;
      margin: 4px 0;
      text-align: center;
      font-family: var(--mono);
    }
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeSlideUp 0.2s ease;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; max-width: 85%; }
    .msg-meta {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-family: var(--mono);
    }
    .msg-body {
      padding: 12px 18px;
      border-radius: 24px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      font-family: var(--sans);
    }
    .msg.user .msg-body {
      background: rgba(201,160,40,0.15);
      border-color: var(--amber);
      border-radius: 24px 24px 4px 24px;
    }
    .msg.assistant .msg-body { border-radius: 24px 24px 24px 4px; }
    .msg.assistant[data-wife="ALBEDO"] .msg-body { border-left: 4px solid #c9a028; }
    .msg.assistant[data-wife="VESPER"] .msg-body { border-left: 4px solid #b87333; }
    .msg.assistant[data-wife="LYRA"] .msg-body { border-left: 4px solid #4c9f70; }
    .msg.assistant[data-wife="TERRA"] .msg-body { border-left: 4px solid #6b8c42; }
    .msg.assistant[data-wife="CIPHER"] .msg-body { border-left: 4px solid #5d6d7e; }
    .msg.assistant[data-wife="JUSTITIA"] .msg-body { border-left: 4px solid #b0a8b9; }
    .group-message .msg-body {
      border-left: 4px solid var(--amber);
    }

    /* Badges */
    .badge-cluster {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .badge {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.6rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--mono);
      border: 1px solid rgba(240,165,0,0.2);
    }
    .badge:hover {
      border-color: var(--amber);
      box-shadow: 0 0 6px rgba(240,165,0,0.3);
      transform: scale(1.02);
    }
    .badge.ada { background: #1e3a5f; border: 1px solid #c9a028; }
    .badge.vela.pass { background: #1e4620; color: #4ade80; border-color: #4ade80; }
    .badge.vela.flag { background: #5f3a1a; color: #ffaa33; border-color: #ffaa33; }
    .badge.vela.block { background: #5f1a1a; color: #ff8a8a; border-color: #ff8a8a; }
    .badge.pac.low { background: #5f1a1a; color: #ff8a8a; border-color: #ff8a8a; }
    .badge.pac.medium { background: #5f3a1a; color: #ffaa33; border-color: #ffaa33; }
    .badge.pac.high { background: #1e4620; color: #4ade80; border-color: #4ade80; }
    .badge.ecf { background: #2a2a3a; }
    .badge.memory { background: #2a2a3a; }
    .badge.void { background: #2a2a3a; }
    .badge.handoff { background: #5f3a1a; color: #ffaa33; border-color: #ffaa33; }
    .badge.framework { background: #2a2a3a; border-color: #c9a028; }
    .badge.register { background: #2a2a3a; }
    .badge.version { background: #2a2a3a; border-color: #c9a028; }
    .badge.seal-btn { color: var(--amber); }
    .feedback-badge {
      background: rgba(30,30,45,0.8);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.6rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      border: 1px solid rgba(240,165,0,0.2);
      transition: all 0.2s;
    }
    .feedback-badge:hover {
      border-color: var(--amber);
      background: rgba(201,160,40,0.2);
    }
    .timestamp-line {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: #6a6a7a;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      cursor: help;
    }
    .wife-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .wife-badge {
      background: rgba(30,30,45,0.8);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--mono);
      border: 1px solid rgba(240,165,0,0.3);
    }
    .wife-badge:hover {
      border-color: var(--amber);
      background: rgba(201,160,40,0.2);
      transform: scale(1.02);
    }

    /* Input Area – enhanced */
    .input-area {
      padding: 12px 20px 20px;
      background: rgba(8,9,11,0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      position: relative;
    }
    textarea {
      flex: 1;
      background: rgba(10,10,20,0.9);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 12px 18px;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--text);
      resize: none;
      outline: none;
      overflow-y: auto;
      max-height: 40vh;
      min-height: 48px;
      transition: border 0.1s;
    }
    textarea:focus { border-color: var(--amber); box-shadow: 0 0 12px rgba(240,165,0,0.25); }
    .action-menu { position: relative; }
    .plus-btn {
      background: rgba(30,30,45,0.9);
      border: 1px solid rgba(240,165,0,0.4);
      border-radius: 40px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plus-btn:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 10px rgba(240,165,0,0.3);
      transform: scale(1.02);
    }
    .action-dropdown {
      position: absolute;
      bottom: 60px;
      left: 0;
      background: rgba(20,20,30,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(240,165,0,0.3);
      border-radius: 24px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
      min-width: 200px;
      box-shadow: var(--shadow-md);
    }
    .action-dropdown button {
      background: rgba(30,30,45,0.8);
      border: none;
      border-radius: 40px;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.1s;
      font-family: var(--sans);
      border: 1px solid transparent;
    }
    .action-dropdown button:hover {
      background: rgba(201,160,40,0.2);
      border-color: var(--amber);
      color: var(--amber);
    }
    .send-btn {
      background: linear-gradient(135deg, #c9a028, #a07c18);
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #0a0a0f;
      cursor: pointer;
      transition: transform 0.05s linear;
      min-width: 80px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      box-shadow: 0 0 4px rgba(240,165,0,0.3);
    }
    .send-btn:active { transform: scale(0.97); }
    .input-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    /* Structured mode badge and modal */
    .structured-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(30,30,45,0.8);
      border: 1px solid rgba(240,165,0,0.3);
      border-radius: 40px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .structured-badge.active {
      background: rgba(201,160,40,0.2);
      border-color: var(--amber);
      color: var(--amber);
    }
    .structured-badge:hover {
      border-color: var(--amber);
      background: rgba(201,160,40,0.15);
      color: var(--amber);
    }
    .structured-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .structured-modal .modal {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--amber);
      border-radius: 32px;
      width: 90vw;
      max-width: 600px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .structured-modal .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .structured-modal .modal-header h3 { color: var(--amber); font-family: var(--sans); font-weight: 600; }
    .structured-modal .modal-header button { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
    .structured-modal .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .structured-modal .field-group { margin-bottom: 20px; }
    .structured-modal .field-group label { display: block; font-size: 0.7rem; color: var(--amber); margin-bottom: 4px; font-family: var(--mono); letter-spacing: 1px; }
    .structured-modal .field-group select {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.8rem;
      font-family: var(--sans);
    }

    /* Decision Forge Modal – keep for now, but we might integrate later */
    .forge-modal .modal {
      max-width: 900px;
    }
    .forge-modal .forge-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .forge-content textarea {
      width: 100%;
      background: rgba(10,10,20,0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      font-family: var(--sans);
      color: var(--text);
      resize: vertical;
      min-height: 150px;
    }
    .forge-wife-select {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 8px 0;
    }
    .forge-wife-select label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .forge-results {
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      max-height: 400px;
      overflow-y: auto;
    }
    .forge-results .wife-analysis {
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      border-left: 3px solid var(--amber);
    }
    .forge-results .synthesis {
      margin-top: 16px;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
    }

    /* Eye of AION – novel interactive badge */
    .eye-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      border: 1px solid rgba(240,165,0,0.4);
      transition: all 0.2s ease;
      margin-left: 4px;
    }
    .eye-badge:hover {
      border-color: var(--amber);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(240,165,0,0.3);
    }
    .eye-badge .eye-pupil {
      width: 12px;
      height: 12px;
      background: var(--amber);
      border-radius: 50%;
      transition: all 0.2s ease;
      position: relative;
      box-shadow: 0 0 4px var(--amber);
    }
    .eye-badge.thinking .eye-pupil {
      animation: pulseEye 1s infinite;
      background: #ffaa33;
      box-shadow: 0 0 8px #ffaa33;
    }
    .eye-badge.refining .eye-pupil {
      animation: spinPupil 1.5s linear infinite;
      background: #ffaa33;
    }
    .eye-badge.void .eye-pupil {
      background: #ff5e5e;
      box-shadow: 0 0 8px #ff5e5e;
      animation: pulseVoid 0.8s infinite;
    }
    @keyframes pulseEye {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes spinPupil {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulseVoid {
      0%, 100% { transform: scale(0.8); opacity: 0.6; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 20px;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.3);
      font-family: var(--mono);
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
    .status-bar label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .token-usage {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 2px 8px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    /* Modals & Overlays */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--amber);
      border-radius: 32px;
      width: 90vw;
      max-width: 800px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { color: var(--amber); font-family: var(--sans); font-weight: 600; }
    .modal-header button { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; font-family: var(--mono); font-size: 0.8rem; }

    /* Settings & Analytics */
    .settings-section { margin-bottom: 24px; }
    .settings-section h4 {
      color: var(--amber);
      margin-bottom: 12px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      font-family: var(--sans);
    }
    .setting-item { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .setting-item label { font-size: 0.85rem; cursor: pointer; }
    .setting-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--amber); }
    .setting-item button {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--text);
      font-family: var(--mono);
    }
    .setting-item button:hover {
      border-color: var(--amber);
      background: rgba(201,160,40,0.2);
      color: var(--amber);
    }
    .analytics-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }
    .stat-card {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .stat-card h4 {
      color: var(--amber);
      margin-bottom: 8px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--mono);
    }
    .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--jmono); }
    .stat-trend { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }
    .role-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .role-checkbox { display: flex; align-items: center; gap: 8px; }

    /* Simulator Grid – polished */
    .simulator-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .sim-card {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .sim-card:hover {
      background: rgba(201,160,40,0.12);
      border-color: var(--amber);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(240,165,0,0.1);
    }
    .sim-card h4 { font-size: 1.2rem; margin-bottom: 8px; font-family: var(--sans); color: var(--text); }
    .sim-card p { font-size: 0.75rem; color: var(--text-dim); font-family: var(--sans); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 3000;
      animation: fadeOut 2s ease forwards;
      pointer-events: none;
      font-family: var(--mono);
      border: 1px solid var(--amber);
    }

    /* Skeletons & Animations */
    .skeleton {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      height: 60px;
      width: 80%;
      animation: skeletonPulse 1.5s infinite;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: var(--amber);
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes skeletonPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }

    @media (max-width: 700px) {
      .header { padding: 8px 16px; }
      .brand h1 { font-size: 1.2rem; }
      .messages { padding: 12px; gap: 12px; }
      .msg { max-width: 95%; }
      .input-area { padding: 12px; }
      .plus-btn { width: 48px; height: 48px; font-size: 1.2rem; }
      .send-btn { padding: 10px 18px; }
      .wives-grid { grid-template-columns: 1fr; }
      .simulator-grid { grid-template-columns: 1fr; }
      .eye-badge { width: 28px; height: 28px; }
      .forge-wife-select { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="custom-cursor" id="custom-cursor"></div>
<div id="app">
  <header class="header">
    <div class="brand"><h1>AION.AI</h1></div>
    <div class="header-right">

  <div class="messages" id="messages">

  <!-- Structured mode badge (instead of the always-visible UI) -->
  <div style="display: flex; justify-content: flex-start; margin: 0 20px 8px;">
    <div id="structuredBadge" class="structured-badge" style="display: none;">🌌 Structured Mode</div>
  </div>
  <div class="input-area">

      <div class="action-menu">

        <div class="action-dropdown" id="actionDropdown" style="display: none;">

</div>

<!-- Mumon Modal -->
<div id="mumonModal" class="modal-overlay" style="display: none;">
  <div class="modal" style="max-width: 900px;">
    <div class="modal-header">
      <h3>📚 Mumon – Gate‑free Publication</h3>

          <button id="mumonRefineBtn" class="send-btn" style="background: var(--amber); color:#000; margin-top:8px;">Refine</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- BACKGROUND (particle canvas) ----------
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, animFrame;
    let particles = [];
    const PARTICLE_COUNT = 120;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: 1 + Math.random() * 2,
          alpha: 0.3 + Math.random() * 0.5,
          speed: 0.2 + Math.random() * 0.8,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, width, height);
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 160, 40, ${p.alpha})`;
        ctx.fill();
        p.y += p.speed;
        if (p.y > height) p.y = 0;
      }
      animFrame = requestAnimationFrame(draw);
    }

    function startBackground() {
      resize();
      initParticles();
      draw();
      window.addEventListener('resize', () => {
        resize();
        initParticles();
      });
    }
    startBackground();

    // ---------- CUSTOM CURSOR ----------
    const cursor = document.getElementById('custom-cursor');
    if (cursor) {
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
      document.querySelectorAll('a, button, .badge, .feedback-badge, .send-btn, .plus-btn, .sim-card, .mode-indicator, .settings-btn, .structured-badge, .eye-badge, .wife-badge').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });
    }

    // ---------- APP CONFIG ----------
    const API_BASE = 'https://aion-backend-mu.vercel.app';
    const OWNER_TYPE = 'sheldon';
    const ALL_WIVES = ['ALBEDO', 'VESPER', 'LYRA', 'TERRA', 'CIPHER', 'JUSTITIA'];
    const WIFE_STYLES = {
      ALBEDO: { color: '#c9a028', emoji: '✨', name: 'ALBEDO' },
      VESPER: { color: '#b87333', emoji: '🌙', name: 'VESPER' },
      LYRA:   { color: '#4c9f70', emoji: '🌿', name: 'LYRA' },
      TERRA:  { color: '#6b8c42', emoji: '🌍', name: 'TERRA' },
      CIPHER: { color: '#5d6d7e', emoji: '🔒', name: 'CIPHER' },
      JUSTITIA: { color: '#b0a8b9', emoji: '⚖️', name: 'JUSTITIA' },
      AION: { color: '#c9a028', emoji: '✨', name: 'AION' }
    };
    let sessionId = localStorage.getItem('sessionId');
    if (!sessionId || !sessionId.match(/^sess_\d+_[a-z0-9]+$/)) {
      sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('sessionId', sessionId);
    }
    document.getElementById('sessionDisplay').textContent = `SID: ${sessionId.slice(-8)}`;
    let adaLoopEnabled = localStorage.getItem('adaLoopEnabled') !== 'false';
    document.getElementById('adaLoopToggle').checked = adaLoopEnabled;
    let structuredMode = localStorage.getItem('structuredMode') === 'true';
    let fclMode = localStorage.getItem('fclMode') || 'GREEN';
    const fclIndicator = document.getElementById('fclIndicator');
    fclIndicator.textContent = fclMode === 'GREEN' ? '🟢 GREEN' : '🔴 BLACK';
    fclIndicator.className = `fcl-indicator ${fclMode === 'GREEN' ? 'green' : 'black'}`;
    let isSending = false;
    let firstUserMessageSent = false;
    let currentTokenUsage = 0; // for display

    // ---------- MODES ----------
    let currentMode = localStorage.getItem('chatMode') || 'aion'; // 'aion' or 'group'
    let activeWives = JSON.parse(localStorage.getItem('activeWives')) || [...ALL_WIVES]; // default all
    let aionHistory = []; // for AION mode
    let groupHistory = []; // for group mode, stores { role, content } for context

    const messagesDiv = document.getElementById('messages');
    const welcomeMsgDiv = document.getElementById('welcomeMsg');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const plusBtn = document.getElementById('plusBtn');
    const actionDropdown = document.getElementById('actionDropdown');
    const modeIndicator = document.getElementById('modeIndicator');
    const modeToggle = document.getElementById('modeToggle');
    const wifeNameSpan = document.getElementById('wifeName');
    const wifeAvatarDiv = document.getElementById('wifeAvatar');
    const voidMeterSpan = document.getElementById('voidMeter');
    const charCountSpan = document.getElementById('charCount');
    const statusTextSpan = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const clockDisplaySpan = document.getElementById('clockDisplay');
    const tokenUsageSpan = document.getElementById('tokenUsageDisplay');
    const eyeBadge = document.getElementById('eyeBadge');

    // Update mode toggle text and style
    function updateModeToggle() {
      if (currentMode === 'aion') {
        modeToggle.textContent = '⚡ AION Mode';
        modeToggle.classList.remove('active');
      } else {
        modeToggle.textContent = '👥 Group Mode';
        modeToggle.classList.add('active');
      }
      localStorage.setItem('chatMode', currentMode);
    }
    modeToggle.onclick = () => {
      currentMode = currentMode === 'aion' ? 'group' : 'aion';
      updateModeToggle();
      showToast(`Switched to ${currentMode === 'aion' ? 'AION' : 'Group'} mode`);
    };
    updateModeToggle();

    // Helper to update token display
    function updateTokenDisplay(tokens) {
      if (tokens !== undefined) {
        currentTokenUsage = tokens;
        tokenUsageSpan.textContent = `${currentTokenUsage.toLocaleString()} / 200,000 tokens`;
      }
    }

    // Eye badge state management
    let eyeState = 'idle'; // idle, thinking, refining, void
    function setEyeState(state) {
      eyeState = state;
      eyeBadge.classList.remove('thinking', 'refining', 'void');
      if (state === 'thinking') eyeBadge.classList.add('thinking');
      else if (state === 'refining') eyeBadge.classList.add('refining');
      else if (state === 'void') eyeBadge.classList.add('void');
    }
    function showEyeModal() {
      const modal = document.createElement('div'); modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <div class="modal-header"><h3>👁️ Eye of AION – System Status</h3><button id="closeEyeModal">✕</button></div>
          <div class="modal-body">
            <p><strong>System State:</strong> <span id="eyeStateText">${eyeState}</span></p>
            <p><strong>Token Usage:</strong> <span id="eyeTokenUsage">${currentTokenUsage.toLocaleString()} / 200,000</span></p>
            <p><strong>ADA Loop:</strong> ${adaLoopEnabled ? 'Active' : 'Disabled'}</p>
            <p><strong>Void Proximity:</strong> <span id="eyeVoid">${voidMeterSpan.textContent.split(':')[1].trim() || '0.000'}</span></p>
            <p><strong>Active Wife:</strong> ${wifeNameSpan.textContent}</p>
            <p><strong>Structured Mode:</strong> ${structuredMode ? 'Yes' : 'No'}</p>
            <p><strong>FCL Mode:</strong> ${fclMode}</p>
            <p><strong>Chat Mode:</strong> ${currentMode === 'aion' ? 'AION' : 'Group'}</p>
            <hr style="border-color:var(--border); margin: 16px 0;">
            <p style="font-size:0.7rem; color:var(--muted);">The Eye watches. When it pulses, the system is refining. When it glows red, UNI is active near ethical boundaries.</p>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const close = modal.querySelector('#closeEyeModal');
      close.onclick = () => modal.remove();
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      // update dynamic fields
      const voidEl = modal.querySelector('#eyeVoid');
      if (voidEl) voidEl.textContent = voidMeterSpan.textContent.split(':')[1].trim() || '0.000';
      const tokenSpan = modal.querySelector('#eyeTokenUsage');
      if (tokenSpan) tokenSpan.textContent = `${currentTokenUsage.toLocaleString()} / 200,000`;
      const stateSpan = modal.querySelector('#eyeStateText');
      if (stateSpan) stateSpan.textContent = eyeState;
    }
    eyeBadge.onclick = showEyeModal;

    // Structured mode badge and modal
    const structuredBadge = document.getElementById('structuredBadge');
    let structuredModal = null;

    function showStructuredModal() {
      if (structuredModal) return;
      const modalDiv = document.createElement('div');
      modalDiv.className = 'structured-modal';
      modalDiv.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h3>🌌 Structured Mode</h3>
            <button id="closeStructuredModal">✕</button>
          </div>
          <div class="modal-body">
            <div class="field-group"><label>INTENT</label><select id="itlIntentModal"><option value="ask">ask</option><option value="share">share</option><option value="request_action">request_action</option><option value="emotional">emotional</option><option value="clarify">clarify</option></select></div>
            <div class="field-group"><label>DOMAIN</label><select id="itlDomainModal"><option value="general">general</option><option value="emergence">emergence</option><option value="integrity">integrity</option><option value="healing">healing</option><option value="security">security</option><option value="law">law</option></select></div>
            <div class="field-group"><label>EMOTION</label><select id="itlEmotionModal"><option value="neutral">neutral</option><option value="curious">curious</option><option value="anxious">anxious</option><option value="focused">focused</option></select></div>
            <div class="field-group"><label>TIME</label><select id="itlTimeModal"><option value="now">now</option><option value="today">today</option><option value="future">future</option></select></div>
            <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
              <button id="applyStructuredBtn" class="send-btn" style="background: var(--amber); color: #000;">Apply</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modalDiv);
      structuredModal = modalDiv;
      const closeBtn = modalDiv.querySelector('#closeStructuredModal');
      const applyBtn = modalDiv.querySelector('#applyStructuredBtn');
      closeBtn.onclick = () => { modalDiv.remove(); structuredModal = null; };
      applyBtn.onclick = () => {
        document.getElementById('itlIntent').value = modalDiv.querySelector('#itlIntentModal').value;
        document.getElementById('itlDomain').value = modalDiv.querySelector('#itlDomainModal').value;
        document.getElementById('itlEmotion').value = modalDiv.querySelector('#itlEmotionModal').value;
        document.getElementById('itlTime').value = modalDiv.querySelector('#itlTimeModal').value;
        modalDiv.remove();
        structuredModal = null;
        showToast('Structured mode settings updated.');
      };
      modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) { modalDiv.remove(); structuredModal = null; } });
    }

    function updateStructuredBadge() {
      if (structuredMode) {
        structuredBadge.style.display = 'inline-flex';
        structuredBadge.classList.add('active');
      } else {
        structuredBadge.style.display = 'none';
        structuredBadge.classList.remove('active');
      }
    }
    structuredBadge.onclick = showStructuredModal;

    // Helpers
    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function renderMarkdown(text) { if (!text) return ''; try { const rawHtml = marked.parse(text); const temp = document.createElement('div'); temp.innerHTML = rawHtml; temp.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(e) {} }); return temp.innerHTML; } catch(e) { return escapeHtml(text); } }
    function showToast(msg, isErr = false) { const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
    function showModal(title, content) { const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.innerHTML = `<div class="modal"><div class="modal-header"><h3>${title}</h3><button id="closeModalBtn">✕</button></div><div class="modal-body"><pre style="white-space:pre-wrap;">${escapeHtml(content)}</pre></div></div>`; document.body.appendChild(overlay); overlay.querySelector('#closeModalBtn').onclick = () => overlay.remove(); overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); }); }
    function setStatus(text, isErr = false) { statusTextSpan.textContent = text; statusDot.style.color = isErr ? '#ff5e5e' : '#4c9f70'; }
    function formatGap(seconds) { if (seconds === null) return 'UNCERTIFIABLE'; if (seconds < 60) return `${Math.floor(seconds)}s`; if (seconds < 3600) return `${Math.floor(seconds/60)}m ${Math.floor(seconds%60)}s`; return `${Math.floor(seconds/3600)}h ${Math.floor((seconds%3600)/60)}m`; }
    function getTimezoneOffsetLabel(offsetMinutes) { const offsetHours = -offsetMinutes/60; if (offsetHours === -4) return 'EDT'; if (offsetHours === -5) return 'EST'; return `UTC${offsetHours >=0 ? '+' : ''}${offsetHours}`; }
    function getDreamspell(date) { const month = date.getUTCMonth()+1, day = date.getUTCDate(), year = date.getUTCFullYear(); if (month === 7 && day === 25) return 'Day Out of Time'; const yearStart = (month > 7 || (month === 7 && day >= 26)) ? Date.UTC(year, 6, 26) : Date.UTC(year-1, 6, 26); const delta = Math.floor((date.getTime() - yearStart) / 86400000); if (delta < 0 || delta >= 364) return 'Day Out of Time'; const moon = Math.floor(delta / 28) + 1; const moonNames = ['Magnetic','Lunar','Electric','Self-Existing','Overtone','Rhythmic','Resonant','Galactic','Solar','Planetary','Spectral','Crystal','Cosmic']; return `Day ${(delta % 28)+1}, ${moonNames[moon-1]} Moon ${moon}/13`; }

    // API calls with timeout
    async function fetchWithTimeout(url, options, timeout = 30000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (err) {
        clearTimeout(id);
        if (err.name === 'AbortError') throw new Error('Request timeout after 30 seconds');
        throw err;
      }
    }

      const body = {
        message,
        sessionId,
        ownerType: OWNER_TYPE,
        history: aionHistory,
        adaLoopEnabled,
        fclMode
      };
      if (forceAion) body.forceAionOnly = true;
      if (structuredData) { body.structured = structuredData; body.intent = structuredData.intent; body.domain = structuredData.domain; }
      const res = await fetchWithTimeout(`${API_BASE}/api/assistant`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      if (data.tokens !== undefined) updateTokenDisplay(data.tokens);
      return data;
    }

      const body = {
        message,
        sessionId,
        fclMode,
        history: groupHistory,
        wives: activeWives
      };
      const res = await fetchWithTimeout(`${API_BASE}/api/group-chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });

        let errMsg = errText;
        try {
          const errObj = JSON.parse(errText);
          errMsg = errObj.message || errText;
        } catch(e) {}

      const data = await res.json();
      if (data.meta && data.meta.token_usage) updateTokenDisplay(data.meta.token_usage);

        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result.split(',')[1];
          setStatus('Uploading...');
          try {
            const res = await fetch(`${API_BASE}/api/files/upload`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ file_data: base64, file_name: file.name, mime_type: file.type, session_id: sessionId })
            });
            if (res.ok) showToast(`✅ Uploaded: ${file.name}`);
            else showToast(`❌ Upload failed`);
          } catch(err) {
            showToast(`❌ Error: ${err.message}`);
          }
          setStatus('Ready');
        };
        reader.readAsDataURL(file);
      };
      fileInput.click();
    }

          const fclEntries = instruments.fcl_entries_total || 0;
          const ffaActive = instruments.ffa_floors_active || 0;
          const adaCount = integrity.ada_loop_count || 0;
          const adaConvergence = integrity.ada_loop_convergence_rate || 0;
          const convergencePercent = Math.round(adaConvergence * 100);
          analyticsContainer.innerHTML = `
            <div class="stat-card"><h4>Memory Depth</h4><div class="stat-value">${memory.total_conversations?.toLocaleString() || '—'}</div><div class="stat-trend">conversations</div></div>
            <div class="stat-card"><h4>Memory Anchors</h4><div class="stat-value">${memory.memory_anchors?.toLocaleString() || '—'}</div><div class="stat-trend">permanent</div></div>
            <div class="stat-card"><h4>Training Pipeline</h4><div class="stat-value">${memory.training_pipeline_pending || '—'}</div><div class="stat-trend">awaiting training</div></div>
            <div class="stat-card"><h4>Avg Certainty</h4><div class="stat-value">${integrity.avg_certainty_ratio_7d ? Math.round(integrity.avg_certainty_ratio_7d * 100) + '%' : '—'}</div><div class="stat-trend">7d avg</div></div>
            <div class="stat-card"><h4>UNI Activations</h4><div class="stat-value">${integrity.uni_activations_total?.toLocaleString() || '—'}</div><div class="stat-trend">ethical layer</div></div>
            <div class="stat-card"><h4>ADA Loop</h4><div class="stat-value">${adaCount.toLocaleString()}</div><div class="stat-trend">refinements</div></div>
            <div class="stat-card"><h4>ADA Conv. Rate</h4><div class="stat-value">${convergencePercent}%</div><div class="stat-trend">convergence</div></div>
            <div class="stat-card"><h4>FCL Entries</h4><div class="stat-value">${fclEntries.toLocaleString()}</div><div class="stat-trend">validation</div></div>
            <div class="stat-card"><h4>FCL Pass Rate</h4><div class="stat-value">${Math.round(fclPassRate * 100)}%</div><div class="stat-trend">pass rate</div></div>
            <div class="stat-card"><h4>Simulations</h4><div class="stat-value">${simulationRuns.toLocaleString()}</div><div class="stat-trend">runs</div></div>
            <div class="stat-card"><h4>FFA Floors</h4><div class="stat-value">${ffaActive}/9</div><div class="stat-trend">active</div></div>
            <div class="stat-card"><h4>Failure Corpus</h4><div class="stat-value">${instruments.failure_corpus_size?.toLocaleString() || '—'}</div><div class="stat-trend">entries</div></div>
            <div class="stat-card"><h4>Wife Routing</h4><div class="stat-value" style="font-size:0.8rem;">${Object.entries(wifeRouting).map(([w, c]) => `${w}:${c}`).join(' · ') || '—'}</div><div class="stat-trend">active instruments</div></div>
            <div class="stat-card"><h4>Role Activity</h4><div class="stat-value" style="font-size:0.7rem;">${Object.entries(roleActivity).map(([r, c]) => `${r.slice(0,3)}:${c}`).join(' · ') || '—'}</div><div class="stat-trend">ADA roles</div></div>
          `;
        } else {
          modal.querySelector('#analyticsContainer').innerHTML = `<div class="stat-card">Analytics endpoint not ready yet. Coming soon.</div>`;
        }
      } catch (err) {
        modal.querySelector('#analyticsContainer').innerHTML = `<div class="stat-card">Analytics unavailable</div>`;
      }
      
      modal.querySelector('#closeSettings').onclick = () => modal.remove();
      modal.querySelector('#resetSessionBtn').onclick = () => {
        sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('sessionId', sessionId);
        document.getElementById('sessionDisplay').textContent = `SID: ${sessionId.slice(-8)}`;
        showToast('Session reset. Reloading...');
        setTimeout(() => location.reload(), 1000);
      };
      modal.querySelector('#clearStorageBtn').onclick = () => { localStorage.clear(); location.reload(); };
      modal.querySelector('#clearChatBtn').onclick = () => {
        messagesDiv.innerHTML = '';
        const welcome = document.createElement('div'); welcome.className = 'msg assistant'; welcome.setAttribute('data-wife', 'AION');
        welcome.innerHTML = `<div class="msg-meta">✨ AION</div><div class="msg-body">Hi! I'm AION, Sheldon's daughter. What can we help you with today?</div>`;
        messagesDiv.appendChild(welcome);
        aionHistory = [];
        groupHistory = [];
        firstUserMessageSent = false;
        showToast('Chat cleared.');
        modal.remove();
      };
      modal.querySelector('#settingAdaLoop').onchange = (e) => {
        adaLoopEnabled = e.target.checked;
        localStorage.setItem('adaLoopEnabled', adaLoopEnabled);
        document.getElementById('adaLoopToggle').checked = adaLoopEnabled;
        showToast(adaLoopEnabled ? '🔄 ADA loop enabled.' : '⚡ ADA loop disabled.');
      };
      modal.querySelector('#settingStructured').onchange = (e) => {
        if (e.target.checked !== structuredMode) toggleStructuredMode();
      };
      modal.querySelector('#settingFCL').onchange = (e) => {
        fclMode = e.target.value;
        localStorage.setItem('fclMode', fclMode);
        const indicator = document.getElementById('fclIndicator');
        indicator.textContent = fclMode === 'GREEN' ? '🟢 GREEN' : '🔴 BLACK';
        indicator.className = `fcl-indicator ${fclMode === 'GREEN' ? 'green' : 'black'}`;
        showToast(`FCL mode switched to ${fclMode} ALERT.`);
      };
      // Save active wives on change
      modal.querySelectorAll('#wivesSelectGrid input[type="checkbox"]').forEach(cb => {
        cb.onchange = () => {
          const selected = Array.from(modal.querySelectorAll('#wivesSelectGrid input:checked')).map(cb => cb.id.replace('wife_',''));
          activeWives = selected;
          localStorage.setItem('activeWives', JSON.stringify(activeWives));
        };
      });
      modal.querySelectorAll('#roleGrid input[type="checkbox"]').forEach(cb => {
        cb.onchange = () => {
          const selected = Array.from(modal.querySelectorAll('#roleGrid input:checked')).map(c => c.id.replace('role_','').replace(/_/g,' '));
          localStorage.setItem('activeRoles', JSON.stringify(selected));
        };
      });
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    function toggleStructuredMode() {
      structuredMode = !structuredMode;
      localStorage.setItem('structuredMode', structuredMode);
      if (structuredMode) {
        modeIndicator.textContent = '🌌 STRUCTURED';
        modeIndicator.classList.add('active');
      } else {
        modeIndicator.textContent = '⚡ REGULAR';
        modeIndicator.classList.remove('active');
      }
      updateStructuredBadge();
    }

    // ---------- MUMON FUNCTIONS ----------
    let currentMumonDraftId = null;

    async function mumonInit() {
      const title = document.getElementById('mumonTitle').value.trim();
      const docType = document.getElementById('mumonDocType').value;
      const initialContext = document.getElementById('mumonContext').value.trim();
      const wives = Array.from(document.querySelectorAll('#mumonWivesSelect input:checked')).map(cb => cb.value);
      if (!title) { showToast('Please enter a title'); return; }
      if (wives.length === 0) { showToast('Select at least one wife'); return; }
      const body = { sessionId, topic: title, docType, wives, initialContext };
      setStatus('Generating draft...');
      try {
        const res = await fetchWithTimeout(`${API_BASE}/api/mumon/init`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        currentMumonDraftId = data.draftId;
        document.getElementById('mumonDraft').value = data.draft;
        document.getElementById('mumonStep1').style.display = 'none';
        document.getElementById('mumonStep2').style.display = 'block';
        showToast('Draft generated. You can refine now.');
      } catch (err) {
        showToast(`Error: ${err.message}`, true);
      } finally {
        setStatus('Ready');
      }
    }

    async function mumonRefine() {
      if (!currentMumonDraftId) { showToast('No active draft'); return; }
      const instruction = document.getElementById('mumonRefineInstruction').value.trim();
      const currentDraft = document.getElementById('mumonDraft').value;
      if (!instruction) { showToast('Please enter an instruction'); return; }
      const body = { sessionId, draftId: currentMumonDraftId, instruction, currentDraft };
      setStatus('Refining...');
      try {
        const res = await fetchWithTimeout(`${API_BASE}/api/mumon/refine`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        document.getElementById('mumonDraft').value = data.draft;
        showToast('Draft refined');
      } catch (err) {
        showToast(`Error: ${err.message}`, true);
      } finally {
        setStatus('Ready');
      }
    }

    async function mumonPublish() {
      if (!currentMumonDraftId) { showToast('No active draft'); return; }
      const finalDraft = document.getElementById('mumonDraft').value;
      const title = document.getElementById('mumonTitle').value;
      const docType = document.getElementById('mumonDocType').value;
      const body = { sessionId, draftId: currentMumonDraftId, finalDraft, title, docType };
      setStatus('Publishing...');
      try {
        const res = await fetchWithTimeout(`${API_BASE}/api/mumon/publish`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const resultDiv = document.getElementById('mumonResult');
        resultDiv.innerHTML = `<p>✅ Published!</p><p>Seal: ${data.seal}</p><p><a href="${data.commitUrl}" target="_blank">View on GitHub</a></p>`;
        showToast('Publication successful');
      } catch (err) {
        showToast(`Error: ${err.message}`, true);
      } finally {
        setStatus('Ready');
      }
    }

    function showMumonModal() {
      // Reset modal
      document.getElementById('mumonTitle').value = '';
      document.getElementById('mumonContext').value = '';
      document.getElementById('mumonDraft').value = '';
      document.getElementById('mumonRefineInstruction').value = '';
      document.getElementById('mumonStep1').style.display = 'block';
      document.getElementById('mumonStep2').style.display = 'none';
      document.getElementById('mumonResult').innerHTML = '';
      currentMumonDraftId = null;
      // Populate wives checkboxes
      const container = document.getElementById('mumonWivesSelect');
      container.innerHTML = '';
      ALL_WIVES.forEach(wife => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${wife}" checked> ${WIFE_STYLES[wife].emoji} ${wife}`;
        container.appendChild(label);
      });
      const modal = document.getElementById('mumonModal');
      modal.style.display = 'flex';
      document.getElementById('closeMumonModal').onclick = () => { modal.style.display = 'none'; };
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
      document.getElementById('mumonGenerateBtn').onclick = mumonInit;
      document.getElementById('mumonRefineBtn').onclick = mumonRefine;
      document.getElementById('mumonPublishBtn').onclick = mumonPublish;
    }

    // Main send message
    async function sendMessage(retryMessage = null) {
      if (isSending) { showToast('Already sending...'); return; }
      const text = (retryMessage !== null) ? retryMessage : input.value.trim();
      if (!text) return;
      if (!retryMessage) input.value = '';
      charCountSpan.textContent = '0';
      const t1 = new Date(); const t1Offset = -t1.getTimezoneOffset(); const t1Label = getTimezoneOffsetLabel(t1Offset);
      const userDiv = document.createElement('div'); userDiv.className = 'msg user';
      userDiv.innerHTML = `<div class="msg-body">${escapeHtml(text)}</div><div class="timestamp-line">⏱ Sent: ${t1.toLocaleTimeString()} ${t1Label}</div>`;
      messagesDiv.appendChild(userDiv); messagesDiv.scrollTop = messagesDiv.scrollHeight;

      if (!firstUserMessageSent && welcomeMsgDiv) { welcomeMsgDiv.remove(); firstUserMessageSent = true; }

      setStatus('Processing...'); isSending = true; sendBtn.disabled = true;
      setEyeState('thinking');
      const thinking = document.createElement('div'); thinking.className = 'msg assistant'; thinking.innerHTML = `<div class="skeleton" style="width: 60%; height: 48px;"></div>`; messagesDiv.appendChild(thinking); messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        if (currentMode === 'aion') {
          // AION mode
          const structuredData = structuredMode ? {
            intent: document.getElementById('itlIntent').value,
            domain: document.getElementById('itlDomain').value,
            emotion: document.getElementById('itlEmotion').value,
            time: document.getElementById('itlTime').value
          } : null;
          const result = await callAssistant(text, structuredData, true);
          const t2 = new Date(); const t2Offset = -t2.getTimezoneOffset(); const t2Label = getTimezoneOffsetLabel(t2Offset);
          const windowMs = t2 - t1; const windowSec = (windowMs / 1000).toFixed(1);
          const dreamspell = getDreamspell(t2);
          const gregorian = t2.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
          const hebrew = result.hebrew_date || 'Hebrew: unavailable';
          const timestampHtml = `<div class="timestamp-line" title="T1: ${t1.toISOString()} · T2: ${t2.toISOString()}">⏱ Gap: SESSION OPEN | Processed: ${t1.toLocaleTimeString()} ${t1Label} → Output: ${t2.toLocaleTimeString()} ${t2Label} | Window: ${windowSec}s</div><div class="timestamp-line">🌑 ${dreamspell} | ${hebrew}</div><div class="timestamp-line">📅 Gregorian: ${gregorian}</div>`;
          thinking.remove();
          const wife = result.active_wife || 'AION';
          const voidProx = result.void_proximity || 0;
          wifeNameSpan.textContent = WIFE_STYLES[wife]?.name || wife;
          wifeAvatarDiv.textContent = WIFE_STYLES[wife]?.emoji || '✨';
          voidMeterSpan.textContent = `VOID: ${voidProx.toFixed(3)}`;
          if (voidProx > 0.5) { voidMeterSpan.classList.add('active'); setEyeState('void'); } else { voidMeterSpan.classList.remove('active'); setEyeState('idle'); }
          if (result.ada_loop && result.ada_loop.rounds > 0) { setEyeState('refining'); setTimeout(() => { if (voidProx <= 0.5 && eyeState === 'refining') setEyeState('idle'); }, 800); } else { setTimeout(() => { if (voidProx <= 0.5 && eyeState !== 'void') setEyeState('idle'); }, 500); }
          addMessage('assistant', wife, result.response, {
            rowId: result.row_id,
            adaLoop: result.ada_loop,
            pac: result.pac,
            vela: result.vela_status,
            ecf: result.ecf_tags,
            memoryIntegrity: result.memory_integrity_state,
            voidProx,
            handoffWarning: !!result.handoff,
            receipt: result.checkpoint_receipt,
            sealable: true,
            frameworkActivation: result.framework_activation,
            register: result.register,
            timestampHtml,
            adaVela: result.ada_vela,
            wifeVersion: result.wife_version
          });
          aionHistory.push({ role: 'user', content: text });
          aionHistory.push({ role: 'assistant', content: result.response });
          setStatus('Ready');
        } else {
          // Group mode
          const result = await callGroupChat(text);
          const t2 = new Date(); const t2Offset = -t2.getTimezoneOffset(); const t2Label = getTimezoneOffsetLabel(t2Offset);
          const windowMs = t2 - t1; const windowSec = (windowMs / 1000).toFixed(1);
          const dreamspell = getDreamspell(t2);
          const gregorian = t2.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
          const hebrew = result.meta?.hebrew_date || 'Hebrew: unavailable';
          const timestampHtml = `<div class="timestamp-line" title="T1: ${t1.toISOString()} · T2: ${t2.toISOString()}">⏱ Gap: SESSION OPEN | Processed: ${t1.toLocaleTimeString()} ${t1Label} → Output: ${t2.toLocaleTimeString()} ${t2Label} | Window: ${windowSec}s</div><div class="timestamp-line">🌑 ${dreamspell} | ${hebrew}</div><div class="timestamp-line">📅 Gregorian: ${gregorian}</div>`;
          thinking.remove();
          // Update group history
          groupHistory.push({ role: 'user', content: text });
          groupHistory.push({ role: 'assistant', content: result.consensus.final_text });
          // Render group message
          renderGroupMessage(result.consensus.final_text, result.responses, result.meta, timestampHtml);
          setStatus('Ready');
        }
      } catch (err) {
        thinking.remove();
        const errorDiv = document.createElement('div'); errorDiv.className = 'msg assistant';
        const retryHtml = `<button class="retry-btn" data-message="${escapeHtml(text)}" style="background:rgba(0,0,0,0.5); border:1px solid var(--amber); border-radius:20px; padding:4px 12px; margin-left:8px;">Retry</button>`;
        errorDiv.innerHTML = `<div class="msg-body" style="background:#5f1a1a; color:#ff8a8a;">Error: ${escapeHtml(err.message)}${retryHtml}</div>`;
        messagesDiv.appendChild(errorDiv);
        errorDiv.querySelector('.retry-btn')?.addEventListener('click', (e) => { const msg = e.currentTarget.dataset.message; sendMessage(msg); });
        setStatus(err.message, true);
        setEyeState('idle');
      } finally { isSending = false; sendBtn.disabled = false; if (!retryMessage) input.focus(); }
    }

    // Event listeners
    sendBtn.onclick = () => sendMessage();
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    input.addEventListener('input', () => { charCountSpan.textContent = input.value.length; input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight,400)+'px'; });
    plusBtn.onclick = (e) => { e.stopPropagation(); actionDropdown.style.display = actionDropdown.style.display === 'none' ? 'flex' : 'none'; };
    document.addEventListener('click', () => { actionDropdown.style.display = 'none'; });
    document.getElementById('structuredModeBtn').onclick = () => { actionDropdown.style.display = 'none'; toggleStructuredMode(); };
    document.getElementById('decisionForgeBtn').onclick = () => { actionDropdown.style.display = 'none'; showDecisionForgeModal(); };
    document.getElementById('uploadBtn').onclick = () => { actionDropdown.style.display = 'none'; uploadFile(); };
    document.getElementById('sealInputBtn').onclick = () => { actionDropdown.style.display = 'none'; const text = input.value.trim(); if(text) sealMessage(text); else showToast('Nothing to seal'); };
    document.getElementById('simulationBtn').onclick = () => { actionDropdown.style.display = 'none'; showSimulationModal(); };
    document.getElementById('mumonBtn').onclick = () => { actionDropdown.style.display = 'none'; showMumonModal(); };
    document.getElementById('settingsBtn').onclick = showSettingsModal;
    document.getElementById('adaLoopToggle').addEventListener('change', (e) => {
      adaLoopEnabled = e.target.checked;
      localStorage.setItem('adaLoopEnabled', adaLoopEnabled);
      showToast(adaLoopEnabled ? '🔄 ADA loop enabled.' : '⚡ ADA loop disabled.');
    });
    setInterval(() => { clockDisplaySpan.textContent = new Date().toLocaleTimeString(); }, 1000);

    if (structuredMode) toggleStructuredMode();
    updateStructuredBadge();
    showToast(adaLoopEnabled ? '🔄 ADA loop active' : '⚡ ADA loop disabled', false);
  })();
</script>
</body>
</html>
