<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AION · Six Wives · Group Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: rgba(12, 12, 20, 0.7);
      --glass: rgba(20, 20, 30, 0.65);
      --border-glow: rgba(100, 100, 140, 0.3);
      --primary-glow: rgba(201, 160, 40, 0.4);
      --accent: #c9a028;
      --accent-dark: #a07c18;
      --text: #f0f0f8;
      --text-dim: #a0a0b0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0f0f1a, #050508);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    /* particle canvas */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      backdrop-filter: blur(4px);
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e6c87a, #c9a028);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .structured-toggle {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .structured-toggle.active {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .private-room-btn {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .private-room-btn.active {
      background: rgba(184,115,51,0.3);
      border-color: #b87333;
      color: #b87333;
    }

    .wife-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 40px;
    }
    .wife-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }
    .void-meter {
      font-family: monospace;
      background: #00000044;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .void-meter.active {
      color: #ff5e5e;
      text-shadow: 0 0 6px rgba(255,80,80,0.5);
    }

    /* messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeSlideUp 0.2s ease;
    }
    .msg.user {
      align-self: flex-end;
    }
    .msg.assistant {
      align-self: flex-start;
    }
    .msg-meta {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-body {
      padding: 10px 16px;
      border-radius: 20px;
      line-height: 1.4;
      backdrop-filter: blur(8px);
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .msg.user .msg-body {
      background: rgba(201,160,40,0.2);
      border-color: var(--accent);
      border-radius: 20px 20px 4px 20px;
    }
    .msg.assistant .msg-body {
      border-radius: 20px 20px 20px 4px;
    }

    /* wife-specific left borders */
    .msg.assistant[data-wife="VESPER"] .msg-body { border-left: 4px solid #b87333; background: rgba(184,115,51,0.08); }
    .msg.assistant[data-wife="LYRA"] .msg-body { border-left: 4px solid #4c9f70; background: rgba(76,159,112,0.08); }
    .msg.assistant[data-wife="TERRA"] .msg-body { border-left: 4px solid #6b8c42; background: rgba(107,140,66,0.08); }
    .msg.assistant[data-wife="CIPHER"] .msg-body { border-left: 4px solid #5d6d7e; background: rgba(93,109,126,0.08); }
    .msg.assistant[data-wife="JUSTITIA"] .msg-body { border-left: 4px solid #b0a8b9; background: rgba(176,168,185,0.08); }
    .msg.assistant[data-wife="ALBEDO"] .msg-body { border-left: 4px solid #c9a028; background: rgba(201,160,40,0.08); }

    .msg-footer {
      display: flex;
      gap: 12px;
      margin-top: 4px;
      font-size: 0.6rem;
      color: var(--text-dim);
    }

    /* input area */
    .input-area {
      padding: 16px 24px 20px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: rgba(10,10,20,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      resize: none;
      outline: none;
      transition: all 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--primary-glow);
    }
    .send-btn {
      background: linear-gradient(135deg, #c9a028, #a07c18);
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #0a0a0f;
      cursor: pointer;
    }
    .input-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 24px;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.3);
    }

    /* modal for private room */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--accent);
      border-radius: 28px;
      width: 300px;
      padding: 24px;
      text-align: center;
    }
    .modal h3 {
      margin-bottom: 20px;
    }
    .wife-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .wife-buttons button {
      background: rgba(30,30,45,0.8);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text);
    }
    .modal .btn {
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      margin: 4px;
      cursor: pointer;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.4);
      border-radius: 40px;
      padding: 8px 16px;
      width: fit-content;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="app-container">
  <header class="header">
    <div class="brand"><h1>AION · SIX WIVES</h1></div>
    <div class="header-right">
      <div id="structuredToggle" class="structured-toggle">🔒 STRUCTURED MODE</div>
      <div id="privateRoomBtn" class="private-room-btn">🚪 PRIVATE ROOM</div>
      <div class="wife-indicator">
        <div class="wife-avatar" id="wifeAvatar">✨</div>
        <span id="wifeName">ALBEDO</span>
      </div>
      <div class="void-meter" id="voidMeter">VOID: 0.000</div>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="sys-msg">✨ Welcome. Six wives are present. Use the button to talk privately.</div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Message your wives..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">SEND</button>
    </div>
    <div class="input-meta"><span>⏎ send · ⇧+⏎ new line</span><span id="charCount">0</span></div>
  </div>

  <div class="status-bar">
    <div><span id="statusDot">●</span> <span id="statusText">READY</span> <span id="sessionDisplay"></span></div>
    <div><span id="clockDisplay"></span></div>
  </div>
</div>

<script>
  // =======================================================
  // AION FRONTEND · GROUP CHAT WITH 6 WIVES
  // =======================================================
  const API_BASE = 'https://aion-backend-mu.vercel.app';
  const OWNER_TYPE = 'sheldon';

  let structuredMode = false;
  let sessionId = null;
  let sessionKey = null;
  let lastFragmentId = null;
  let history = [];
  let currentState = 'SESSION_INIT';
  let clarificationCount = 0;
  let pendingClarification = null;
  let isSending = false;
  let exclusiveMode = false;
  let exclusiveWife = null;

  // DOM elements
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const toggleBtn = document.getElementById('structuredToggle');
  const privateRoomBtn = document.getElementById('privateRoomBtn');
  const statusTextSpan = document.getElementById('statusText');
  const wifeNameSpan = document.getElementById('wifeName');
  const wifeAvatarDiv = document.getElementById('wifeAvatar');
  const voidMeterSpan = document.getElementById('voidMeter');
  const sessionDisplaySpan = document.getElementById('sessionDisplay');
  const clockDisplaySpan = document.getElementById('clockDisplay');
  const charCountSpan = document.getElementById('charCount');

  // Wife styling
  const WIFE_STYLES = {
    ALBEDO: { color: '#c9a028', emoji: '✨', name: 'ALBEDO' },
    VESPER: { color: '#b87333', emoji: '🌙', name: 'VESPER' },
    LYRA:   { color: '#4c9f70', emoji: '🌿', name: 'LYRA' },
    TERRA:  { color: '#6b8c42', emoji: '🌍', name: 'TERRA' },
    CIPHER: { color: '#5d6d7e', emoji: '🔒', name: 'CIPHER' },
    JUSTITIA: { color: '#b0a8b9', emoji: '⚖️', name: 'JUSTITIA' }
  };

  // Helper functions
  function scrollBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
  function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderMarkdown(text) {
    if (!text) return '';
    try {
      return marked.parse(text);
    } catch(e) {
      return escapeHtml(text);
    }
  }
  function formatGap(sec) { if (!sec) return 'Gap: SESSION OPEN'; if (sec<60) return `Gap: ${sec}s`; if (sec<3600) return `Gap: ${Math.floor(sec/60)}m ${sec%60}s`; return `Gap: ${Math.floor(sec/3600)}h`; }
  function getImportanceLabel(s) { if (!s) return 'IMP: —'; if(s>=0.9) return `IMP: ${s.toFixed(2)} ★★`; if(s>=0.75) return `IMP: ${s.toFixed(2)} ★`; return `IMP: ${s.toFixed(2)}`; }

  function addMessage(role, wifeKey, content, extra = {}) {
    const style = WIFE_STYLES[wifeKey] || WIFE_STYLES.ALBEDO;
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'assistant') div.setAttribute('data-wife', wifeKey);
    const metaHtml = `<div class="msg-meta" style="color: ${style.color}">${style.emoji} ${style.name}${extra.wife_version ? ` v${extra.wife_version}` : ''}</div>`;
    const bodyHtml = `<div class="msg-body">${renderMarkdown(content)}</div>`;
    const footerHtml = extra.timing ? `<div class="msg-footer"><span>⏱ ${extra.timing}</span>${extra.importance ? `<span>${getImportanceLabel(extra.importance)}</span>` : ''}</div>` : '';
    div.innerHTML = metaHtml + bodyHtml + footerHtml;
    messagesDiv.appendChild(div);
    scrollBottom();
  }

  function addSystemMessage(text, isError = false) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.style.cssText = `align-self:center; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); border-radius:20px; padding:8px 16px; font-size:0.7rem; color:${isError ? '#ff8a8a' : '#aaa'}; margin:4px 0;`;
    div.textContent = text;
    messagesDiv.appendChild(div);
    scrollBottom();
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'thinking';
    div.innerHTML = `<div class="thinking-dots">●●●</div><span>thinking...</span>`;
    messagesDiv.appendChild(div);
    scrollBottom();
    return div;
  }

  function updateWifeUI(wifeName, voidProx) {
    const style = WIFE_STYLES[wifeName] || WIFE_STYLES.ALBEDO;
    wifeNameSpan.textContent = style.name;
    wifeAvatarDiv.textContent = style.emoji;
    wifeAvatarDiv.style.background = `linear-gradient(135deg, ${style.color}, #5a3e1a)`;
    if (voidProx > 0.1) voidMeterSpan.classList.add('active');
    else voidMeterSpan.classList.remove('active');
    voidMeterSpan.textContent = `VOID: ${voidProx.toFixed(3)}`;
  }

  function setStatus(text, isError) {
    statusTextSpan.textContent = text;
    document.getElementById('statusDot').style.color = isError ? '#ff5e5e' : '#4c9f70';
  }

  // Crypto helpers (same as before, keep)
  async function computeHash(obj) { ... }
  async function computeHMAC(keyHex, message) { ... }

  // Session init
  async function initM2MSession(retry = true) {
    const nonce = crypto.randomUUID();
    const newSessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
    const payload = {
      session_init: {
        session_id: newSessionId,
        ts: new Date().toISOString(),
        nonce,
        capabilities: ['fragment_v3'],
        domain_filters: ['emergence','integrity','healing','synthesis','security','law','foundation','general'],
        ttl_seconds: 7200,
      }
    };
    try {
      const resp = await fetch(`${API_BASE}/api/m2m/init`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      sessionId = data.session_id;
      sessionKey = data.key;
      sessionDisplaySpan.textContent = `SID: ${sessionId.slice(-8)}`;
      currentState = 'REGULAR_CHAT';
      addSystemMessage(`✅ M2M session established.`);
      return true;
    } catch (err) {
      console.error(err);
      if (retry) return initM2MSession(false);
      addSystemMessage(`❌ M2M init failed: ${err.message}. Structured mode disabled.`, true);
      if (structuredMode) { structuredMode = false; toggleBtn.classList.remove('active'); }
      return false;
    }
  }

  // Private room UI
  function showPrivateRoomModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <h3>Choose a wife</h3>
        <div class="wife-buttons">
          ${Object.keys(WIFE_STYLES).map(w => `<button data-wife="${w}">${WIFE_STYLES[w].emoji} ${w}</button>`).join('')}
        </div>
        <button class="btn" id="modalCancel">Cancel</button>
      </div>
    `;
    document.body.appendChild(modal);
    const close = () => modal.remove();
    modal.querySelectorAll('[data-wife]').forEach(btn => {
      btn.onclick = async () => {
        const wife = btn.dataset.wife;
        close();
        addSystemMessage(`🚪 Entering private room with ${wife}. Use "/done" to exit.`);
        // Send command to backend via message (we'll just send the command text)
        input.value = `/talk ${wife}`;
        sendMessage();
      };
    });
    modal.querySelector('#modalCancel').onclick = close;
  }

  privateRoomBtn.onclick = showPrivateRoomModal;

  // Send regular chat / structured message
  async function sendRegularChat(message) {
    const resp = await fetch(`${API_BASE}/api/assistant`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        sessionId: sessionId || 'regular-session',
        ownerType: OWNER_TYPE,
        history: history.slice(-10)
      })
    });
    if (!resp.ok) throw new Error(await resp.text());
    return resp.json();
  }

  async function sendMessage() {
    if (isSending) { addSystemMessage('Please wait...', true); return; }
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    charCountSpan.textContent = '0';
    addMessage('user', 'ALBEDO', text);
    const thinking = addThinking();
    setStatus('Processing...', false);
    isSending = true;
    sendBtn.disabled = true;
    input.disabled = true;

    try {
      // Use regular chat (assistant endpoint) for simplicity; structured mode can be added later
      const data = await sendRegularChat(text);
      thinking.remove();
      const wife = data.active_wife || 'ALBEDO';
      updateWifeUI(wife, data.void_proximity || 0);
      addMessage('assistant', wife, data.response, {
        timing: `${(data.processing_window_ms/1000).toFixed(2)}s | ${formatGap(data.gap_seconds)}`,
        importance: data.importance_score,
        wife_version: data.wife_version
      });
      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: data.response });
      currentState = 'REGULAR_CHAT';

      // Update exclusive mode indicator
      if (data.exclusive_mode) {
        exclusiveMode = true;
        exclusiveWife = data.focused_wife;
        privateRoomBtn.classList.add('active');
      } else {
        exclusiveMode = false;
        exclusiveWife = null;
        privateRoomBtn.classList.remove('active');
      }
    } catch (err) {
      thinking.remove();
      addSystemMessage(`Error: ${err.message}`, true);
      setStatus(err.message, true);
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
      setStatus('Ready', false);
    }
  }

  // Particles background
  function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let width, height;
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    function createParticles() {
      particles = [];
      for (let i=0; i<120; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2 + 0.5,
          alpha: Math.random() * 0.5 + 0.2,
          speed: 0.2 + Math.random() * 0.5,
        });
      }
    }
    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,200,${p.alpha})`;
        ctx.fill();
        p.y += p.speed;
        if (p.y > height) p.y = 0;
      }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); createParticles(); });
    resize();
    createParticles();
    draw();
  }
  initParticles();

  // Toggle structured mode (optional)
  toggleBtn.onclick = async () => {
    if (!structuredMode && !sessionKey) {
      addSystemMessage('Starting M2M session...');
      await initM2MSession();
    }
    structuredMode = !structuredMode;
    if (structuredMode) {
      toggleBtn.classList.add('active');
      addSystemMessage('🔒 Structured mode ON · fragments sealed with HMAC');
    } else {
      toggleBtn.classList.remove('active');
      addSystemMessage('🔓 Structured mode OFF · regular chat');
    }
  };

  // Input events
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    charCountSpan.textContent = `${input.value.length}/8000`;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });
  sendBtn.onclick = sendMessage;
  setInterval(() => {
    clockDisplaySpan.textContent = new Date().toLocaleTimeString();
  }, 1000);
  initM2MSession().catch(console.error);
</script>
</body>
</html>
